function CloudChip({ status, campaign, onBind }) {
  const base = { fontSize: 11.5, letterSpacing: ".04em", borderRadius: 999, padding: "5px 11px", border: "1px solid var(--line)", whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 6 };
  if (!HAS_FB) return <span style={{ ...base, color: "var(--faint)" }}>локально</span>;
  if (!campaign) return <button onClick={onBind} style={{ ...base, color: "var(--bronze)", borderColor: "var(--line-warm)", cursor: "pointer", background: "none" }}>привязать кампанию</button>;
  const map = {
    loading: { t: "загрузка…", c: "var(--muted)" },
    cloud:   { t: "облако · " + campaign, c: "var(--steel)" },
    saving:  { t: "сохранение…", c: "var(--muted)" },
    saved:   { t: "сохранено ✓", c: "var(--steel)" },
    error:   { t: "нет связи", c: "var(--red)" },
  };
  const s = map[status] || map.cloud;
  return <button onClick={onBind} title="сменить код кампании" style={{ ...base, color: s.c, cursor: "pointer", background: "none" }}>{s.t}</button>;
}

/* ============================ Компонент ============================ */
function Bestiary() {
  const [beasts, setBeasts] = useState(initialBeasts);
  const [gm, setGm] = useState(ROLE === "gm");
  const [query, setQuery] = useState("");
  const [kindF, setKindF] = useState("");
  const [editing, setEditing] = useState(null);
  const [showData, setShowData] = useState(false);
  const [campaign, setCampaign] = useState(readCampaign);
  const [status, setStatus] = useState(HAS_FB && readCampaign() ? "loading" : "local");
  const [loaded, setLoaded] = useState(!(HAS_FB && readCampaign()));

  const skip = useRef(true);
  const ready = useRef(false);

  // загрузка + живая подписка
  useEffect(() => {
    if (!HAS_FB || !campaign) { setStatus(HAS_FB ? "cloud" : "local"); setLoaded(true); return; }
    let unsub = null, alive = true;
    setStatus("loading");
    (async () => {
      try { await auth.signInAnonymously(); } catch (e) { console.error("auth:", e); }
      const ref = db.collection("campaigns").doc(campaign).collection("boards").doc(BOARD_ID);
      try {
        const snap = await ref.get();
        if (alive && snap.exists && Array.isArray(snap.data().beasts)) { skip.current = true; setBeasts(snap.data().beasts); }
        else if (ROLE === "gm") { try { await ref.set({ beasts: initialBeasts, updatedAt: Date.now() }); } catch (e) { console.error("seed:", e); } }
      } catch (e) { console.error("load:", e); if (alive) setStatus("error"); }
      ready.current = true;
      if (alive) { setStatus("cloud"); setLoaded(true); }
      unsub = ref.onSnapshot((snap) => {
        if (!snap.exists || snap.metadata.hasPendingWrites) return;
        if (Array.isArray(snap.data().beasts)) { skip.current = true; setBeasts(snap.data().beasts); }
      }, (e) => console.error("snapshot:", e));
    })();
    return () => { alive = false; if (unsub) unsub(); };
  }, [campaign]);

  // автосейв (только ведущая)
  useEffect(() => {
    if (!HAS_FB || !campaign || ROLE !== "gm") return;
    if (!ready.current) return;
    if (skip.current) { skip.current = false; return; }
    setStatus("saving");
    const t = setTimeout(async () => {
      try {
        await db.collection("campaigns").doc(campaign).collection("boards").doc(BOARD_ID).set({ beasts, updatedAt: Date.now() }, { merge: true });
        setStatus("saved"); setTimeout(() => setStatus("cloud"), 1200);
      } catch (e) { console.error("save:", e); setStatus("error"); }
    }, 700);
    return () => clearTimeout(t);
  }, [beasts, campaign]);

  const bind = () => {
    const v = window.prompt("Код кампании (тот же, что у карты героя):", campaign || "");
    if (v && v.trim()) { const c = v.trim(); try { localStorage.setItem("ragnarok-board-campaign", c); } catch (e) {} ready.current = false; skip.current = true; setLoaded(false); setCampaign(c); }
  };

  const saveBeast = (b) => {
    const clean = { ...b }; delete clean._new;
    setBeasts((list) => list.some((x) => x.id === clean.id) ? list.map((x) => (x.id === clean.id ? clean : x)) : [...list, clean]);
    setEditing(null);
  };
  const toggleHide = (b) => setBeasts((list) => list.map((x) => (x.id === b.id ? { ...x, hidden: !x.hidden } : x)));
  const delBeast = (b) => { if (window.confirm("Удалить «" + (b.name || "существо") + "» из бестиария?")) setBeasts((list) => list.filter((x) => x.id !== b.id)); };

  const visible = gm ? beasts : beasts.filter((b) => !b.hidden);
  const q = query.trim().toLowerCase();
  const filtered = useMemo(() => visible.filter((b) =>
    (!kindF || b.kind === kindF) &&
    (!q || (b.name + " " + b.kind + " " + b.abilities + " " + b.lore + " " + b.habitat).toLowerCase().includes(q))
  ), [visible, q, kindF]);

  const order = [...KINDS, ...Array.from(new Set(beasts.map((b) => b.kind))).filter((k) => !KINDS.includes(k))];
  const groups = order.map((k) => ({ kind: k, items: filtered.filter((b) => b.kind === k) })).filter((g) => g.items.length);
  const kindsPresent = order.filter((k) => visible.some((b) => b.kind === k));

  if (!loaded) return <div style={{ fontFamily: FONT_UI, background: INK, color: "var(--muted)", minHeight: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }} className="w-full">Загрузка из облака…</div>;

  return (
    <div style={{ fontFamily: FONT_UI, background: INK, color: "var(--ink)", minHeight: "100%" }} className="w-full">
      <style>{`
        .bs-btn{ border:1px solid var(--line); border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; background:var(--surf); color:var(--ink); display:inline-flex; align-items:center; gap:6px; }
        .bs-btn:hover{ background:var(--surf2); border-color:var(--steel-soft); }
        .bs-btn.danger:hover{ border-color:var(--red); color:var(--red); }
        .bs-chip{ border:1px solid var(--line); border-radius:999px; padding:5px 13px; font-size:12.5px; cursor:pointer; background:var(--surf); color:var(--muted); }
        .bs-chip:hover{ border-color:var(--bronze); color:var(--ink); }
        .bs-chip.on{ background:var(--bronze); border-color:var(--bronze); color:var(--on-ink); font-weight:600; }
        .bs-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:14px; }
        .bs-card{ display:flex; flex-direction:column; border:1px solid var(--line); border-radius:12px; background:var(--surf); overflow:hidden; min-width:0; }
        .bs-card.is-hidden{ opacity:.62; border-style:dashed; }
        .bs-av{ height:150px; background-size:cover; background-position:center; border-bottom:1px solid var(--line); }
        .bs-body{ padding:14px 15px; display:flex; flex-direction:column; gap:8px; min-width:0; }
        .bs-head{ display:flex; flex-direction:column; gap:6px; }
        .bs-name{ font-family:var(--disp); font-weight:600; font-size:18px; color:var(--ink); line-height:1.15; overflow-wrap:break-word; }
        .bs-tags{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
        .bs-kind{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--bronze); border:1px solid var(--line-warm); border-radius:999px; padding:2px 9px; }
        .bs-wc{ font-size:10.5px; letter-spacing:.06em; color:var(--steel); border:1px solid var(--steel-soft); border-radius:999px; padding:2px 9px; }
        .bs-hid{ font-size:10.5px; color:var(--faint); display:inline-flex; align-items:center; gap:4px; }
        .bs-stats{ display:flex; gap:8px; flex-wrap:wrap; }
        .bs-d{ background:var(--surf2); border:1px solid var(--line-soft); border-radius:8px; padding:6px 10px; text-align:center; min-width:60px; }
        .bs-d b{ display:block; font-family:var(--mono); font-size:16px; color:var(--steel); font-weight:700; }
        .bs-d span{ font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); }
        .bs-line{ font-size:12.5px; color:var(--ink); line-height:1.5; overflow-wrap:break-word; }
        .bs-block p{ font-size:12.5px; color:var(--ink); line-height:1.5; margin:3px 0 0; overflow-wrap:break-word; }
        .bs-l{ font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-right:6px; }
        .bs-block .bs-l, .bs-tact .bs-l{ display:block; margin-bottom:0; }
        .bs-lore{ font-size:12.5px; color:var(--muted); font-style:italic; line-height:1.5; border-left:2px solid var(--line-warm); padding-left:10px; overflow-wrap:break-word; }
        .bs-tact{ background:var(--warm); border:1px solid var(--line-warm); border-radius:8px; padding:8px 10px; }
        .bs-tact p{ font-size:12px; color:var(--ink); line-height:1.5; margin:3px 0 0; overflow-wrap:break-word; }
        .bs-actions{ display:flex; gap:7px; flex-wrap:wrap; margin-top:4px; border-top:1px solid var(--line-soft); padding-top:10px; }
        .bs-actions .bs-btn span{ display:inline-flex; align-items:center; gap:5px; }
        .bs-form{ display:grid; grid-template-columns:1fr 1fr; gap:12px 14px; }
        .bs-form .ff{ display:flex; flex-direction:column; gap:5px; min-width:0; }
        .bs-form .ff.wide{ grid-column:1 / -1; }
        .bs-form .ff.sm{ grid-column:span 1; }
        .bs-form label{ font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); font-weight:600; display:flex; align-items:center; gap:8px; }
        .bs-form .hint{ font-size:9.5px; letter-spacing:.04em; text-transform:none; color:var(--steel); border:1px solid var(--steel-soft); border-radius:999px; padding:1px 7px; font-weight:500; }
        .bs-form .hint.warn{ color:var(--bronze); border-color:var(--line-warm); }
        .bs-in{ background:var(--inset); border:1px solid var(--line); border-radius:8px; color:var(--ink); padding:8px 10px; outline:none; font-size:13px; width:100%; font-family:inherit; resize:vertical; line-height:1.45; }
        .bs-in:focus{ border-color:var(--bronze); }
        .bs-toggle{ background:var(--surf2); border:1px solid var(--line); border-radius:8px; color:var(--ink); padding:8px 12px; font-size:13px; cursor:pointer; text-align:left; }
        .bs-toggle.on{ border-color:var(--steel); color:var(--steel); font-weight:600; }
        .bs-toggle.on.warn{ border-color:var(--bronze); color:var(--bronze); }
        .bs-cap{ font-size:11.5px; color:var(--muted); line-height:1.5; background:var(--warm); border:1px solid var(--line-warm); border-radius:8px; padding:8px 11px; }
        .bs-grp{ font-family:var(--disp); font-size:15px; color:var(--muted); letter-spacing:.04em; margin:22px 0 10px; display:flex; align-items:center; gap:10px; }
        .bs-grp::after{ content:""; flex:1; height:1px; background:var(--line-soft); }
      `}</style>

      <header className="flex items-center justify-between px-5 py-4 flex-wrap gap-2" style={{ borderBottom: "1px solid var(--line-soft)" }}>
        <div>
          <div style={{ fontFamily: FONT_DISPLAY, fontSize: 22, color: GOLD }}>Бестиарий</div>
          <div style={{ fontSize: 12, color: "var(--muted)" }}>существа девяти миров · {visible.length}{gm ? " (" + beasts.filter((b) => b.hidden).length + " скрыто)" : ""}</div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <CloudChip status={status} campaign={campaign} onBind={bind} />
          <div className="flex items-center gap-2" style={{ background: "var(--surf)", border: "1px solid var(--line)", borderRadius: 9, padding: "5px 9px" }}>
            <Search size={14} style={{ color: "var(--muted)" }} />
            <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="поиск…" style={{ background: "none", border: "none", outline: "none", color: "var(--ink)", fontSize: 13, width: 110 }} />
            {query && <button onClick={() => setQuery("")} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer" }}><X size={13} /></button>}
          </div>
          {ROLE === "gm" && (
            <div className="flex rounded-lg overflow-hidden" style={{ border: "1px solid var(--line)" }}>
              {[["gm", "Ведущая"], ["player", "Игрок"]].map(([v, label]) => {
                const active = (gm ? "gm" : "player") === v;
                return <button key={v} onClick={() => setGm(v === "gm")} style={{ background: active ? GOLD : "transparent", color: active ? "var(--on-ink)" : "var(--muted)", padding: "6px 14px", fontSize: 13, fontWeight: 600 }}>{label}</button>;
              })}
            </div>
          )}
          {gm && <button className="bs-btn" onClick={() => setEditing({ ...blank(), _new: true })}><Plus size={14} /> Существо</button>}
          {gm && <button className="bs-btn" onClick={() => setShowData(true)}><Database size={14} /> Данные</button>}
        </div>
      </header>

      <div style={{ padding: "6px 18px 40px" }}>
        {kindsPresent.length > 1 && (
          <div className="flex flex-wrap gap-2" style={{ margin: "12px 0 4px" }}>
            <button className={"bs-chip" + (!kindF ? " on" : "")} onClick={() => setKindF("")}>Все</button>
            {kindsPresent.map((k) => <button key={k} className={"bs-chip" + (kindF === k ? " on" : "")} onClick={() => setKindF(kindF === k ? "" : k)}>{k}</button>)}
          </div>
        )}

        {groups.length === 0 && <div style={{ padding: 24, color: "var(--muted)" }}>{gm ? "Пусто. Добавь существо кнопкой «+ Существо»." : "Здесь пока ничего не открыто."}</div>}

        {groups.map((g) => (
          <div key={g.kind}>
            <div className="bs-grp">{g.kind}</div>
            <div className="bs-grid">
              {g.items.map((b) => <BeastCard key={b.id} b={b} gm={gm} onEdit={setEditing} onToggleHide={toggleHide} onDelete={delBeast} />)}
            </div>
          </div>
        ))}
      </div>

      {editing && <EditModal beast={editing} onSave={saveBeast} onClose={() => setEditing(null)} />}
      {showData && <DataModal beasts={beasts} onClose={() => setShowData(false)} onApply={(d) => { setBeasts(d); setShowData(false); }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Bestiary />);
</script>
<script src="app-shell.js" defer></script>
</body>
</html>
