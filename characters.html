function CloudChip({ status, campaign, onBind }) {
  const base = { fontSize: 11.5, letterSpacing: ".04em", borderRadius: 999, padding: "5px 11px", border: "1px solid var(--line)", whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 6 };
  if (!HAS_FB) return <span style={{ ...base, color: "var(--faint)" }}>локально</span>;
  if (!campaign) return <button onClick={onBind} style={{ ...base, color: "var(--bronze)", borderColor: "var(--line-warm)", cursor: "pointer", background: "none" }}>привязать кампанию</button>;
  const map = {
    loading: { t: "загрузка…", c: "var(--muted)" },
    cloud:   { t: "облако · " + campaign, c: "var(--steel)" },
    saving:  { t: "сохранение…", c: "var(--muted)" },
    saved:   { t: "сохранено ✓", c: "var(--steel)" },

function Characters() {
  const [nodes, setNodes] = useState(initialNodes);
  const [edges, setEdges] = useState(initialEdges);
  const [legend, setLegend] = useState(initialLegend);
  const __ROLE__ = (new URLSearchParams(location.search).get("role") === "gm") ? "gm" : "player";
  const [gm, _setGm] = useState(__ROLE__ === "gm");
  const setGm = (v) => { if (__ROLE__ === "gm") _setGm(v); };
  const [mode, setMode] = useState("links"); // links | grid
  const [selected, setSelected] = useState(null);
  const [selEdge, setSelEdge] = useState(null);
  const [linking, setLinking] = useState(false);
  const [linkFrom, setLinkFrom] = useState(null);
  const [showData, setShowData] = useState(false);
  const [query, setQuery] = useState("");
  const [view, setView] = useState({ x: 0, y: 0, k: 1 });
  const [kindFilter, setKindFilter] = useState(() => new Set());

  // --- облако ---
  const [campaign, setCampaign] = useState(readCampaign);
  const [status, setStatus] = useState(HAS_FB && readCampaign() ? "loading" : "local");
  const [playerTags, setPlayerTags] = useState({});   // id персонажа → [теги игроков] (отдельное поле)
  const _skip = useRef(true);
  const _skipPT = useRef(true);
  const _ready = useRef(false);
  const hydrate = (d) => {
    _skip.current = true; _skipPT.current = true;
    if (Array.isArray(d.nodes)) setNodes(d.nodes);
    if (Array.isArray(d.edges)) setEdges(d.edges);
    if (Array.isArray(d.legend)) setLegend(d.legend);
    if (d.playerTags && typeof d.playerTags === "object") setPlayerTags(d.playerTags);
  };
  useEffect(() => {
    if (!HAS_FB || !campaign) { setStatus(HAS_FB ? "cloud" : "local"); return; }
    let unsub = null, alive = true; setStatus("loading");
    (async () => {
      try { await auth.signInAnonymously(); } catch (e) { console.error("auth:", e); }
      const ref = db.collection("campaigns").doc(campaign).collection("boards").doc(BOARD_ID);
      try {
        const snap = await ref.get();
        if (alive && snap.exists) hydrate(snap.data());
        else if (ROLE === "gm") { try { await ref.set({ nodes, edges, legend, updatedAt: Date.now() }); } catch (e) { console.error("seed:", e); } }
      } catch (e) { console.error("load:", e); if (alive) setStatus("error"); }
      _ready.current = true; if (alive) setStatus("cloud");
      unsub = ref.onSnapshot((snap) => { if (!snap.exists || snap.metadata.hasPendingWrites) return; hydrate(snap.data()); }, (e) => console.error("snapshot:", e));
    })();
    return () => { alive = false; if (unsub) unsub(); };
  }, [campaign]);
  useEffect(() => {
    if (!HAS_FB || !campaign || ROLE !== "gm") return;
    if (!_ready.current) return;
    if (_skip.current) { _skip.current = false; return; }
    setStatus("saving");
    const t = setTimeout(async () => {
      try { await db.collection("campaigns").doc(campaign).collection("boards").doc(BOARD_ID).set({ nodes, edges, legend, updatedAt: Date.now() }, { merge: true }); setStatus("saved"); setTimeout(() => setStatus("cloud"), 1200); }
      catch (e) { console.error("save:", e); setStatus("error"); }
    }, 700);
    return () => clearTimeout(t);
  }, [nodes, edges, legend, campaign]);
  useEffect(() => {
    if (!HAS_FB || !campaign) return;
    if (!_ready.current) return;
    if (_skipPT.current) { _skipPT.current = false; return; }
    const t = setTimeout(async () => {
      try { await db.collection("campaigns").doc(campaign).collection("boards").doc(BOARD_ID).set({ playerTags, updatedAt: Date.now() }, { merge: true }); }
      catch (e) { console.error("save playerTags:", e); }
    }, 700);
    return () => clearTimeout(t);
  }, [playerTags, campaign]);
  const addPlayerTag = (cid, t) => { const tag = (t || "").trim(); if (!tag) return; setPlayerTags((pt) => ({ ...pt, [cid]: [...(pt[cid] || []), tag] })); };
  const delPlayerTag = (cid, i) => setPlayerTags((pt) => ({ ...pt, [cid]: (pt[cid] || []).filter((_, k) => k !== i) }));
  const bind = () => { const v = window.prompt("Код кампании (тот же, что у карты героя):", campaign || ""); if (v && v.trim()) { const c = v.trim(); try { localStorage.setItem("ragnarok-board-campaign", c); } catch (e) {} _ready.current = false; _skip.current = true; _skipPT.current = true; setCampaign(c); } };
  const toggleKind = (k) => setKindFilter((st) => { const m = new Set(st); m.has(k) ? m.delete(k) : m.add(k); return m; });

  const legendMap = useMemo(() => Object.fromEntries(legend.map((l) => [l.id, l])), [legend]);
  const nodeMap = useMemo(() => Object.fromEntries(nodes.map((n) => [n.id, n])), [nodes]);
  const current = selected ? nodeMap[selected] : null;
  const svgRef = useRef(null);
  const dragRef = useRef(null);
  const panRef = useRef(null);

  /* узлы */
  const patchNode = (id, patch) => setNodes((ns) => ns.map((n) => (n.id === id ? { ...n, ...patch } : n)));
  const addNode = () => { const n = { id: uid("c"), name: "Новый", kind: "люди", role: "", notes: "", vis: true, x: 640, y: 430, ax: 0, ay: 0 }; setNodes((ns) => [...ns, n]); setSelected(n.id); };
  const delNode = (id) => { setNodes((ns) => ns.filter((n) => n.id !== id)); setEdges((es) => es.filter((e) => e.from !== id && e.to !== id)); setSelected(null); };

  /* связи */
  const setEdgeType = (eid, type) => setEdges((es) => es.map((e) => (e.id === eid ? { ...e, type } : e)));
  const toggleEdgeVis = (eid) => setEdges((es) => es.map((e) => (e.id === eid ? { ...e, vis: !e.vis } : e)));
  const delEdge = (eid) => { setEdges((es) => es.filter((e) => e.id !== eid)); setSelEdge(null); };
  const addEdge = (a, b) => { const e = { id: uid("e"), from: a, to: b, type: legend[0]?.id || "ally", vis: true }; setEdges((es) => [...es, e]); setSelEdge(e.id); };

  const startLink = () => { setLinking(true); setLinkFrom(null); setSelected(null); setSelEdge(null); };
  const cancelLink = () => { setLinking(false); setLinkFrom(null); };
  const handleNode = (id) => {
    if (linking) {
      if (!linkFrom) { setLinkFrom(id); return; }
      if (linkFrom !== id) { addEdge(linkFrom, id); setLinking(false); setLinkFrom(null); }
      else setLinkFrom(null);
    } else { setSelEdge(null); setSelected(id); }
  };

  /* зум / пан / перетаскивание (режим связей) */
  const svgPoint = (evt) => { const p = svgRef.current.createSVGPoint(); p.x = evt.clientX; p.y = evt.clientY; return p.matrixTransform(svgRef.current.getScreenCTM().inverse()); };
  const toContent = (q) => ({ x: (q.x - view.x) / view.k, y: (q.y - view.y) / view.k });
  const onNodeDown = (evt, id) => { evt.stopPropagation(); const q = toContent(svgPoint(evt)); const n = nodeMap[id]; dragRef.current = { id, ox: n.x - q.x, oy: n.y - q.y, moved: false, canDrag: gm && !linking }; };
  const onBgDown = (evt) => { setSelEdge(null); const sp = svgPoint(evt); panRef.current = { sx: sp.x, sy: sp.y }; };
  const onMove = (evt) => {
    if (dragRef.current) { const d = dragRef.current; if (!d.canDrag) return; const q = toContent(svgPoint(evt)); d.moved = true; patchNode(d.id, { x: Math.round(q.x + d.ox), y: Math.round(q.y + d.oy) }); return; }
    if (panRef.current) { const sp = svgPoint(evt); const dx = sp.x - panRef.current.sx, dy = sp.y - panRef.current.sy; panRef.current = { sx: sp.x, sy: sp.y }; setView((v) => ({ ...v, x: v.x + dx, y: v.y + dy })); }
  };
  const onUp = () => { const d = dragRef.current; if (d && !d.moved) handleNode(d.id); dragRef.current = null; panRef.current = null; };
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const zoomAt = (sx, sy, f) => setView((v) => { const k2 = clamp(v.k * f, 0.3, 3); return { k: k2, x: sx - ((sx - v.x) / v.k) * k2, y: sy - ((sy - v.y) / v.k) * k2 }; });
  const onWheel = (evt) => { if (evt.cancelable) evt.preventDefault(); const sp = svgPoint(evt); zoomAt(sp.x, sp.y, evt.deltaY < 0 ? 1.12 : 1 / 1.12); };
  const zoomBy = (f) => zoomAt(VBW / 2, VBH / 2, f);
  const resetView = () => setView({ x: 0, y: 0, k: 1 });

  const focusNode = (id) => {
    setSelected(id); setQuery("");
    if (mode === "links") { const n = nodeMap[id]; if (n) setView((v) => ({ ...v, x: VBW / 2 - n.x * v.k, y: VBH / 2 - n.y * v.k })); }
  };

  /* легенда */
  const patchLegend = (lid, patch) => setLegend((ls) => ls.map((l) => (l.id === lid ? { ...l, ...patch } : l)));
  const addLegend = () => setLegend((ls) => [...ls, { id: uid("t"), label: "Новый тип", color: "#9aa0aa", directed: false }]);
  const delLegend = (lid) => { if (legend.length <= 1) return; const fb = legend.find((l) => l.id !== lid).id; setLegend((ls) => ls.filter((l) => l.id !== lid)); setEdges((es) => es.map((e) => (e.type === lid ? { ...e, type: fb } : e))); };

  const q = query.trim().toLowerCase();
  const results = q ? nodes.filter((n) => (gm || n.vis) && n.name.toLowerCase().includes(q)).slice(0, 8) : [];

  return (
    <div style={{ fontFamily: FONT_UI, background: INK, color: "var(--ink)", minHeight: "100%" }} className="w-full">
      <style>{`
        @keyframes cSlide { from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
        .c-slide{ animation:cSlide .3s ease-out both; }
        .c-node{ cursor:${gm ? "grab" : "pointer"}; }
        @media (prefers-reduced-motion: reduce){ .c-slide{animation:none} }
        .c-input{ background:var(--inset); border:1px solid var(--line); border-radius:8px; color:var(--ink); padding:6px 10px; outline:none; font-size:13px; }
        .c-input:focus{ border-color:${GOLD}; }
        .c-btn{ border:1px solid var(--line); border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; background:var(--surf); color:var(--ink); }
        .c-btn:hover{ background:var(--surf2); }
      `}</style>

      <header className="flex items-center justify-between px-5 py-4 flex-wrap gap-2" style={{ borderBottom: "1px solid var(--line-soft)" }}>
        <div>
          <div style={{ fontFamily: FONT_DISPLAY, fontSize: 22, color: GOLD }}>Персонажи</div>
          <div style={{ fontSize: 12, color: "var(--muted)" }}>{nodes.length} лиц · связи и расстановка</div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <CloudChip status={status} campaign={campaign} onBind={bind} />
          <div className="flex rounded-lg overflow-hidden" style={{ border: "1px solid var(--line)" }}>
            {[["links", "Связи", Network], ["grid", "Сетка", Crosshair]].map(([v, label, Ic]) => {
              const active = mode === v;
              return <button key={v} onClick={() => { setMode(v); setSelEdge(null); cancelLink(); }} className="flex items-center gap-1"
                style={{ background: active ? "var(--choice-on)" : "transparent", color: active ? "var(--steel)" : "var(--ink)", padding: "6px 12px", fontSize: 13, fontWeight: 600 }}><Ic size={13} /> {label}</button>;
            })}
          </div>
          <div className="flex rounded-lg overflow-hidden" style={{ border: "1px solid var(--line)" }}>
            {[["gm", "Ведущая"], ["player", "Игрок"]].map(([v, label]) => {
              const active = (gm ? "gm" : "player") === v;
              return <button key={v} onClick={() => { setGm(v === "gm"); setSelEdge(null); cancelLink(); }}
                style={{ background: active ? GOLD : "transparent", color: active ? INK : "var(--ink)", padding: "6px 14px", fontSize: 13, fontWeight: 600 }}>{label}</button>;
            })}
          </div>
          {gm && (
            <>
              <button className="c-btn flex items-center gap-1" onClick={addNode}><Plus size={14} /> Персонаж</button>
              {mode === "links" && <button className="c-btn flex items-center gap-1" onClick={linking ? cancelLink : startLink} style={linking ? { borderColor: GOLD, color: GOLD } : undefined}><Link2 size={14} /> {linking ? "Отмена" : "Связь"}</button>}
              <button className="c-btn flex items-center gap-1" onClick={() => setShowData(true)}><Database size={14} /> Данные</button>
            </>
          )}
        </div>
      </header>

      <div className="relative">
        {/* поиск */}
        <div className="absolute" style={{ top: 12, right: 16, zIndex: 6, width: "min(260px, 70%)" }}>
          <div className="flex items-center gap-2" style={{ background: "rgba(10,14,26,.92)", border: "1px solid var(--surf2)", borderRadius: 10, padding: "5px 10px" }}>
            <Search size={14} style={{ color: "var(--muted)", flexShrink: 0 }} />
            <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="поиск персонажа…"
              style={{ flex: 1, background: "none", border: "none", outline: "none", color: "var(--ink)", fontSize: 13 }} />
            {query && <button onClick={() => setQuery("")} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer" }}><X size={14} /></button>}
          </div>
          {results.length > 0 && (
            <div style={{ marginTop: 4, background: "rgba(10,14,26,.96)", border: "1px solid var(--line)", borderRadius: 10, overflow: "hidden" }}>
              {results.map((n) => (
                <button key={n.id} onClick={() => focusNode(n.id)} className="flex items-center gap-2"
                  style={{ width: "100%", textAlign: "left", padding: "6px 10px", background: "none", border: "none", borderBottom: "1px solid var(--line-soft)", color: "var(--ink)", cursor: "pointer", fontSize: 13 }}>
                  <span style={{ width: 9, height: 9, borderRadius: "50%", background: KINDS[n.kind] || "#888", flexShrink: 0 }} />
                  <span style={{ flex: 1 }}>{n.name}</span>
                  <span style={{ fontSize: 11, color: "var(--muted)" }}>{n.kind}</span>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* фильтр по виду */}
        <div className="absolute" style={{ left: 16, bottom: 16, zIndex: 6, background: "rgba(10,14,26,.88)", border: "1px solid var(--line)", borderRadius: 12, padding: 10, maxWidth: "min(380px, 80%)" }}>
          <div className="flex items-center justify-between mb-1.5" style={{ fontSize: 10.5, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px" }}>
            <span>Фильтр по виду</span>
            {kindFilter.size > 0 && <button onClick={() => setKindFilter(new Set())} style={{ background: "none", border: "none", color: GOLD, cursor: "pointer", fontSize: 11 }}>сбросить</button>}
          </div>
          <div className="flex flex-wrap gap-1.5">
            {KIND_LIST.map((k) => {
              const on = kindFilter.has(k);
              const active = kindFilter.size === 0 || on;
              return (
                <button key={k} onClick={() => toggleKind(k)} className="flex items-center gap-1"
                  style={{ fontSize: 11.5, padding: "2px 8px", borderRadius: 14, cursor: "pointer",
                    border: on ? `1px solid ${KINDS[k]}` : "1px solid var(--line)",
                    background: on ? `${KINDS[k]}26` : "transparent", color: active ? "var(--ink)" : "var(--faint)", opacity: active ? 1 : 0.55 }}>
                  <span style={{ width: 9, height: 9, borderRadius: "50%", background: KINDS[k], display: "inline-block" }} />{k}
                </button>
              );
            })}
          </div>
        </div>

        {mode === "links" ? (
          <MapView
            nodes={nodes} edges={edges} legend={legend} legendMap={legendMap} nodeMap={nodeMap}
            gm={gm} selEdge={selEdge} setSelEdge={setSelEdge} selected={selected} q={q} kindFilter={kindFilter}
            linking={linking} linkFrom={linkFrom} view={view}
            svgRef={svgRef} onNodeDown={onNodeDown} onBgDown={onBgDown} onMove={onMove} onUp={onUp} onWheel={onWheel} zoomBy={zoomBy} resetView={resetView}
            setEdgeType={setEdgeType} toggleEdgeVis={toggleEdgeVis} delEdge={delEdge}
            onLegend={patchLegend} addLegend={addLegend} delLegend={delLegend}
          />
        ) : (
          <GridView nodes={nodes} gm={gm} selected={selected} q={q} kindFilter={kindFilter} patchNode={patchNode} onSelect={(id) => setSelected(id)} />
        )}
      </div>

      {current && (
        <NodeDrawer node={current} gm={gm} edges={edges} nodeMap={nodeMap} legendMap={legendMap}
          onClose={() => setSelected(null)} patchNode={patchNode} delNode={delNode} toggleEdgeVis={toggleEdgeVis} delEdge={delEdge}
          ptags={(playerTags && playerTags[current.id]) || []} addPlayerTag={addPlayerTag} delPlayerTag={delPlayerTag} />
      )}

      {showData && <DataModal nodes={nodes} edges={edges} legend={legend} onClose={() => setShowData(false)}
        onApply={(d) => { setNodes(d.nodes); setEdges(d.edges); setLegend(d.legend); setSelected(null); setSelEdge(null); setShowData(false); }} />}
    </div>
  );
}

/* ============================ Режим: Связи ============================ */
function MapView(props) {
  const { nodes, edges, legend, legendMap, nodeMap, gm, selEdge, setSelEdge, selected, q, kindFilter,
    linking, linkFrom, view, svgRef, onNodeDown, onBgDown, onMove, onUp, onWheel, zoomBy, resetView,
    setEdgeType, toggleEdgeVis, delEdge, onLegend, addLegend, delLegend } = props;

  const shownNodes = (gm ? nodes : nodes.filter((n) => n.vis)).filter((n) => kindFilter.size === 0 || kindFilter.has(n.kind));
  const visIds = new Set(shownNodes.map((n) => n.id));
  const shownEdges = edges.filter((e) => (gm || (e.vis && nodeMap[e.from]?.vis && nodeMap[e.to]?.vis)) && visIds.has(e.from) && visIds.has(e.to));
  const sel = selEdge ? edges.find((e) => e.id === selEdge) : null;

  const pairKey = (e) => [e.from, e.to].slice().sort().join("__");
  const groups = {};
  shownEdges.forEach((e) => { (groups[pairKey(e)] || (groups[pairKey(e)] = [])).push(e.id); });
  const geom = (e) => {
    const [s1, s2] = [e.from, e.to].slice().sort();
    const a = nodeMap[s1], b = nodeMap[s2]; if (!a || !b) return null;
    const list = groups[pairKey(e)] || [e.id];
    const k = list.indexOf(e.id), n = list.length;
    const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const off = (k - (n - 1) / 2) * 34;
    const cx = (a.x + b.x) / 2 + nx * off, cy = (a.y + b.y) / 2 + ny * off;
    return { a, b, cx, cy, s1, s2, d: `M ${a.x} ${a.y} Q ${cx} ${cy} ${b.x} ${b.y}` };
  };
  const arrow = (e, g, color) => {
    const tgt = nodeMap[e.to]; if (!tgt) return null;
    let vx, vy;
    if (e.to === g.s2) { vx = g.b.x - g.cx; vy = g.b.y - g.cy; } else { vx = g.a.x - g.cx; vy = g.a.y - g.cy; }
    const len = Math.hypot(vx, vy) || 1; vx /= len; vy /= len;
    const px = -vy, py = vx;
    const tip = { x: tgt.x - vx * (R + 1), y: tgt.y - vy * (R + 1) };
    const base = { x: tip.x - vx * 10, y: tip.y - vy * 10 };
    return <polygon points={`${tip.x},${tip.y} ${base.x + px * 5.5},${base.y + py * 5.5} ${base.x - px * 5.5},${base.y - py * 5.5}`} fill={color} opacity={e.vis ? 0.95 : 0.3} />;
  };

  return (
    <div className="relative">
      <svg ref={svgRef} viewBox={`0 0 ${VBW} ${VBH}`} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp} onWheel={onWheel}
        style={{ width: "100%", display: "block", background: "radial-gradient(120% 90% at 50% 30%, var(--surf) 0%, var(--bg) 72%)", touchAction: "none" }}>
        <rect x="0" y="0" width={VBW} height={VBH} fill="transparent" onPointerDown={onBgDown} />
        <g transform={`translate(${view.x} ${view.y}) scale(${view.k})`}>
          {shownEdges.map((e) => {
            const g = geom(e); if (!g) return null;
            const lt = legendMap[e.type]; const color = lt?.color || "#888";
            const hidden = !e.vis; const isSel = selEdge === e.id;
            return (
              <g key={e.id}>
                {isSel && <path d={g.d} fill="none" stroke="#fff" strokeWidth="7" opacity="0.45" strokeLinecap="round" />}
                <path d={g.d} fill="none" stroke={color} strokeWidth={isSel ? 3.5 : 2.2} opacity={hidden ? 0.26 : 0.8} strokeDasharray={hidden ? "5 7" : undefined} strokeLinecap="round" />
                {lt?.directed && arrow(e, g, color)}
                {gm && !linking && <path d={g.d} fill="none" stroke="transparent" strokeWidth="15" style={{ cursor: "pointer" }} onClick={() => setSelEdge(e.id)} />}
              </g>
            );
          })}
          {shownNodes.map((n) => {
            const armed = linkFrom === n.id, here = selected === n.id;
            const hit = q && n.name.toLowerCase().includes(q);
            const col = KINDS[n.kind] || "#9aa0aa";
            const dim = gm && !n.vis;
            return (
              <g key={n.id} className="c-node" onPointerDown={(e) => onNodeDown(e, n.id)} style={{ opacity: dim ? 0.4 : (q && !hit ? 0.3 : 1) }}>
                {hit && <circle cx={n.x} cy={n.y} r={R + 9} fill="none" stroke="#fff" strokeWidth="2" opacity="0.8" />}
                {(armed || here) && <circle cx={n.x} cy={n.y} r={R + 6} fill="none" stroke={GOLD} strokeWidth="2" strokeDasharray={armed ? "4 4" : undefined} />}
                <circle cx={n.x} cy={n.y} r={R} fill={col} stroke="var(--bg)" strokeWidth="2.5" />
                <circle cx={n.x} cy={n.y} r={R} fill="none" stroke="var(--line)" strokeWidth="1" />
                {dim && <g><circle cx={n.x + R - 3} cy={n.y - R + 3} r="7" fill="var(--bg)" /><text x={n.x + R - 3} y={n.y - R + 6} textAnchor="middle" style={{ fontSize: 9, fill: "var(--muted)" }}>✕</text></g>}
                <text x={n.x} y={n.y + R + 13} textAnchor="middle" style={{ fontFamily: FONT_DISPLAY, fontSize: 13, fill: "var(--ink)" }}>{n.name}</text>
              </g>
            );
          })}
        </g>
      </svg>

      <div className="absolute left-4 top-4 flex flex-col gap-1">
        <button className="c-btn" style={{ padding: "6px" }} onClick={() => zoomBy(1.2)}><Plus size={14} /></button>
        <button className="c-btn" style={{ padding: "6px" }} onClick={() => zoomBy(1 / 1.2)}><Minus size={14} /></button>
        <button className="c-btn" style={{ padding: "6px" }} onClick={resetView}><Maximize2 size={14} /></button>
      </div>

      {linking && (
        <div className="absolute" style={{ top: 12, left: "50%", transform: "translateX(-50%)", background: "rgba(10,14,26,.92)", border: `1px solid ${GOLD}`, borderRadius: 12, padding: "8px 14px", color: GOLD, fontSize: 13 }}>
          {linkFrom ? `Из «${nodeMap[linkFrom]?.name}» → выбери второго (он — цель стрелки)` : "Новая связь: выбери первого"}
        </div>
      )}

      {gm && !linking && sel && (
        <div className="absolute" style={{ top: 12, left: "50%", transform: "translateX(-50%)", background: "rgba(10,14,26,.92)", border: "1px solid var(--surf2)", borderRadius: 12, padding: 12, backdropFilter: "blur(6px)", width: "min(360px, 92%)" }}>
          <div className="flex items-center justify-between mb-2">
            <div style={{ fontSize: 13, color: GOLD }}>{nodeMap[sel.from]?.name} → {nodeMap[sel.to]?.name}</div>
            <button onClick={() => setSelEdge(null)} style={{ background: "none", border: "none", color: "var(--ink)", cursor: "pointer" }}><X size={16} /></button>
          </div>
          <div className="flex flex-wrap gap-1.5 mb-2">
            {legend.map((t) => (
              <button key={t.id} onClick={() => setEdgeType(sel.id, t.id)} className="flex items-center gap-1"
                style={{ fontSize: 12, padding: "3px 8px", borderRadius: 16, cursor: "pointer", border: sel.type === t.id ? `1px solid ${t.color}` : "1px solid var(--line)", background: sel.type === t.id ? `${t.color}26` : "transparent", color: "var(--ink)" }}>
                <span style={{ width: 12, height: 3, borderRadius: 2, background: t.color, display: "inline-block" }} /> {t.label}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <button className="c-btn flex items-center gap-1" onClick={() => toggleEdgeVis(sel.id)}>{sel.vis ? <><Eye size={14} /> Видна игрокам</> : <><EyeOff size={14} /> Скрыта</>}</button>
            <button className="c-btn flex items-center gap-1" onClick={() => delEdge(sel.id)} style={{ color: "var(--red)" }}><Trash2 size={14} /> Убрать</button>
          </div>
        </div>
      )}

      <div className="absolute right-4 bottom-4" style={{ background: "rgba(10,14,26,.84)", border: "1px solid var(--surf2)", borderRadius: 12, padding: 11, backdropFilter: "blur(6px)", maxWidth: 320 }}>
        <div className="flex items-center gap-2 mb-1" style={{ color: GOLD, fontSize: 10.5, letterSpacing: ".5px", textTransform: "uppercase" }}>
          <Palette size={11} /> Связи
        </div>
        <div className="flex flex-wrap gap-x-2.5 gap-y-1">
          {legend.map((l) => (
            gm ? (
              <span key={l.id} className="flex items-center gap-1">
                <input type="color" value={l.color} onChange={(e) => onLegend(l.id, { color: e.target.value })} style={{ width: 16, height: 16, border: "none", background: "none", padding: 0, cursor: "pointer" }} />
                <input className="c-input" style={{ width: 78, padding: "1px 5px", fontSize: 11 }} value={l.label} onChange={(e) => onLegend(l.id, { label: e.target.value })} />
                <button onClick={() => onLegend(l.id, { directed: !l.directed })} title="Стрелка" style={{ background: "none", border: "none", cursor: "pointer", color: l.directed ? GOLD : "var(--faint)", fontSize: 13 }}>→</button>
                <button onClick={() => delLegend(l.id)} style={{ color: "var(--muted)", background: "none", border: "none", cursor: "pointer" }}><X size={12} /></button>
              </span>
            ) : (
              <span key={l.id} className="flex items-center gap-1"><span style={{ width: 14, height: 4, borderRadius: 2, background: l.color, display: "inline-block" }} /><span style={{ fontSize: 11, color: "var(--ink)" }}>{l.label}</span></span>
            )
          ))}
          {gm && <button className="c-btn flex items-center gap-1" style={{ padding: "2px 8px" }} onClick={addLegend}><Plus size={11} /></button>}
        </div>
      </div>
    </div>
  );
}

/* ============================ Режим: Сетка (без связей) ============================ */
function GridView({ nodes, gm, selected, q, kindFilter, patchNode, onSelect }) {
  const svgRef = useRef(null);
  const dragRef = useRef(null);
  const cx = VBW / 2, cy = VBH / 2, hw = VBW / 2 - 110, hh = VBH / 2 - 80;
  const shown = (gm ? nodes : nodes.filter((n) => n.vis)).filter((n) => kindFilter.size === 0 || kindFilter.has(n.kind));
  const px = (ax) => cx + (ax || 0) * hw;
  const py = (ay) => cy - (ay || 0) * hh;
  const svgPoint = (evt) => { const p = svgRef.current.createSVGPoint(); p.x = evt.clientX; p.y = evt.clientY; return p.matrixTransform(svgRef.current.getScreenCTM().inverse()); };
  const clamp = (v) => Math.max(-1, Math.min(1, v));
  const onDown = (evt, id) => { evt.stopPropagation(); dragRef.current = { id, moved: false }; };
  const onMove = (evt) => { const d = dragRef.current; if (!d || !gm) return; const p = svgPoint(evt); d.moved = true; patchNode(d.id, { ax: +clamp((p.x - cx) / hw).toFixed(2), ay: +clamp((cy - p.y) / hh).toFixed(2) }); };
  const onUp = () => { const d = dragRef.current; if (d && !d.moved) onSelect(d.id); dragRef.current = null; };

  return (
    <div className="relative">
      <svg ref={svgRef} viewBox={`0 0 ${VBW} ${VBH}`} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
        style={{ width: "100%", display: "block", background: "radial-gradient(120% 90% at 50% 40%, var(--surf) 0%, var(--bg) 72%)", touchAction: "none" }}>
        {/* оси */}
        <line x1={cx - hw} y1={cy} x2={cx + hw} y2={cy} stroke="var(--line)" strokeWidth="1.5" />
        <line x1={cx} y1={cy - hh} x2={cx} y2={cy + hh} stroke="var(--line)" strokeWidth="1.5" />
        <rect x={cx - hw} y={cy - hh} width={hw * 2} height={hh * 2} fill="none" stroke="var(--line-soft)" />
        <text x={cx} y={cy - hh - 12} textAnchor="middle" style={{ fontSize: 13, fill: "#d0455a", letterSpacing: ".5px" }}>ЗА РАГНАРЁК</text>
        <text x={cx} y={cy + hh + 22} textAnchor="middle" style={{ fontSize: 13, fill: "#6bbf59", letterSpacing: ".5px" }}>ПРОТИВ</text>
        <text x={cx - hw - 8} y={cy - 6} textAnchor="end" style={{ fontSize: 13, fill: "#ef8b3a", letterSpacing: ".5px" }}>ХАОС</text>
        <text x={cx + hw + 8} y={cy - 6} textAnchor="start" style={{ fontSize: 13, fill: "#5aa9e6", letterSpacing: ".5px" }}>ПОРЯДОК</text>
        {/* точки */}
        {shown.map((n) => {
          const here = selected === n.id;
          const hit = q && n.name.toLowerCase().includes(q);
          const col = KINDS[n.kind] || "#9aa0aa";
          const dim = gm && !n.vis;
          return (
            <g key={n.id} className="c-node" onPointerDown={(e) => onDown(e, n.id)} style={{ opacity: dim ? 0.4 : (q && !hit ? 0.3 : 1) }}>
              {hit && <circle cx={px(n.ax)} cy={py(n.ay)} r="15" fill="none" stroke="#fff" strokeWidth="2" />}
              {here && <circle cx={px(n.ax)} cy={py(n.ay)} r="13" fill="none" stroke={GOLD} strokeWidth="2" />}
              <circle cx={px(n.ax)} cy={py(n.ay)} r="7" fill={col} stroke="var(--bg)" strokeWidth="1.5" />
              <text x={px(n.ax)} y={py(n.ay) - 11} textAnchor="middle" style={{ fontSize: 11, fill: "var(--ink)" }}>{n.name}</text>
            </g>
          );
        })}
      </svg>
      <div className="absolute right-4 bottom-4" style={{ fontSize: 12, color: "var(--muted)", maxWidth: 230, textAlign: "right" }}>
        Только расстановка, без связей. {gm ? "Тащи точку — задать координаты. Клик — карточка." : "Клик — карточка."}
      </div>
    </div>
  );
}

/* ============================ Сайдбар персонажа ============================ */
function NodeDrawer({ node, gm, edges, nodeMap, legendMap, onClose, patchNode, delNode, toggleEdgeVis, delEdge, ptags, addPlayerTag, delPlayerTag }) {
  const [tagInput, setTagInput] = useState("");
  const col = KINDS[node.kind] || "#9aa0aa";
  const rels = edges.filter((e) => (e.from === node.id || e.to === node.id) && (gm || e.vis));
  return (
    <div className="c-slide" style={{ position: "fixed", top: 64, right: 0, bottom: 0, width: "min(360px, 92vw)", zIndex: 30,
      background: `linear-gradient(180deg, ${col}1f 0%, var(--surf) 22%, var(--bg) 100%)`, borderLeft: "1px solid var(--line)",
      boxShadow: "-18px 0 40px rgba(0,0,0,.45)", overflowY: "auto", padding: 16 }}>
      <div className="flex items-start justify-between gap-2 mb-3">
        <div className="flex items-center gap-3" style={{ flex: 1 }}>
          <span style={{ width: 22, height: 22, borderRadius: "50%", background: col, boxShadow: `0 0 20px ${col}`, flexShrink: 0 }} />
          {gm ? (
            <input className="c-input" value={node.name} onChange={(e) => patchNode(node.id, { name: e.target.value })} style={{ fontFamily: FONT_DISPLAY, fontSize: 22, color: GOLD, background: "none", border: "none", padding: 0, width: "100%" }} />
          ) : <span style={{ fontFamily: FONT_DISPLAY, fontSize: 22, color: GOLD }}>{node.name}</span>}
        </div>
        <button onClick={onClose} className="c-btn" style={{ padding: "4px 8px" }}><X size={16} /></button>
      </div>

      {gm ? (
        <div className="flex items-center gap-2 mb-3">
          <select className="c-input" value={node.kind} onChange={(e) => patchNode(node.id, { kind: e.target.value })} style={{ flex: 1 }}>
            {KIND_LIST.map((k) => <option key={k} value={k} style={{ color: "#000" }}>{k}</option>)}
          </select>
          <button className="c-btn flex items-center gap-1" onClick={() => patchNode(node.id, { vis: !node.vis })} title="Виден игрокам">
            {node.vis ? <><Eye size={14} /> виден</> : <><EyeOff size={14} /> скрыт</>}
          </button>
        </div>
      ) : (
        <span style={{ display: "inline-block", marginBottom: 12, fontSize: 11, color: "var(--bg)", background: col, borderRadius: 12, padding: "2px 10px" }}>{node.kind}</span>
      )}

      <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 4 }}>Кто это</div>
      {gm ? (
        <textarea className="c-input" value={node.role} onChange={(e) => patchNode(node.id, { role: e.target.value })} placeholder="кто, откуда, чем известен" style={{ width: "100%", height: 56, resize: "vertical", marginBottom: 14 }} />
      ) : <div style={{ fontSize: 14, marginBottom: 14, color: "var(--ink)", lineHeight: 1.4 }}>{node.role || "—"}</div>}

      {/* координаты */}
      {gm && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 6 }}>Координаты</div>
          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 2 }}>Хаос ↔ Порядок: <span style={{ color: "var(--ink)" }}>{(node.ax || 0).toFixed(2)}</span></div>
          <input type="range" min="-100" max="100" value={(node.ax || 0) * 100} onChange={(e) => patchNode(node.id, { ax: +(e.target.value / 100).toFixed(2) })} style={{ width: "100%" }} />
          <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 4, marginBottom: 2 }}>Против ↔ За Рагнарёк: <span style={{ color: "var(--ink)" }}>{(node.ay || 0).toFixed(2)}</span></div>
          <input type="range" min="-100" max="100" value={(node.ay || 0) * 100} onChange={(e) => patchNode(node.id, { ay: +(e.target.value / 100).toFixed(2) })} style={{ width: "100%" }} />
        </div>
      )}

      <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 6 }}>Связи ({rels.length})</div>
      <div className="grid gap-2" style={{ gridTemplateColumns: "1fr", marginBottom: 14 }}>
        {rels.map((e) => {
          const lt = legendMap[e.type] || {};
          const outgoing = e.from === node.id;
          const other = nodeMap[outgoing ? e.to : e.from];
          const dirMark = lt.directed ? (outgoing ? "→" : "←") : "·";
          return (
            <div key={e.id} className="flex items-center gap-2" style={{ background: "var(--surf)", border: "1px solid var(--surf2)", borderRadius: 10, padding: "6px 10px", opacity: gm && !e.vis ? 0.55 : 1 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: lt.color || "#888", flexShrink: 0 }} />
              <div style={{ flex: 1, fontSize: 13 }}><span style={{ color: "var(--muted)" }}>{lt.label || e.type}</span> <span style={{ color: "var(--ink)" }}>{dirMark} {other?.name || "?"}</span></div>
              {gm && (
                <>
                  <button onClick={() => toggleEdgeVis(e.id)} title={e.vis ? "Видна" : "Скрыта"} style={{ background: "none", border: "none", cursor: "pointer", color: e.vis ? "#6bbf59" : "var(--muted)" }}>{e.vis ? <Eye size={15} /> : <EyeOff size={15} />}</button>
                  <button onClick={() => delEdge(e.id)} title="Убрать" style={{ background: "none", border: "none", cursor: "pointer", color: "var(--muted)" }}><Trash2 size={14} /></button>
                </>
              )}
            </div>
          );
        })}
        {rels.length === 0 && <div style={{ fontSize: 13, color: "var(--muted)" }}>пока ни с кем не связан</div>}
      </div>

      <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 6 }}>Теги игроков</div>
      <div className="flex flex-wrap gap-1.5" style={{ marginBottom: 8 }}>
        {(ptags || []).map((t, i) => (
          <span key={i} className="flex items-center gap-1" title="тег игрока"
            style={{ fontSize: 11, background: "var(--surf2)", border: "1px dashed var(--steel-soft)", color: "var(--steel)", borderRadius: 20, padding: "2px 9px" }}>
            {t}
            <button onClick={() => delPlayerTag(node.id, i)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--steel)", lineHeight: 1 }}><X size={11} /></button>
          </span>
        ))}
        {(ptags || []).length === 0 && <span style={{ fontSize: 11, color: "var(--muted)" }}>пока нет тегов</span>}
      </div>
      <div className="flex gap-1.5" style={{ marginBottom: 14 }}>
        <input className="c-input" style={{ flex: 1, fontSize: 12, padding: "4px 8px" }} placeholder={gm ? "+ тег" : "+ свой тег"}
          value={tagInput} onChange={(e) => setTagInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { addPlayerTag(node.id, tagInput); setTagInput(""); } }} />
        <button className="c-btn" style={{ padding: "4px 10px" }} onClick={() => { addPlayerTag(node.id, tagInput); setTagInput(""); }}><Plus size={13} /></button>
      </div>

      {gm && (
        <>
          <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 4 }}>Заметки ведущей</div>
          <textarea className="c-input" value={node.notes} onChange={(e) => patchNode(node.id, { notes: e.target.value })} placeholder="тайны, наследие, зацепки…" style={{ width: "100%", height: 60, resize: "vertical", marginBottom: 14 }} />
          <button className="c-btn flex items-center gap-1" onClick={() => delNode(node.id)} style={{ color: "var(--red)" }}><Trash2 size={14} /> Удалить персонажа</button>
        </>
      )}
    </div>
  );
}

/* ============================ Данные ============================ */
function DataModal({ nodes, edges, legend, onClose, onApply }) {
  const [text, setText] = useState(JSON.stringify({ nodes, edges, legend }, null, 2));
  const [err, setErr] = useState("");
  const apply = () => { try { const d = JSON.parse(text); if (!d.nodes || !d.edges || !d.legend) throw new Error("нужны поля nodes, edges, legend"); setErr(""); onApply(d); } catch (e) { setErr("Не разобрал JSON: " + e.message); } };
  return (
    <div className="fixed inset-0 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,.6)", zIndex: 50 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "var(--surf)", border: "1px solid var(--line)", borderRadius: 16, padding: 18, width: "100%", maxWidth: 640 }}>
        <div className="flex items-center justify-between mb-3">
          <div style={{ fontFamily: FONT_DISPLAY, fontSize: 18, color: GOLD }}>Данные персонажей</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--ink)", cursor: "pointer" }}><X size={18} /></button>
        </div>
        <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>Скопируй, чтобы сохранить. Вставь свой JSON и нажми «Применить».</div>
        <textarea value={text} onChange={(e) => setText(e.target.value)} spellCheck={false}
          style={{ width: "100%", height: 280, background: "var(--bg)", color: "var(--ink)", border: "1px solid var(--line)", borderRadius: 10, padding: 12, fontFamily: "ui-monospace,monospace", fontSize: 12 }} />
        {err && <div style={{ color: "var(--red)", fontSize: 12, marginTop: 6 }}>{err}</div>}
        <div className="flex justify-end gap-2 mt-3">
          <button className="c-btn" onClick={onClose}>Закрыть</button>
          <button onClick={apply} style={{ background: GOLD, color: INK, border: "none", borderRadius: 8, padding: "6px 16px", fontWeight: 600, cursor: "pointer" }}>Применить</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Characters />);
</script>
<script src="app-shell.js" defer></script>

<script>
/* у игрока прячем переключатель «Ведущая | Игрок» — роль задаётся ссылкой.
   Ждём, пока React дорисует кнопки (наблюдатель), затем прячем и отключаемся. */
(function(){
  var role = new URLSearchParams(location.search).get("role")==="gm" ? "gm" : "player";
  if (role === "gm") return;
  function tryHide(){
    var hit = false;
    document.querySelectorAll("button").forEach(function(b){
      if (b.textContent.trim()==="Ведущая" && b.parentElement){ b.parentElement.style.display="none"; hit = true; }
    });
    return hit;
  }
  if (tryHide()) return;
  var obs = new MutationObserver(function(){ if (tryHide()) obs.disconnect(); });
  obs.observe(document.documentElement, { childList:true, subtree:true });
  setTimeout(function(){ obs.disconnect(); }, 5000);
})();
</script>
