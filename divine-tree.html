const _DT_HAS_FB = !!window._fbdb;

}
function CloudChip({ status, campaign, onBind }) {
  const base = { fontSize: 11.5, letterSpacing: ".04em", borderRadius: 999, padding: "5px 11px", border: "1px solid var(--line)", whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 6 };

  if (!campaign) return <button onClick={onBind} style={{ ...base, color: "var(--bronze)", borderColor: "var(--line-warm)", cursor: "pointer", background: "none" }}>привязать кампанию</button>;
  const map = {
    loading: { t: "загрузка…", c: "var(--muted)" },
    cloud:   { t: "облако · " + campaign, c: "var(--steel)" },
    saving:  { t: "сохранение…", c: "var(--muted)" },
    saved:   { t: "сохранено ✓", c: "var(--steel)" },
    error:   { t: "нет связи", c: "var(--red)" },
  };
  const s = map[status] || map.cloud;
  return <button onClick={onBind} title="сменить код кампании" style={{ ...base, color: s.c, cursor: "pointer", background: "none" }}>{s.t}</button>;
}

function DivineTree() {
  const [nodes, setNodes] = useState(initialNodes);
  const __ROLE__ = (new URLSearchParams(location.search).get("role") === "gm") ? "gm" : "player";
  const [gm, _setGm] = useState(__ROLE__ === "gm");
  const setGm = (v) => { if (__ROLE__ === "gm") _setGm(v); };
  const [selected, setSelected] = useState(null);
  const [playerAt, setPlayerAt] = useState("r");
  const [released, setReleased] = useState(false); // ведущая выдала развилку?

  const [linkMode, setLinkMode] = useState(false);   // режим ручного соединения узлов

  // --- облако: полное древо хранит и пишет только ведущая (игрок этот документ не читает) ---
  const [campaign, setCampaign] = useState(_dtReadCampaign);
  const [status, setStatus] = useState(_DT_HAS_FB && _dtReadCampaign() ? "loading" : "local");
  const _skip = useRef(true);
  const _ready = useRef(false);
  useEffect(() => {
    if (!_DT_HAS_FB || !campaign) { setStatus(_DT_HAS_FB ? "cloud" : "local"); return; }
    let unsub = null, alive = true; setStatus("loading");
    (async () => {
      try { await window._fbauth.signInAnonymously(); } catch (e) { console.error("auth:", e); }
      const ref = window._fbdb.collection("campaigns").doc(campaign).collection("boards").doc("divineTree");
      try {
        const snap = await ref.get();
        if (alive && snap.exists && Array.isArray(snap.data().nodes)) { _skip.current = true; setNodes(snap.data().nodes); }
        else { try { await ref.set({ nodes: initialNodes, updatedAt: Date.now() }); } catch (e) { console.error("seed:", e); } }
      } catch (e) { console.error("load:", e); if (alive) setStatus("error"); }
      _ready.current = true; if (alive) setStatus("cloud");
      unsub = ref.onSnapshot((snap) => { if (!snap.exists || snap.metadata.hasPendingWrites) return; if (Array.isArray(snap.data().nodes)) { _skip.current = true; setNodes(snap.data().nodes); } }, (e) => console.error("snapshot:", e));
    })();
    return () => { alive = false; if (unsub) unsub(); };
  }, [campaign]);
  useEffect(() => {
    if (!_DT_HAS_FB || !campaign) return;
    if (!_ready.current) return;
    if (_skip.current) { _skip.current = false; return; }
    setStatus("saving");
    const t = setTimeout(async () => {
      try { await window._fbdb.collection("campaigns").doc(campaign).collection("boards").doc("divineTree").set({ nodes, updatedAt: Date.now() }, { merge: true }); setStatus("saved"); setTimeout(() => setStatus("cloud"), 1200); }
      catch (e) { console.error("save:", e); setStatus("error"); }
    }, 700);
    return () => clearTimeout(t);
  }, [nodes, campaign]);
  const bind = () => { const v = window.prompt("Код кампании (тот же, что у карты героя):", campaign || ""); if (v && v.trim()) { const c = v.trim(); try { localStorage.setItem("ragnarok-board-campaign", c); localStorage.setItem("ragnarok-campaign", c); } catch (e) {} _ready.current = false; _skip.current = true; setCampaign(c); } };
  const reseedTree = async () => {

    _skip.current = false;

    }

      const ref = window._fbdb.collection("campaigns").doc(campaign).collection("characters");

    })();

  };

  /* zoom / pan / drag */
  const svgPoint = (evt) => {
    const p = svgRef.current.createSVGPoint(); p.x = evt.clientX; p.y = evt.clientY;
    return p.matrixTransform(svgRef.current.getScreenCTM().inverse());
  };
  const toContent = (q) => ({ x: (q.x - view.x) / view.k, y: (q.y - view.y) / view.k });
  const onDown = (evt, id) => {
    evt.stopPropagation();
    if (linkMode) {
      setLinkSrc((s) => { if (!s) return id; if (s === id) return null; toggleLink(s, id); return null; });
      return;
    }
    const q = toContent(svgPoint(evt)); const n = nodeMap[id]; dragRef.current = { id, ox: n.x - q.x, oy: n.y - q.y, moved: false };
  };
  const onBgDown = (evt) => { if (linkMode) setLinkSrc(null); const sp = svgPoint(evt); panRef.current = { sx: sp.x, sy: sp.y }; };
  const onMove = (evt) => {
    if (dragRef.current) { if (!gm) return; const d = dragRef.current; const q = toContent(svgPoint(evt)); d.moved = true; patchNode(d.id, { x: Math.round(q.x + d.ox), y: Math.round(q.y + d.oy) }); return; }
    if (panRef.current) { const sp = svgPoint(evt); const dx = sp.x - panRef.current.sx, dy = sp.y - panRef.current.sy; panRef.current = { sx: sp.x, sy: sp.y }; setView((v) => ({ ...v, x: v.x + dx, y: v.y + dy })); }
  };
  const onUp = () => { const d = dragRef.current; if (d && !d.moved) setSelected(d.id); dragRef.current = null; panRef.current = null; };
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const zoomAt = (sx, sy, f) => setView((v) => { const k2 = clamp(v.k * f, 0.3, 3); return { k: k2, x: sx - ((sx - v.x) / v.k) * k2, y: sy - ((sy - v.y) / v.k) * k2 }; });
  const onWheel = (evt) => { if (evt.cancelable) evt.preventDefault(); const sp = svgPoint(evt); zoomAt(sp.x, sp.y, evt.deltaY < 0 ? 1.12 : 1 / 1.12); };
  const zoomBy = (f) => zoomAt(VBW / 2, VBH / 2, f);
  const resetView = () => setView({ x: 0, y: 0, k: 1 });

  /* плуг развилки */
  const playerNode = nodeMap[playerAt] || nodeMap["r"];
  const playerHasNext = playerNode.children.length > 0;
  const issueFork = () => setReleased(true);
  const retractFork = () => setReleased(false);
  const playerPick = (childId) => { setPlayerAt(childId); setReleased(false); };
  const resetPlayer = () => { setPlayerAt("r"); setReleased(false); };

  return (
    <div style={{ fontFamily: FONT_UI, background: INK, color: "var(--ink)", minHeight: "100%" }} className="w-full">
      <style>{`
        @keyframes tSlide { from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
        .t-slide{ animation:tSlide .3s ease-out both; }
        .t-node{ cursor:${linkMode ? "crosshair" : (gm ? "grab" : "default")}; }
        .t-btn{ border:1px solid var(--line); border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; background:var(--surf); color:var(--ink); }
        .t-btn:hover{ background:var(--surf2); }
        .t-input{ background:var(--inset); border:1px solid var(--line); border-radius:8px; color:var(--ink); padding:6px 10px; outline:none; font-size:13px; }
        .t-input:focus{ border-color:${GOLD}; }
        @media (prefers-reduced-motion: reduce){ .t-slide{animation:none} }
      `}</style>

      <header className="flex items-center justify-between px-5 py-4" style={{ borderBottom: "1px solid var(--line-soft)" }}>
        <div>
          <div style={{ fontFamily: FONT_DISPLAY, fontSize: 22, color: GOLD }}>Древо наследий</div>
          <div style={{ fontSize: 12, color: "var(--muted)" }}>9 шагов · живые и фейковые развилки · бог скрыт</div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <CloudChip status={status} campaign={campaign} onBind={bind} />
          <div className="flex rounded-lg overflow-hidden" style={{ border: "1px solid var(--line)" }}>
            {[["gm", "Ведущая"], ["player", "Игрок"]].map(([v, label]) => {
              const active = (gm ? "gm" : "player") === v;
              return <button key={v} onClick={() => { setGm(v === "gm"); setSelected(null); }}
                style={{ background: active ? GOLD : "transparent", color: active ? INK : "var(--ink)", padding: "6px 14px", fontSize: 13, fontWeight: 600 }}>{label}</button>;
            })}
          </div>
          {gm && <button className="t-btn flex items-center gap-1" onClick={() => { setLinkMode((m) => !m); setLinkSrc(null); setSelected(null); }} style={linkMode ? { borderColor: "#38bdf8", color: "#38bdf8", background: "rgba(56,189,248,.12)" } : undefined}><Link2 size={14} /> {linkMode ? "Соединяю…" : "Соединить"}</button>}
          {gm && <button className="t-btn flex items-center gap-1" onClick={reseedTree} title="перезаписать древо встроенной 9-шаговой раскладкой"><RotateCcw size={14} /> Пересобрать</button>}
          {gm && <button className="t-btn flex items-center gap-1" onClick={() => setShowData(true)}><Database size={14} /> Данные</button>}
        </div>
      </header>

      {gm ? (
        <GMView nodes={nodes} nodeMap={nodeMap} selected={selected} svgRef={svgRef} view={view} onDown={onDown} onMove={onMove} onUp={onUp} onWheel={onWheel} onBgDown={onBgDown}
          collapsed={collapsed} toggleCollapse={toggleCollapse} zoomBy={zoomBy} resetView={resetView}
          linkMode={linkMode} linkSrc={linkSrc}
          playerNode={playerNode} released={released} playerHasNext={playerHasNext}
          issueFork={issueFork} retractFork={retractFork} resetPlayer={resetPlayer} players={players} />
      ) : (
        <PlayerCard nodes={nodes} nodeMap={nodeMap} at={playerAt} released={released} onPick={playerPick} />
      )}

      {gm && current && (
        <NodeDrawer node={current} nodeMap={nodeMap} onClose={() => setSelected(null)} patchNode={patchNode} addChild={addChild} delNode={delNode} />
      )}

      {showData && <DataModal nodes={nodes} onClose={() => setShowData(false)} onApply={(d) => { setNodes(d.nodes); setSelected(null); setShowData(false); }} />}
      {gm && window._fbdb && <IssuePanel node={current} nodeMap={nodeMap} campaign={campaign} players={players} onBind={bind} />}
    </div>
  );
}

/* ============================ Мастерский вид ============================ */
function GMView({ nodes, nodeMap, selected, svgRef, view, onDown, onMove, onUp, onWheel, onBgDown, collapsed, toggleCollapse, zoomBy, resetView, playerNode, released, playerHasNext, issueFork, retractFork, resetPlayer, players, linkMode, linkSrc }) {
  const vis = new Set();
  const walk = (id) => { if (vis.has(id)) return; vis.add(id); if (!collapsed.has(id)) (nodeMap[id]?.children || []).forEach(walk); };
  walk("r");
  const visNodes = nodes.filter((n) => vis.has(n.id));
  const edges = [];
  visNodes.forEach((n) => { if (!collapsed.has(n.id)) n.children.forEach((c) => { if (vis.has(c) && nodeMap[c]) edges.push([n, nodeMap[c]]); }); });
  const countDesc = (id) => (nodeMap[id]?.children || []).reduce((acc, c) => acc + 1 + countDesc(c), 0);
  return (
    <div className="relative">
      <svg ref={svgRef} viewBox="0 0 1770 1120" onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp} onWheel={onWheel}
        style={{ width: "100%", display: "block", background: "radial-gradient(120% 100% at 20% 40%, var(--surf) 0%, var(--bg) 75%)", touchAction: "none" }}>
        <rect x="0" y="0" width="1770" height="1120" fill="transparent" onPointerDown={onBgDown} />
        <g transform={`translate(${view.x} ${view.y}) scale(${view.k})`}>
          {edges.map(([a, b], i) => { const my = (a.y + b.y) / 2; return <path key={i} d={`M ${a.x} ${a.y - R} C ${a.x} ${my} ${b.x} ${my} ${b.x} ${b.y + R}`} fill="none" stroke="var(--line)" strokeWidth="2" />; })}
          {visNodes.map((n) => {
            const col = TIERS[n.tier] || "#888";
            const isFork = n.children.length > 1;
            const hasKids = n.children.length > 0;
            const isCol = collapsed.has(n.id);
            const onPath = n.id === playerNode.id;
            return (
              <g key={n.id} className="t-node" onPointerDown={(e) => onDown(e, n.id)}>
                {onPath && <circle cx={n.x} cy={n.y} r={R + 10} fill="none" stroke="#6bbf59" strokeWidth="2" strokeDasharray="3 3" />}
                {selected === n.id && <circle cx={n.x} cy={n.y} r={R + 6} fill="none" stroke={GOLD} strokeWidth="2" />}
                {linkSrc === n.id && <circle cx={n.x} cy={n.y} r={R + 9} fill="none" stroke="#38bdf8" strokeWidth="2.5" strokeDasharray="4 3" />}
                {isCol && hasKids && <circle cx={n.x} cy={n.y} r={R + 5} fill="none" stroke="var(--muted)" strokeWidth="1.5" strokeDasharray="3 3" />}
                <circle cx={n.x} cy={n.y} r={R} fill={col} stroke="var(--bg)" strokeWidth="2.5" />
                {n.bon && <circle cx={n.x} cy={n.y} r="7" fill={BONS[n.bon.type] || "#fff"} stroke="var(--bg)" strokeWidth="1.5" />}
                {isFork && (
                  <g>
                    <circle cx={n.x + R - 4} cy={n.y - R + 4} r="9" fill="var(--bg)" stroke={n.fork === "fake" ? "var(--muted)" : GOLD} strokeWidth="1.5" />
                    <text x={n.x + R - 4} y={n.y - R + 8} textAnchor="middle" style={{ fontSize: 11, fill: n.fork === "fake" ? "var(--muted)" : GOLD }}>{n.fork === "fake" ? "↺" : "✦"}</text>
                  </g>
                )}
                {hasKids && (
                  <g onPointerDown={(e) => { e.stopPropagation(); toggleCollapse(n.id); }} style={{ cursor: "pointer" }}>
                    <circle cx={n.x - R + 4} cy={n.y - R + 4} r="9" fill="var(--bg)" stroke="var(--ink)" strokeWidth="1.5" />
                    <text x={n.x - R + 4} y={n.y - R + 8} textAnchor="middle" style={{ fontSize: 12, fill: "var(--ink)" }}>{isCol ? "+" : "–"}</text>
                  </g>
                )}
                <text x={n.x} y={n.y + R + 14} textAnchor="middle" style={{ fontSize: 12, fill: "var(--ink)" }}>{n.title}</text>
                {isCol && hasKids
                  ? <text x={n.x} y={n.y + R + 28} textAnchor="middle" style={{ fontSize: 10, fill: "var(--muted)" }}>{`свёрнуто · +${countDesc(n.id)}`}</text>
                  : (n.dest && <text x={n.x} y={n.y + R + 28} textAnchor="middle" style={{ fontSize: 10, fill: "var(--muted)", fontStyle: "italic" }}>{n.dest}</text>)}
              </g>
            );
          })}
          {(players || []).map((p, idx) => {
            let cur = p.treeNode && nodeMap[p.treeNode] ? p.treeNode : "r";
            let guard = 0;
            while (cur && !vis.has(cur) && guard++ < 40) { const par = nodes.find((n) => n.children.includes(cur)); cur = par ? par.id : "r"; if (cur === "r") break; }
            const nn = nodeMap[cur] || nodeMap["r"]; if (!nn) return null;
            const waiting = p.nextFork && p.nextFork.options && typeof p.nextFork.chosen === "number";
            const issued = p.nextFork && p.nextFork.options && p.nextFork.chosen == null;
            const ring = waiting ? "#6bbf59" : (issued ? GOLD : "var(--steel)");
            const mx = nn.x - R - 16, my = nn.y - idx * 30;
            return (
              <g key={"pl" + p.id} style={{ pointerEvents: "none" }}>
                <line x1={nn.x} y1={nn.y} x2={mx} y2={my} stroke={ring} strokeWidth="1.5" strokeDasharray="2 3" opacity="0.7" />
                <circle cx={mx} cy={my} r="12" fill="var(--bg)" stroke={ring} strokeWidth="2.5" />
                <text x={mx} y={my + 4} textAnchor="middle" style={{ fontSize: 12, fill: "var(--ink)", fontWeight: 600 }}>{(p.name || "?").trim().charAt(0).toUpperCase() || "?"}</text>
                <text x={mx} y={my - 16} textAnchor="middle" style={{ fontSize: 10, fill: "var(--muted)" }}>{p.name || "герой"}{waiting ? " · выбрал" : ""}</text>
              </g>
            );
          })}
        </g>
      </svg>
      <div className="absolute left-4 top-4 flex flex-col gap-1">
        <button className="t-btn" style={{ padding: "6px" }} onClick={() => zoomBy(1.2)}><Plus size={14} /></button>
        <button className="t-btn" style={{ padding: "6px" }} onClick={() => zoomBy(1 / 1.2)}><Minus size={14} /></button>
        <button className="t-btn" style={{ padding: "6px" }} onClick={resetView}><Maximize2 size={14} /></button>
      </div>
      {linkMode && (
        <div className="absolute" style={{ top: 14, left: "50%", transform: "translateX(-50%)", background: "rgba(56,189,248,.14)", border: "1px solid #38bdf8", color: "#bfe7fb", borderRadius: 999, padding: "6px 16px", fontSize: 12.5, backdropFilter: "blur(4px)", whiteSpace: "nowrap" }}>
          {linkSrc ? "Кликни второй узел — соединю с ним (повторно — разъединю). Фон — отмена." : "Режим соединения: кликни родителя, затем ребёнка. Петли запрещены."}
        </div>
      )}

      
      {/* легенда */}
      <div className="absolute left-4 bottom-4" style={{ background: "rgba(10,14,26,.84)", border: "1px solid var(--surf2)", borderRadius: 12, padding: 12, fontSize: 12, backdropFilter: "blur(6px)" }}>
        <div className="flex flex-wrap gap-3 mb-2">
          {TIER_LIST.map((t) => <span key={t} className="flex items-center gap-1"><span style={{ width: 10, height: 10, borderRadius: "50%", background: TIERS[t], display: "inline-block" }} />{t}</span>)}
        </div>
        <div className="flex flex-wrap gap-3" style={{ color: "var(--ink)" }}>
          <span style={{ color: GOLD }}>✦ живая</span>
          <span style={{ color: "var(--muted)" }}>↺ фейк (сходится назад)</span>
          {BON_LIST.map((b) => <span key={b} className="flex items-center gap-1"><span style={{ width: 8, height: 8, borderRadius: "50%", background: BONS[b], display: "inline-block" }} />{b}</span>)}
        </div>
      </div>

      <div className="absolute right-4 bottom-4" style={{ fontSize: 12, color: "var(--muted)", maxWidth: 200, textAlign: "right" }}>
        Снизу вверх. Колесо или ±/⤢ — зум, тащи пустоту — двигать. +/− на узле — свернуть ветку. Тащи узел — переставить, клик — правка.
      </div>
    </div>
  );
}

/* ============================ Карточка игрока (гейт ведущей) ============================ */
function PlayerCard({ nodes, nodeMap, at, released, onPick }) {
  const node = nodeMap[at] || nodeMap["r"];
  const parentOf = (id) => nodes.find((n) => n.children.includes(id));
  const path = []; let cur = node;
  while (cur && cur.id !== "r") { path.unshift(cur); cur = parentOf(cur.id); }
  const options = node.children.map((c) => nodeMap[c]).filter(Boolean);

  return (
    <div className="t-slide" style={{ maxWidth: 560, margin: "0 auto", padding: "24px 18px" }}>
      <div className="flex flex-wrap items-center gap-1 mb-5" style={{ fontSize: 12, color: "var(--muted)" }}>
        <span>Смертный</span>
        {path.map((p) => <span key={p.id} className="flex items-center gap-1"><span>→</span><span style={{ color: BONS[p.bon?.type] || "var(--ink)" }}>{p.title}</span></span>)}
      </div>

      {node.bon && (
        <div className="mb-6" style={{ background: "var(--surf)", border: `1px solid ${BONS[node.bon.type]}55`, borderRadius: 16, padding: 18 }}>
          <div className="flex items-center gap-2 mb-1">
            <span style={{ width: 10, height: 10, borderRadius: "50%", background: BONS[node.bon.type], display: "inline-block" }} />
            <span style={{ fontSize: 12, color: BONS[node.bon.type], textTransform: "uppercase", letterSpacing: ".5px" }}>{node.bon.type}</span>
          </div>
          <div style={{ fontFamily: FONT_DISPLAY, fontSize: 20, color: GOLD, marginBottom: 4 }}>{node.title}</div>
          <div style={{ fontSize: 14, color: "var(--ink)" }}>{node.bon.effect || "—"}</div>
        </div>
      )}

      {options.length === 0 ? (
        <div style={{ color: "var(--muted)", fontSize: 14 }}>Тропа здесь обрывается — ведущая ещё не наполнила этот узел.</div>
      ) : !released ? (
        <div style={{ background: "var(--surf2)", border: "1px dashed var(--surf2)", borderRadius: 14, padding: 18, textAlign: "center" }}>
          <Lock size={18} style={{ opacity: 0.6, marginBottom: 6 }} />
          <div style={{ fontSize: 14, color: "var(--muted)" }}>Жди пробуждения.</div>
          <div style={{ fontSize: 12, color: "var(--faint)", marginTop: 4 }}>Ведущая откроет следующую развилку, когда придёт срок.</div>
        </div>
      ) : (
        <>
          <div style={{ fontSize: 12, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 10 }}>
            {options.length > 1 ? "Развилка — сделай выбор" : "Шаг открыт"}
          </div>
          <div className="grid gap-3" style={{ gridTemplateColumns: "1fr" }}>
            {options.map((o) => (
              <button key={o.id} onClick={() => onPick(o.id)} className="text-left"
                style={{ background: "var(--surf)", border: "1px solid var(--line)", borderRadius: 14, padding: 14, cursor: "pointer", color: "var(--ink)" }}>
                <div className="flex items-center gap-2 mb-1">
                  {o.bon && <span style={{ width: 8, height: 8, borderRadius: "50%", background: BONS[o.bon.type], display: "inline-block" }} />}
                  <span style={{ fontWeight: 600 }}>{o.title}</span>
                </div>
                {o.bon && <div style={{ fontSize: 13, color: "var(--muted)" }}>{o.bon.type}{o.bon.effect ? ` · ${o.bon.effect}` : ""}</div>}
              </button>
            ))}
          </div>
        </>
      )}

      <div style={{ fontSize: 11, color: "var(--faint)", marginTop: 16 }}>Выбор делается, только когда ведущая выдаёт развилку. Куда ведёт путь и где фейк — скрыто.</div>
    </div>
  );
}

/* ============================ Сайдбар узла ============================ */
function NodeDrawer({ node, nodeMap, onClose, patchNode, addChild, delNode }) {
  const col = TIERS[node.tier] || "#888";
  const isFork = node.children.length > 1;
  return (
    <div className="t-slide" style={{ position: "fixed", top: "var(--shell-h, 64px)", right: 0, bottom: 0, width: "min(360px, 92vw)", zIndex: 30,
      background: `linear-gradient(180deg, ${col}1f 0%, var(--surf) 22%, var(--bg) 100%)`, borderLeft: "1px solid var(--line)",
      boxShadow: "-18px 0 40px rgba(0,0,0,.45)", overflowY: "auto", padding: 16 }}>
      <div className="flex items-start justify-between gap-2 mb-3">
        <input className="t-input" value={node.title} onChange={(e) => patchNode(node.id, { title: e.target.value })}
          style={{ fontFamily: FONT_DISPLAY, fontSize: 20, color: GOLD, background: "none", border: "none", padding: 0, width: "100%" }} />
        <button onClick={onClose} className="t-btn" style={{ padding: "4px 8px" }}><X size={16} /></button>
      </div>

      <div className="flex items-center gap-2 mb-4" style={{ fontSize: 12, color: "var(--muted)" }}>
        <span style={{ background: col, color: "var(--bg)", borderRadius: 10, padding: "2px 9px" }}>{node.tier}</span>
        <span>шаг {node.step}</span>
      </div>

      <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", marginBottom: 4 }}>Ярус</div>
      <select className="t-input" value={node.tier} onChange={(e) => patchNode(node.id, { tier: e.target.value })} style={{ marginBottom: 14, width: "100%" }}>
        {TIER_LIST.map((t) => <option key={t} value={t} style={{ color: "#000" }}>{t}</option>)}
      </select>

      {node.bon && (
        <>
          <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", marginBottom: 6 }}>Бон</div>
          <div className="flex flex-wrap gap-1.5 mb-2">
            {BON_LIST.map((b) => (
              <button key={b} onClick={() => patchNode(node.id, { bon: { ...node.bon, type: b } })}
                style={{ fontSize: 12, padding: "3px 9px", borderRadius: 14, cursor: "pointer",
                  border: node.bon.type === b ? `1px solid ${BONS[b]}` : "1px solid var(--line)",
                  background: node.bon.type === b ? `${BONS[b]}26` : "transparent", color: "var(--ink)" }}>{b}</button>
            ))}
          </div>
          <textarea className="t-input" value={node.bon.effect} onChange={(e) => patchNode(node.id, { bon: { ...node.bon, effect: e.target.value } })}
            placeholder="эффект бона" style={{ width: "100%", height: 48, resize: "vertical", marginBottom: node.bon.type === "Открытие" || node.bon.type === "Мощь" ? 8 : 14 }} />
          {node.bon.type === "Открытие" && (<>
            <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", marginBottom: 4 }}>Открывает навык (механика на карте)</div>
            <select className="t-input" value={node.bon.skill || ""} onChange={(e) => patchNode(node.id, { bon: { ...node.bon, skill: e.target.value } })} style={{ width: "100%", marginBottom: 14 }}>
              <option value="" style={{ color: "#000" }}>— не привязан —</option>
              {MYTH_SKILLS.map((s) => <option key={s} value={s} style={{ color: "#000" }}>{s}</option>)}
            </select>
          </>)}
          {node.bon.type === "Мощь" && (<>
            <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", marginBottom: 4 }}>Ломает d12 у атрибута (+1 ступень)</div>
            <select className="t-input" value={node.bon.attr || ""} onChange={(e) => patchNode(node.id, { bon: { ...node.bon, attr: e.target.value } })} style={{ width: "100%", marginBottom: 14 }}>
              <option value="" style={{ color: "#000" }}>— не привязан —</option>
              {ATTR_LIST.map(([k, l]) => <option key={k} value={k} style={{ color: "#000" }}>{l}</option>)}
            </select>
          </>)}
        </>
      )}

      {isFork && (
        <>
          <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", marginBottom: 6 }}>Тип развилки</div>
          <div className="flex gap-2 mb-4">
            {[["real", "✦ Живая (к разным богам)"], ["fake", "↺ Фейк (сходится назад)"]].map(([v, label]) => (
              <button key={v} onClick={() => patchNode(node.id, { fork: v })}
                style={{ flex: 1, fontSize: 12, padding: "6px", borderRadius: 10, cursor: "pointer",
                  border: node.fork === v ? `1px solid ${v === "fake" ? "var(--muted)" : GOLD}` : "1px solid var(--line)",
                  background: node.fork === v ? "var(--line-soft)" : "transparent", color: "var(--ink)" }}>{label}</button>
            ))}
          </div>
        </>
      )}

      <div style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", marginBottom: 4 }}>Куда ведёт (скрыто от игрока)</div>
      <input className="t-input" value={node.dest || ""} onChange={(e) => patchNode(node.id, { dest: e.target.value })}
        placeholder="бог / пара / кластер" style={{ width: "100%", marginBottom: 16 }} />

      <div className="flex gap-2">
        <button className="t-btn flex items-center gap-1" onClick={() => addChild(node.id)}><Plus size={14} /> Развилка / шаг</button>
        {node.id !== "r" && <button className="t-btn flex items-center gap-1" onClick={() => delNode(node.id)} style={{ color: "var(--red)" }}><Trash2 size={14} /> Удалить</button>}
      </div>
      {node.children.length > 0 && (
        <div style={{ fontSize: 11, color: "var(--faint)", marginTop: 10 }}>Дети: {node.children.map((c) => nodeMap[c]?.title).filter(Boolean).join(", ") || "—"}</div>
      )}
    </div>
  );
}

/* ============================ Данные ============================ */
function DataModal({ nodes, onClose, onApply }) {
  const [text, setText] = useState(JSON.stringify({ nodes }, null, 2));
  const [err, setErr] = useState("");
  const apply = () => { try { const d = JSON.parse(text); if (!d.nodes) throw new Error("нужно поле nodes"); setErr(""); onApply(d); } catch (e) { setErr("Не разобрал JSON: " + e.message); } };
  return (
    <div className="fixed inset-0 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,.6)", zIndex: 50 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "var(--surf)", border: "1px solid var(--line)", borderRadius: 16, padding: 18, width: "100%", maxWidth: 640 }}>
        <div className="flex items-center justify-between mb-3">
          <div style={{ fontFamily: FONT_DISPLAY, fontSize: 18, color: GOLD }}>Данные древа</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--ink)", cursor: "pointer" }}><X size={18} /></button>
        </div>
        <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>Скопируй, чтобы сохранить. Вставь свой JSON и нажми «Применить».</div>
        <textarea value={text} onChange={(e) => setText(e.target.value)} spellCheck={false}
          style={{ width: "100%", height: 300, background: "var(--bg)", color: "var(--ink)", border: "1px solid var(--line)", borderRadius: 10, padding: 12, fontFamily: "ui-monospace,monospace", fontSize: 12 }} />
        {err && <div style={{ color: "var(--red)", fontSize: 12, marginTop: 6 }}>{err}</div>}
        <div className="flex justify-end gap-2 mt-3">
          <button className="t-btn" onClick={onClose}>Закрыть</button>
          <button onClick={apply} style={{ background: GOLD, color: INK, border: "none", borderRadius: 8, padding: "6px 16px", fontWeight: 600, cursor: "pointer" }}>Применить</button>
        </div>
      </div>
    </div>
  );
}

function IssuePanel({ node, nodeMap, campaign, players, onBind }) {
  const [open, setOpen] = useState(true);
  const [pid, setPid] = useState("");
  const [msg, setMsg] = useState("");
  const [confirmFor, setConfirmFor] = useState(null);
  const [sh, setSh] = useState({ rune: "", title: "", text: "", img: "", give: true });
  const onShardImg = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => { const im = new Image(); im.onload = () => { const max = 240, sc = Math.min(1, max / im.width); const c = document.createElement("canvas"); c.width = Math.round(im.width * sc); c.height = Math.round(im.height * sc); c.getContext("2d").drawImage(im, 0, 0, c.width, c.height); setSh((s) => ({ ...s, img: c.toDataURL("image/jpeg", 0.82) })); }; im.src = rd.result; };
    rd.readAsDataURL(f); e.target.value = "";
  };
  const [defaultRune, setDefaultRune] = useState("");
  useEffect(() => {
    if (!campaign || !window._fbdb) { setDefaultRune(""); return; }
    let alive = true;
    (async () => {
      try {
        const snap = await window._fbdb.collection("campaigns").doc(campaign).collection("boards").doc("chronology").get();
        if (!alive || !snap.exists) return;
        const d = snap.data() || {}; const periods = d.periods || [], sessions = d.sessions || [];
        const idxOf = {}; periods.forEach((p, i) => { idxOf[p.id] = i; });
        let cur = 0; sessions.forEach((s) => { const i = idxOf[s.periodId]; if (i != null && i > cur) cur = i; });
        const per = periods[cur]; setDefaultRune(per && per.rune && RUNE_MAP[per.rune] ? RUNE_MAP[per.rune].glyph : "");
      } catch (e) {}
    })();
    return () => { alive = false; };
  }, [campaign]);
  const charRef = (id) => window._fbdb.collection("campaigns").doc(campaign).collection("characters").doc(id);

  const buildOptions = (n) => !n ? [] : (n.children || []).map((cid) => nodeMap[cid]).filter(Boolean).map((c) => ({
    type: (c.bon && c.bon.type) || "Аспект",
    title: c.tier === "наследие" ? "" : c.title,
    effect: (c.bon && c.bon.effect) || "",
    skill: (c.bon && c.bon.skill) || null,
    attr: (c.bon && c.bon.attr) || null,
  }));

  const issue = async () => {
    if (!campaign) { setMsg("Привяжи кампанию вверху"); return; }
    if (!node) { setMsg("Выбери узел на древе"); return; }
    if (!pid) { setMsg("Выбери игрока"); return; }
    const options = buildOptions(node);
    if (!options.length) { setMsg("У этого узла нет развилок"); return; }
    try {
      await charRef(pid).set({ nextFork: { options, chosen: null }, node: node.title, treeNode: node.id }, { merge: true });
      setMsg("Выдано \u2713"); setTimeout(() => setMsg(""), 1800);
    } catch (e) { setMsg("Ошибка: " + e.message); }
  };

  const openConfirm = (p) => { setConfirmFor(p.id); setSh({ rune: defaultRune || "", title: "", text: "", img: "", give: true }); };

  const confirmStep = async (p) => {
    const nf = p.nextFork; if (!nf || typeof nf.chosen !== "number") return;
    const opt = nf.options[nf.chosen]; if (!opt) return;
    const parent = p.treeNode ? nodeMap[p.treeNode] : null;
    const childIds = parent ? (parent.children || []).filter((c) => nodeMap[c]) : [];
    const childId = childIds[nf.chosen] || null;
    const childNode = childId ? nodeMap[childId] : null;
    const live = childNode && childNode.bon ? childNode.bon : null;
    const isLeg = childNode && childNode.tier === "наследие";
    const eff = {
      type: (live && live.type) || opt.type,
      title: childNode ? (isLeg ? "" : childNode.title) : (opt.title || ""),
      effect: (live && live.effect) || opt.effect || "",
      skill: (live && live.skill) || opt.skill || null,
      attr: (live && live.attr) || opt.attr || null,
    };
    const patch = {
      boons: [...(p.boons || []), { type: eff.type, title: eff.title, effect: eff.effect, step: childNode ? childNode.step : (p.shards || 0) + 1 }],
      nextFork: null,
    };
    if (childId) { patch.treeNode = childId; patch.node = isLeg ? "Наследие \u00b7 сокрыто" : (childNode ? childNode.title : (p.node || "")); }
    if (eff.type === "Открытие" && eff.skill) {
      const sk = { ...(p.skills || {}) }; if (sk[eff.skill] == null) sk[eff.skill] = 4; patch.skills = sk;
    }
    if (eff.type === "Мощь" && eff.attr) {
      const at = { ...(p.attrs || {}) }; const a = at[eff.attr] || { die: 4, plus: 0 };
      if (a.die >= 12) { at[eff.attr] = { die: 12, plus: Math.min(3, (a.plus || 0) + 1) }; patch.attrs = at; }
    }
    if (sh.give) {
      const shards = (p.shards || 0) + 1;
      const sd = [...(p.shardData || [])]; sd[shards - 1] = { rune: (sh.rune || "\u2726").slice(0, 2), title: (sh.title || "").trim(), text: (sh.text || "").trim(), img: sh.img || "" };
      patch.shards = shards; patch.shardData = sd;
    }
    try { await charRef(p.id).set(patch, { merge: true }); setConfirmFor(null); setMsg("Шаг подтверждён \u2713"); setTimeout(() => setMsg(""), 1800); }
    catch (e) { setMsg("Ошибка: " + e.message); }
  };

  const clearFork = async (p) => { try { await charRef(p.id).set({ nextFork: null }, { merge: true }); } catch (e) { setMsg(e.message); } };
  const liveChild = (p) => {
    const nf = p.nextFork; if (!nf || typeof nf.chosen !== "number") return null;
    const parent = p.treeNode ? nodeMap[p.treeNode] : null;
    const ids = parent ? (parent.children || []).filter((c) => nodeMap[c]) : [];
    return nodeMap[ids[nf.chosen]] || null;
  };

  return (
    <div style={{ position: "fixed", left: "50%", bottom: 16, transform: "translateX(-50%)", zIndex: 40, width: "min(440px,96vw)", maxHeight: "60vh", overflowY: "auto", background: "rgba(10,14,26,.96)", border: "1px solid rgba(230,195,77,.4)", borderRadius: 12, padding: 12, backdropFilter: "blur(6px)" }}>
      <div className="flex items-center justify-between" style={{ marginBottom: open ? 10 : 0 }}>
        <div style={{ fontSize: 12, color: GOLD, letterSpacing: ".4px" }}>Развилки и шаги игроков</div>
        <button onClick={() => setOpen((o) => !o)} style={{ background: "none", border: "none", color: "var(--ink)", cursor: "pointer", fontSize: 13 }}>{open ? "свернуть" : "открыть"}</button>
      </div>
      {open && (
        <div>
          {!campaign ? (
            <div style={{ fontSize: 12, color: "var(--muted)" }}>Привяжи кампанию кнопкой облака вверху. <button onClick={onBind} style={{ background: "none", border: "none", color: GOLD, cursor: "pointer", textDecoration: "underline" }}>Привязать</button></div>
          ) : (
            <div>
              <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 6 }}>Узел: <span style={{ color: node ? "var(--bronze)" : "var(--red)" }}>{node ? node.title : "не выбран — кликни узел"}</span>{node ? " \u00b7 вариантов: " + buildOptions(node).length : ""}</div>
              <div className="flex gap-2" style={{ marginBottom: 8 }}>
                <select value={pid} onChange={(e) => setPid(e.target.value)} style={{ flex: 1, background: "var(--inset)", border: "1px solid var(--line)", borderRadius: 8, color: "var(--ink)", padding: "6px 10px", fontSize: 13 }}>
                  <option value="" style={{ color: "#000" }}>— кому выдать —</option>
                  {players.map((p) => <option key={p.id} value={p.id} style={{ color: "#000" }}>{p.name || "без имени"}</option>)}
                </select>
                <button onClick={issue} disabled={!node || !pid} className="flex items-center gap-1" style={{ background: node && pid ? GOLD : "var(--surf2)", color: node && pid ? INK : "var(--muted)", border: "none", borderRadius: 8, padding: "6px 12px", fontWeight: 600, cursor: node && pid ? "pointer" : "not-allowed", fontSize: 13 }}><Send size={13} /> Выдать</button>
              </div>

              {players.length === 0 && <div style={{ fontSize: 12, color: "var(--faint)" }}>В кампании пока нет героев.</div>}
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {players.map((p) => {
                  const nf = p.nextFork;
                  const chosen = nf && nf.options && typeof nf.chosen === "number";
                  const issued = nf && nf.options && nf.chosen == null;
                  const chOpt = chosen ? nf.options[nf.chosen] : null;
                  return (
                    <div key={p.id} style={{ border: "1px solid var(--line)", borderRadius: 9, padding: "7px 9px", background: "var(--surf)" }}>
                      <div className="flex items-center gap-2" style={{ fontSize: 12.5 }}>
                        <span style={{ fontWeight: 600, color: "var(--ink)" }}>{p.name || "без имени"}</span>
                        <span style={{ color: "var(--faint)", fontSize: 11 }}>осколков {p.shards || 0}/9</span>
                        <span style={{ marginLeft: "auto", fontSize: 11, color: chosen ? "#6bbf59" : issued ? GOLD : "var(--faint)" }}>
                          {chosen ? "выбрал \u00ab" + (chOpt.title || chOpt.type) + "\u00bb" : issued ? "ждёт выбора" : "развилки нет"}
                        </span>
                        {(chosen || issued) && <button onClick={() => clearFork(p)} title="убрать развилку" style={{ background: "none", border: "none", color: "var(--faint)", cursor: "pointer", fontSize: 14, lineHeight: 1 }}>\u00d7</button>}
                      </div>
                      {chosen && confirmFor !== p.id && (
                        <button onClick={() => openConfirm(p)} style={{ marginTop: 6, background: "var(--surf2)", border: "1px solid " + GOLD, color: GOLD, borderRadius: 7, padding: "5px 10px", fontSize: 12, cursor: "pointer" }}>Подтвердить шаг \u2192</button>
                      )}
                      {chosen && confirmFor === p.id && (() => {
                        const cn = liveChild(p); const lb = cn && cn.bon ? cn.bon : null;
                        const effType = (lb && lb.type) || chOpt.type;
                        const effSkill = (lb && lb.skill) || chOpt.skill;
                        const effAttr = (lb && lb.attr) || chOpt.attr;
                        return (
                        <div style={{ marginTop: 7, borderTop: "1px solid var(--line-soft)", paddingTop: 7 }}>
                          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 6 }}>Дар уйдёт в карту{effType === "Открытие" && effSkill ? ", откроется навык \u00ab" + effSkill + "\u00bb" : (effType === "Открытие" ? " (навык у узла не привязан — задай в редакторе)" : "")}{effType === "Мощь" && effAttr ? ", +1 сверх d12" : ""}.</div>
                          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "var(--ink)", marginBottom: 6 }}>
                            <input type="checkbox" checked={sh.give} onChange={(e) => setSh((s) => ({ ...s, give: e.target.checked }))} /> выдать осколок этого мира
                          </label>
                          {sh.give && (
                            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 7 }}>
                              <input value={sh.title} onChange={(e) => setSh((s) => ({ ...s, title: e.target.value }))} placeholder="заголовок осколка" style={{ background: "var(--inset)", border: "1px solid var(--line)", borderRadius: 7, color: "var(--ink)", padding: "6px 8px", fontSize: 12 }} />
                              <textarea value={sh.text} onChange={(e) => setSh((s) => ({ ...s, text: e.target.value }))} placeholder="лор осколка — что игрок узнаёт о своей природе" style={{ background: "var(--inset)", border: "1px solid var(--line)", borderRadius: 7, color: "var(--ink)", padding: "6px 8px", fontSize: 12, height: 44, resize: "vertical" }} />
                              <div style={{ fontSize: 11, color: "var(--muted)" }}>Руна осколка{defaultRune ? " \u00b7 по умолчанию — мир последней сессии" : ""}:</div>
                              <div className="flex flex-wrap gap-1">
                                {RUNES.map(([rid, g, rn]) => (
                                  <button key={rid} title={rn} onClick={() => setSh((s) => ({ ...s, rune: g }))} style={{ fontFamily: RUNE_FONT, fontSize: 16, width: 28, height: 28, borderRadius: 7, cursor: "pointer", border: sh.rune === g ? "1px solid " + GOLD : "1px solid var(--line)", background: sh.rune === g ? "rgba(230,195,77,.15)" : "transparent", color: sh.rune === g ? GOLD : "var(--ink)" }}>{g}</button>
                                ))}
                              </div>
                              <div style={{ fontSize: 11, color: "var(--muted)" }}>Фон осколка (необязательно):</div>
                              <div className="flex items-center gap-2">
                                <label style={{ fontSize: 12, color: "var(--ink)", border: "1px solid var(--line)", borderRadius: 7, padding: "5px 10px", cursor: "pointer", background: "var(--surf2)" }}>
                                  {sh.img ? "заменить" : "загрузить картинку"}
                                  <input type="file" accept="image/*" onChange={onShardImg} style={{ display: "none" }} />
                                </label>
                                {sh.img && <img src={sh.img} alt="" style={{ width: 34, height: 44, borderRadius: 6, objectFit: "cover", border: "1px solid var(--line)" }} />}
                                {sh.img && <button onClick={() => setSh((s) => ({ ...s, img: "" }))} style={{ background: "none", border: "none", color: "var(--faint)", cursor: "pointer", fontSize: 12, textDecoration: "underline" }}>убрать</button>}
                              </div>
                            </div>
                          )}
                          <div className="flex gap-2">
                            <button onClick={() => setConfirmFor(null)} style={{ background: "none", border: "1px solid var(--line)", color: "var(--muted)", borderRadius: 7, padding: "6px 10px", fontSize: 12, cursor: "pointer" }}>Отмена</button>
                            <button onClick={() => confirmStep(p)} style={{ flex: 1, background: GOLD, color: INK, border: "none", borderRadius: 7, padding: "6px", fontWeight: 600, fontSize: 12, cursor: "pointer" }}>Подтвердить шаг</button>
                          </div>
                        </div>
                        ); })()}
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize: 10.5, color: "var(--muted)", marginTop: 8, lineHeight: 1.4 }}>Кликни узел \u2192 выбери игрока \u2192 \u00abВыдать\u00bb. Когда игрок выберет — \u00abПодтвердить шаг\u00bb: дар уйдёт в карту (сработает механика), фишка сдвинется, можно выдать осколок.</div>
            </div>
          )}
          {msg && <div style={{ fontSize: 12, color: msg.indexOf("\u2713") >= 0 ? "#6bbf59" : "var(--red)", marginTop: 6 }}>{msg}</div>}
        </div>
      )}
    </div>
  );
}

/* Вкладка игрока: его ближайшая развилка из его записи (без полного древа) */
function PlayerStep() {
  const ident = (() => { try { return JSON.parse(localStorage.getItem("ragnarok-current") || "null"); } catch (e) { return null; } })();
  const [doc, setDoc] = useState(null);
  const [status, setStatus] = useState(window._fbdb ? (ident ? "Загрузка…" : "no-ident") : "no-fb");
  useEffect(() => {
    if (!window._fbdb || !ident) return;
    (async () => { try { await window._fbauth.signInAnonymously(); } catch (e) {} })();
    const ref = window._fbdb.collection("campaigns").doc(ident.campaign).collection("characters").doc(ident.charId);
    const un = ref.onSnapshot((d) => { setDoc(d.exists ? { id: d.id, ...d.data() } : null); setStatus(""); }, (e) => setStatus("Ошибка: " + e.message));
    return () => un();
  }, []);
  const pick = async (i) => {
    if (!doc || !doc.nextFork) return;
    try { await window._fbdb.collection("campaigns").doc(ident.campaign).collection("characters").doc(doc.id).set({ nextFork: { ...doc.nextFork, chosen: doc.nextFork.chosen === i ? null : i } }, { merge: true }); } catch (e) { setStatus("Ошибка: " + e.message); }
  };
  const wrap = (inner) => (
    <div style={{ maxWidth: 560, margin: "0 auto", padding: "28px 18px", color: "var(--ink)" }}>
      <div style={{ fontFamily: FONT_DISPLAY, fontSize: 26, color: GOLD, marginBottom: 4 }}>Твой путь</div>
      <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 22 }}>Ближайшая развилка. Куда ведёт и где фейк — знает только ведущая.</div>
      {inner}
    </div>
  );
  if (status === "no-fb") return wrap(<div style={{ color: "var(--muted)" }}>Облако не настроено — развилки приходят только в облачном режиме.</div>);
  if (status === "no-ident") return wrap(<div style={{ background: "var(--surf)", border: "1px dashed var(--surf2)", borderRadius: 14, padding: 18 }}><div style={{ fontSize: 15, marginBottom: 4 }}>Сначала открой свою «Карту героя»</div><div style={{ fontSize: 13, color: "var(--muted)" }}>Войди в кампанию на карте — тогда здесь появится твоя развилка. <a href="ragnarok-character-sheet-cloud.html" style={{ color: GOLD }}>Открыть карту →</a></div></div>);
  if (status) return wrap(<div style={{ color: "var(--muted)" }}>{status}</div>);
  const nf = doc && doc.nextFork;
  return wrap(
    <div>
      {doc && doc.node && <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 16 }}>Ты на: <span style={{ color: "var(--ink)" }}>{doc.node}</span></div>}
      {!nf || !nf.options || !nf.options.length ? (
        <div style={{ background: "var(--surf2)", border: "1px dashed var(--surf2)", borderRadius: 14, padding: 22, textAlign: "center" }}>
          <Lock size={18} style={{ opacity: 0.6, marginBottom: 6 }} />
          <div style={{ fontSize: 15, color: "var(--muted)" }}>Жди пробуждения.</div>
          <div style={{ fontSize: 12, color: "var(--faint)", marginTop: 4 }}>Ведущая откроет следующую развилку, когда придёт срок.</div>
        </div>
      ) : (
        <>
          <div style={{ fontSize: 12, color: "var(--muted)", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 10 }}>{nf.options.length > 1 ? "Развилка — сделай выбор" : "Шаг открыт"}</div>
          <div className="grid gap-3" style={{ gridTemplateColumns: "1fr" }}>
            {nf.options.map((o, i) => {
              const chosen = nf.chosen === i;
              return (
                <button key={i} onClick={() => pick(i)} className="text-left"
                  style={{ background: chosen ? "rgba(230,195,77,.12)" : "var(--surf)", border: "1px solid " + (chosen ? GOLD : (BONS[o.type] || "#888") + "55"), borderRadius: 14, padding: 14, cursor: "pointer", color: "var(--ink)" }}>
                  <div className="flex items-center gap-2 mb-1">
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: BONS[o.type] || "#888", display: "inline-block" }} />
                    <span style={{ fontSize: 12, color: BONS[o.type] || "var(--ink)", textTransform: "uppercase", letterSpacing: ".5px" }}>{o.type}</span>
                    {o.title ? <span style={{ fontWeight: 600 }}>· {o.title}</span> : null}
                  </div>
                  <div style={{ fontSize: 14, color: "var(--ink)" }}>{o.effect || "—"}</div>
                  {chosen && <div style={{ fontSize: 11, color: GOLD, marginTop: 6 }}>✓ выбрано</div>}
                </button>
              );
            })}
          </div>
          <div style={{ fontSize: 11, color: "var(--faint)", marginTop: 16 }}>Выбор сохраняется сам и виден ведущей. Можно переcделать, пока ведущая не закрыла развилку.</div>
        </>
      )}
    </div>
  );
}

const _treeRole = (new URLSearchParams(location.search).get("role") === "gm") ? "gm" : "player";
ReactDOM.createRoot(document.getElementById("root")).render(_treeRole === "gm" ? <DivineTree /> : <PlayerStep />);
</script>

<script>
/* у игрока прячем переключатель «Ведущая | Игрок» — роль задаётся ссылкой.
   Ждём, пока React дорисует кнопки (наблюдатель), затем прячем и отключаемся. */
(function(){
  var role = new URLSearchParams(location.search).get("role")==="gm" ? "gm" : "player";
  if (role === "gm") return;
  function tryHide(){
    var hit = false;
    document.querySelectorAll("button").forEach(function(b){
      if (b.textContent.trim()==="Ведущая" && b.parentElement){ b.parentElement.style.display="none"; hit = true; }
    });
    return hit;
  }
  if (tryHide()) return;
  var obs = new MutationObserver(function(){ if (tryHide()) obs.disconnect(); });
  obs.observe(document.documentElement, { childList:true, subtree:true });
  setTimeout(function(){ obs.disconnect(); }, 5000);
})();
</script>
