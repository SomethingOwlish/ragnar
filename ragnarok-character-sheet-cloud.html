<!DOCTYPE html>
<html lang="ru" data-default-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Рагнарёк-AU · Карта героя (облако)</title>
<script>(function(){try{var t=localStorage.getItem('ragnarok-theme')||document.documentElement.getAttribute('data-default-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="theme.css" />
<style>
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased;}
input,textarea{font-family:inherit; color:inherit;}
button{font-family:inherit; cursor:pointer;}
.stele{max-width:1120px; margin:0 auto; padding:28px 22px 60px;}
.stele.view-locked > *:not(.top) input, .stele.view-locked > *:not(.top) textarea, .stele.view-locked > *:not(.top) button{ pointer-events:none; }
.stele.view-locked > *:not(.top) input, .stele.view-locked > *:not(.top) textarea{ opacity:.92; }
.stele.view-locked .niche{ pointer-events:auto !important; }
.stele.view-locked .adv-open{ pointer-events:auto !important; }
.stele.prog-locked .prog input, .stele.prog-locked .prog textarea, .stele.prog-locked .prog button{ pointer-events:none; opacity:.9; }
.iobtn:disabled{ opacity:.45; cursor:default; }
.stele.view-locked .combat.live button, .stele.view-locked .combat.live input{ pointer-events:auto !important; opacity:1 !important; }
.sec-title{font-family:var(--disp); font-weight:600; font-size:19px; display:flex; align-items:center; gap:10px; color:var(--ink);}
.rune{font-family:var(--rune); line-height:1;}
.card{background:var(--surf); border:1px solid var(--line); border-radius:11px; padding:18px;}
.divider{height:1px; background:var(--line-soft); margin:13px 0;}
.help{font-size:12px; color:var(--faint); margin:4px 0 2px; line-height:1.6;}
.top{display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;}
.wordmark{font-family:var(--disp); font-weight:700; font-size:15px; letter-spacing:.16em; text-transform:uppercase; display:flex; align-items:center; gap:10px;}
.wordmark .rune{color:var(--bronze); font-size:18px;}
.tools{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.mode{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:5px 11px; background:var(--surf);}
.mode.cloud{color:var(--steel); border-color:var(--steel-soft);}
.mode.local{color:var(--bronze); border-color:var(--line-warm);}
.saved{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--steel); display:flex; align-items:center; gap:5px; opacity:0; transition:opacity .3s;}
.saved.on{opacity:1;}
.unsynced{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ember); display:flex; align-items:center; gap:6px; border:1px solid var(--line-warm); border-radius:999px; padding:4px 11px; background:var(--warm-chip);}
.unsynced .dot{width:7px; height:7px; border-radius:50%; background:var(--ember); animation:pulseDot 1.6s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{opacity:1;} 50%{opacity:.35;}}
.iobtn.apply{border-color:var(--bronze); color:var(--on-ink); background:var(--bronze);}
.iobtn.apply:hover{background:var(--bronze-deep); border-color:var(--bronze-deep); color:var(--on-ink);}
.iobtn.apply:disabled{opacity:.55; cursor:default;}
.iobtn{background:var(--surf); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 13px; font-size:12px; letter-spacing:.04em; display:inline-flex; align-items:center; gap:7px;}
.iobtn:hover{border-color:var(--bronze); color:var(--bronze);}
.iobtn .rune{font-size:14px;}
.idrow{display:flex; gap:18px; align-items:stretch; margin:20px 0; flex-wrap:wrap;}
.avatar{width:128px; height:178px; flex:none; border:1px solid var(--line); border-radius:11px; background:var(--surf2); overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:pointer;}
.avatar img{width:100%; height:100%; object-fit:cover;}
.avatar .ph{display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--faint); font-size:11px; letter-spacing:.1em; text-transform:uppercase;}
.avatar .ph .rune{font-size:34px; color:var(--steel-soft);}
.idfields{flex:1; min-width:260px; display:flex; flex-direction:column; gap:11px;}
.field label{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; display:block; margin-bottom:4px;}
.t-input{background:var(--surf); border:1px solid var(--line); border-bottom:2px solid var(--steel-soft); border-radius:8px 8px 4px 4px; padding:10px 12px; font-size:15px; outline:none; width:100%;}
.t-input:focus{border-bottom-color:var(--steel);}
.t-input.big{font-family:var(--disp); font-size:24px;}
.row2{display:flex; gap:12px; flex-wrap:wrap;}
.ta{background:var(--surf); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:14px; outline:none; width:100%; resize:vertical; min-height:54px; line-height:1.55;}
.ta:focus{border-color:var(--steel-soft);}
.arc{font-family:var(--disp); font-size:15px; color:var(--muted); display:flex; align-items:baseline; gap:14px;}
.arc b{color:var(--ember); font-weight:600;}
.arc .sh{font-family:var(--mono); font-size:12px; color:var(--muted);}
.adv{display:flex; gap:20px; align-items:center; flex-wrap:wrap;}
.adv .blk{display:flex; align-items:center; gap:9px;}
.adv .k{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600;}
.adv .rk{font-family:var(--disp); font-size:16px; color:var(--steel); font-weight:600;}
.adv .rk-arch{font-family:var(--disp); font-size:15px; color:var(--bronze); font-weight:500;}
.stepper{display:flex; align-items:center; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:var(--surf);}
.stepper button{background:var(--surf2); border:none; width:30px; height:30px; font-size:17px; color:var(--ink); line-height:1;}
.stepper button:hover{background:var(--inset);}
.stepper .num{min-width:36px; text-align:center; font-family:var(--mono); font-size:15px; font-weight:700;}
.grid2{display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:18px;}
.trait-row{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:9px 0;}
.trait-row + .trait-row{border-top:1px solid var(--line-soft);}
.trait-name{font-size:15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding-top:5px;}
.attr-chip{font-family:var(--mono); font-size:10px; letter-spacing:.08em; border:1px solid; border-radius:5px; padding:1px 5px; font-weight:500;}
.val-chip{font-family:var(--mono); font-size:11px; border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:var(--steel-soft);}
.val-chip.divine{color:var(--bronze); border-color:var(--line-warm); background:var(--warm-chip);}
.tip{border-bottom:1px dotted var(--faint); cursor:help; position:relative;}
.tip:hover::after{content:attr(data-tip); position:absolute; left:0; bottom:calc(100% + 7px); max-width:230px; width:max-content; background:var(--tip-bg); color:var(--tip-ink); font-size:12px; line-height:1.4; padding:7px 10px; border-radius:7px; z-index:30; box-shadow:0 6px 18px -6px rgba(20,30,40,.5);}
.tip:hover::before{content:''; position:absolute; left:12px; bottom:calc(100% + 2px); border:5px solid transparent; border-top-color:var(--tip-bg); z-index:30;}
.track-wrap{display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex:none;}
.track{display:flex; gap:4px; align-items:center;}
.pip{min-width:33px; text-align:center; padding:6px 4px; border:1px solid var(--line); background:var(--surf); color:var(--muted); border-radius:6px; font-family:var(--mono); font-size:13px; transition:.12s;}
.pip:hover{border-color:var(--steel-soft); color:var(--ink);}
.pip.on{background:var(--steel); border-color:var(--steel); color:var(--on-steel); font-weight:700;}
.pip.divine{border:1px solid var(--line-warm); color:var(--bronze); background:var(--surf); min-width:30px;}
.pip.divine:hover{border-color:var(--bronze);}
.pip.divine.on{background:var(--bronze); border-color:var(--bronze-deep); color:var(--on-ink);}
.pip.untr{font-size:15px;}
.divine-track{display:flex; gap:4px; align-items:center; animation:reveal .18s ease;}
.divine-track .dcap{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--bronze); font-weight:600; display:flex; align-items:center; gap:4px;}
.divine-track .dcap .rune{font-size:13px;}
@keyframes reveal{from{opacity:0; transform:translateY(-3px);} to{opacity:1; transform:none;}}
.derived{display:grid; grid-template-columns:repeat(auto-fit,minmax(86px,1fr)); gap:10px; margin-top:14px;}
.stat{background:var(--surf2); border:1px solid var(--line-soft); border-radius:9px; padding:11px 8px; text-align:center;}
.stat .v{font-family:var(--mono); font-size:23px; font-weight:700; color:var(--steel);}
.stat .k{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-top:3px;}
.auto-note{font-size:11px; color:var(--faint); margin-top:9px;}
.skgroup-label{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin:14px 0 2px;}
.skgroup-label:first-of-type{margin-top:2px;}
.locked{display:flex; flex-wrap:wrap; gap:7px; margin-top:8px;}
.lock-chip{display:flex; align-items:center; gap:6px; background:var(--surf2); border:1px dashed var(--line); border-radius:7px; padding:6px 9px; font-size:13px; color:var(--muted);}
.lock-chip .rune{color:var(--red); font-size:13px;}
.lock-chip .lh{font-size:11px; color:var(--faint);}
.list{display:flex; flex-direction:column; gap:6px; margin-top:8px;}
.empty{color:var(--faint); font-size:13px;}
.lrow{display:flex; align-items:center; gap:9px; background:var(--surf2); border:1px solid var(--line-soft); border-radius:7px; padding:8px 11px;}
.lrow .lb{color:var(--bronze); font-size:14px;}
.lrow .lt{flex:1; font-size:14px;}
.lrow .lx{background:none; border:none; color:var(--faint); font-size:16px; line-height:1; padding:0;}
.lrow .lx:hover{color:var(--red);}
.addrow{display:flex; gap:8px; margin-top:9px;}
.addrow .t-input{flex:1; padding:8px 11px; font-size:14px; border-bottom-width:1px;}
.addbtn{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 14px; font-size:15px;}
.addbtn:hover{border-color:var(--steel-soft);}
.divine{background:linear-gradient(180deg,var(--warm),var(--surf)); border:1px solid var(--line-warm); border-radius:12px; padding:22px; margin-top:18px;}
.divine .sec-title .rune{color:var(--bronze);}
.shard-cap{font-size:12px; color:var(--muted);}
.shard-cap b{color:var(--ember); font-family:var(--mono);}
.shards{display:flex; gap:13px; flex-wrap:wrap; margin:14px 0 6px;}
.niche{position:relative; width:78px; height:96px; border:1px solid var(--line-warm); border-radius:11px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:var(--warm-inset); background-size:cover; background-position:center; color:var(--niche-idle); transition:.18s; overflow:hidden;}
.niche .rune{font-size:34px;}
.niche .n{font-family:var(--mono); font-size:11px; letter-spacing:.04em;}
.niche.hasimg::before{content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.62));}
.niche.hasimg .rune, .niche.hasimg .n{position:relative; z-index:1; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.9);}
.niche:hover{border-color:var(--bronze);}
.niche.lit{background:radial-gradient(circle at 50% 36%, #F6CE85, #E3A848); border-color:var(--bronze-deep); color:#4A3208; box-shadow:0 2px 12px -4px rgba(188,126,42,.6);}
.dz-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(258px,1fr)); gap:16px; margin-top:18px;}
.dz-card{background:var(--warm2); border:1px solid var(--line-warm); border-radius:10px; padding:16px;}
.dz-card h4{font-family:var(--disp); font-weight:600; font-size:15px; margin:0 0 10px;}
.dz-card .t-input{background:var(--warm-field); border-color:var(--line-warm); border-bottom-color:var(--bronze);}
.fork-opt{border:1px solid var(--line-warm); border-radius:8px; padding:11px 12px; margin-top:9px; background:var(--warm-field);}
.fork-opt .boon{display:inline-block; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--bronze-deep); border:1px solid var(--line-warm); border-radius:999px; padding:3px 9px; margin-bottom:7px;}
.fork-opt .eff{font-size:13px; color:var(--faint); font-style:italic;}
.fork-opt.pick{display:block; width:100%; text-align:left; background:var(--warm-field); cursor:pointer;}
.fork-opt.pick:hover{border-color:var(--bronze);}
.fork-opt.chosen{border-color:var(--bronze); background:var(--warm-chosen); box-shadow:inset 3px 0 0 var(--bronze);}
.fork-opt .ftitle{font-size:11px; color:var(--bronze-deep); font-weight:600; letter-spacing:.04em; text-transform:uppercase;}
.fork-step{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--bronze-deep); font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:7px;}
.fork-step .sr{font-family:var(--mono); background:var(--warm-field); border:1px solid var(--line-warm); border-radius:6px; padding:1px 7px; letter-spacing:0;}
.fork-ahead{font-size:12px; color:var(--muted); margin:10px 0 0; line-height:1.5;}
.dpath{margin:16px 0 4px;}
.dpath-tiers{display:flex; gap:8px; align-items:stretch;}
.dpath-tier{display:flex; flex-direction:column; gap:6px; padding:8px 6px 6px; border:1px solid var(--line-warm); border-radius:9px; background:var(--warm-field); min-width:0;}
.dpath-tier.cur{border-color:var(--bronze); background:var(--warm-chosen); box-shadow:inset 0 2px 0 var(--bronze);}
.dpath-tier .dpt-name{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--bronze-deep); font-weight:600; text-align:center;}
.dpath-steps{display:flex; gap:5px; justify-content:center;}
.dstep{width:24px; height:24px; flex:none; border-radius:6px; border:1px solid var(--line-warm); background:var(--warm-inset); color:var(--niche-idle); font-family:var(--mono); font-size:12px; display:flex; align-items:center; justify-content:center;}
.dstep.done{background:radial-gradient(circle at 50% 36%, #F6CE85, #E3A848); border-color:var(--bronze-deep); color:#4A3208; font-weight:700;}
.dstep.next{border-color:var(--bronze); color:var(--bronze-deep); font-weight:700; box-shadow:0 0 0 2px var(--warm-chip);}
.dpath-note{font-size:12.5px; color:var(--muted); margin-top:11px; line-height:1.55;}
.dpath-note b{color:var(--ember); font-weight:600;}
.boons-box{margin:18px 0 4px;}
.boons-h{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--bronze-deep); font-weight:600; margin:0 0 10px; display:flex; align-items:center; gap:8px;}
.boons-h .rune{font-size:14px; color:var(--bronze);}
.boons-list{display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:10px;}
.boon-card{border:1px solid var(--line-warm); border-radius:10px; background:var(--warm-field); padding:11px 13px;}
.boon-card .bc-head{display:flex; align-items:baseline; gap:4px; flex-wrap:wrap;}
.boon-card .bc-type{font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--bronze-deep); font-weight:600;}
.boon-card .bc-title{font-family:var(--disp); font-size:15px; color:var(--ink); font-weight:600;}
.boon-card .bc-step{margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--faint);}
.boon-card .bc-eff{font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.5;}
.sealed{display:flex; align-items:center; gap:14px;}
.seal{width:52px; height:52px; flex:none; border-radius:50%; border:2px solid var(--bronze-deep); display:flex; align-items:center; justify-content:center; color:var(--bronze-deep); font-family:var(--disp); font-size:26px; background:var(--warm-field);}
.sealed .txt{font-size:13px; color:var(--muted);}
.howto{background:var(--surf); border:1px solid var(--line); border-radius:11px; padding:18px; margin-top:18px;}
.howto .cols{display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:22px; margin-top:8px;}
.howto h5{font-family:var(--disp); font-weight:600; font-size:15px; margin:0 0 8px; display:flex; align-items:center; gap:8px;}
.howto .mortal h5{color:var(--steel);}
.howto .div-h h5{color:var(--bronze);}
.howto .lead{font-size:13px; color:var(--ink); margin:0 0 8px;}
.howto ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;}
.howto li{font-size:13px; color:var(--muted); line-height:1.5; padding-left:16px; position:relative;}
.howto li::before{content:'•'; position:absolute; left:3px; color:var(--bronze);}
.howto .mortal li::before{color:var(--steel);}
.howto li b{color:var(--ink); font-weight:600;}
.howto .rune{font-size:15px;}
.hints{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-top:18px;}
.hint{background:var(--surf); border:1px solid var(--line); border-left:3px solid var(--steel-soft); border-radius:0 9px 9px 0; padding:12px 14px;}
.hint .ht{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--steel); font-weight:600; display:flex; align-items:center; gap:8px;}
.hint .hb{font-size:13px; color:var(--muted); margin-top:5px;}
.hint.joker{border-left-color:var(--bronze);}
.hint.joker .ht{color:var(--bronze);}
.hint .rune{font-size:14px;}
.footnote{font-size:11px; color:var(--faint); margin-top:22px; line-height:1.7;}
/* боевой блок (DEV-9) */
.combat .cmb-head{display:flex; gap:18px; flex-wrap:wrap; align-items:center; margin:2px 0 14px;}
.cmb-stat{font-size:12px; letter-spacing:.04em; color:var(--muted);}
.cmb-stat b{color:var(--steel); font-family:var(--mono); font-size:16px; margin-left:5px;}
.cmb-live{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--steel); border:1px solid var(--steel-soft); border-radius:999px; padding:3px 9px;}
.cmb-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px 26px;}
.cmb-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:5px 0;}
.cmb-label{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); font-weight:600; width:88px; flex:none;}
.cmb-box{min-width:40px; text-align:center; padding:7px 9px; border:1px solid var(--line); border-radius:7px; background:var(--surf); color:var(--muted); font-size:12.5px; transition:.12s;}
.cmb-box:hover{border-color:var(--steel-soft); color:var(--ink);}
.cmb-box.on{background:var(--steel); border-color:var(--steel); color:var(--on-steel); font-weight:700;}
.cmb-box.wound.on{background:var(--red); border-color:var(--red); color:#fff;}
.cmb-box.out.on{background:#641d1d; border-color:#641d1d; color:#fff;}
.cmb-pen{font-size:12px; color:var(--red); font-weight:600; margin-left:4px;}
.benny-tok{display:flex; gap:5px; align-items:center; margin-left:6px; flex-wrap:wrap;}
.benny-tok .bt{width:17px; height:17px; border-radius:50%; border:1.5px solid var(--bronze); background:radial-gradient(circle at 50% 38%, #F6CE85, #E3A848);}
.cmb-conds{display:flex; flex-wrap:wrap; gap:7px; margin-top:2px;}
.cond{font-size:12.5px; padding:5px 11px; border:1px solid var(--line); border-radius:999px; background:var(--surf2); color:var(--muted); transition:.12s;}
.cond:hover{border-color:var(--ember);}
.cond.on{border-color:var(--ember); color:var(--ember); background:var(--warm-chip); font-weight:600;}
.weap-table{width:100%; border-collapse:collapse; margin-top:4px;}
.weap-table th{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); text-align:left; padding:2px 6px; font-weight:600;}
.weap-table td{padding:3px 4px; vertical-align:middle;}
.weap-table input{width:100%; background:var(--surf); border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:13px; outline:none;}
.weap-table input:focus{border-color:var(--steel-soft);}
.weap-del{background:none; border:none; color:var(--faint); font-size:17px; line-height:1; padding:0 4px;}
.weap-del:hover{color:var(--red);}
.cmb-add{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:7px 13px; font-size:13px; margin-top:8px;}
.cmb-add:hover{border-color:var(--steel-soft);}
.cmb-armor{display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;}

  { n: "Невезучий", s: "major", d: "−1 бенни на сессию" },
  { n: "Фобия", s: "minor", d: "панический страх: высота, толпа, темнота…" },
  { n: "Зависимость", s: "minor", d: "тянет к выпивке, никотину или азарту" },
  { n: "В долгах", s: "minor", d: "кредиты и счета висят над тобой" },
  { n: "Тайна", s: "minor", d: "скрываешь то, что может всё разрушить" },
  { n: "Старая травма", s: "minor", d: "колено или спина подводят под нагрузкой" },
  { n: "Вспыльчивость", s: "minor", d: "быстро вскипаешь" },
  { n: "Пацифизм", s: "minor", d: "не поднимешь руку первым" },
  { n: "Обязательство", s: "minor", d: "работа или семья постоянно требуют тебя" },
];
const DEFAULT_EDGES = [
  { n: "Шустрый", r: "Ловкость d6+", d: "+2 к Скорости, бег d10" },
  { n: "Атлет", r: "Ловкость d8+", d: "+1 к Атлетике и физическим проверкам" },
  { n: "Крепыш", r: "Сила d6+, Вын. d6+", d: "+1 Стойкость, легче носишь груз" },
  { n: "Внимательный", r: "—", d: "+2 к Вниманию" },
  { n: "Смелый", r: "Дух d6+", d: "+2 против страха" },
  { n: "Везучий", r: "—", d: "+1 бенни на сессию" },
  { n: "Сильная воля", r: "—", d: "+1 к Запугиванию/Подначке и сопротивлению им" },
  { n: "Целитель", r: "Дух d6+", d: "+2 к Лечению — медик, спасатель" },
  { n: "Привлекательный", r: "Дух d6+", d: "располагаешь людей внешностью" },
  { n: "Лингвист", r: "Смекалка d6+", d: "родной + английский + ещё пара языков" },
  { n: "Знаток", r: "Смекалка d8+", d: "+2 к Исследованию: архивы, поиск, базы" },
  { n: "Связи", r: "—", d: "есть полезные знакомства, которые выручают" },
  { n: "Водила", r: "Ловкость d6+", d: "+2 к Вождению и Лодкам" },
  { n: "Обеспеченный", r: "—", d: "стартуешь с хорошими средствами" },
];
const CONFLICTS = {
  "Самоуверенность": ["Осторожность"], "Осторожность": ["Самоуверенность"],
  "Героизм": ["Эгоист"], "Эгоист": ["Героизм"],
  "Пацифизм": ["Вспыльчивость"], "Вспыльчивость": ["Пацифизм"],
  "Невезучий": ["Везучий"], "Везучий": ["Невезучий"],
};

function App() {
  const cloud = HAS_FB && !!db;
  const _params = (typeof URLSearchParams !== "undefined") ? new URLSearchParams(location.search) : { get: () => null };
  const gmview = _params.get("gmview") === "1";   // ведущая открыла карту игрока на просмотр
  const [joined, setJoined] = useState(!cloud);           // в локальном режиме сразу показываем лист
  const [campaign, setCampaign] = useState("");
  const [charId, setCharId] = useState(null);
  const [data, setData] = useState(() => loadLocal() || makeDefaults());
  const [creating, setCreating] = useState(() => !cloud && ((loadLocal() || makeDefaults()).created === false));
  const [lists, setLists] = useState({ hindrances: DEFAULT_HINDRANCES, edges: DEFAULT_EDGES });
  const [saved, setSaved] = useState(false);
  const [dirty, setDirty] = useState(false);              // есть правки, не отправленные в облако
  const [applying, setApplying] = useState(false);        // идёт отправка в облако
  const [advOpen, setAdvOpen] = useState(false);          // открыта модалка прокачки (DEV-1)
  const [editing, setEditing] = useState(false);          // правка карточки — за кнопкой
  const [gmEditing, setGmEditing] = useState(false);      // ведущая правит карту игрока
  const canEdit = !gmview && editing;                     // игрок правит обычные поля
  const gmCanEdit = gmview && gmEditing;                  // ведущая правит всё, включая прокачку
  const fieldEdit = canEdit || gmCanEdit;                 // можно править обычные поля
  const progEdit = gmCanEdit || (!cloud && editing);      // прокачку (атрибуты/навыки/эджи/начисление) — только ведущая; в локальном режиме сам игрок
  const skipSave = useRef(true);

  // авто-перевход: если игрок уже входил в эту сессию, не спрашиваем заново
  // (сбрасывается только при заходе на портал — index.html чистит ragnarok-current)
  useEffect(() => {
    if (!cloud || gmview || joined) return;
    let cur = null; try { cur = JSON.parse(localStorage.getItem("ragnarok-current") || "null"); } catch (e) {}
    if (!cur || !cur.campaign || !cur.charId) return;
    (async () => {
      try { await auth.signInAnonymously(); } catch (e) {}
      try {
        const cfg = await db.collection("campaigns").doc(cur.campaign).collection("config").doc("lists").get();
        if (cfg.exists) { const c = cfg.data(); setLists({ hindrances: (c.hindrances && c.hindrances.length) ? c.hindrances : DEFAULT_HINDRANCES, edges: (c.edges && c.edges.length) ? c.edges : DEFAULT_EDGES }); }
      } catch (e) {}
      try {
        const doc = await db.collection("campaigns").doc(cur.campaign).collection("characters").doc(cur.charId).get();
        if (doc.exists) {
          skipSave.current = true;
          const d = { ...makeDefaults(), ...doc.data() };
          setData(d); setCampaign(cur.campaign); setCharId(cur.charId); setJoined(true); setCreating(d.created === false);
        } else { try { localStorage.removeItem("ragnarok-current"); } catch (e) {} }   // героя удалили — на гейт
      } catch (e) { console.error("Авто-вход:", e); }
    })();
  }, []);

  // ведущая открыла карту конкретного героя на просмотр (?gmview=1&campaign=..&char=..)
  useEffect(() => {
    if (!cloud || !gmview) return;
    const camp = _params.get("campaign"), cid = _params.get("char");
    if (!camp || !cid) return;
    (async () => {
      try { await auth.signInAnonymously(); } catch (e) {}
      try {
        const doc = await db.collection("campaigns").doc(camp).collection("characters").doc(cid).get();
        if (doc.exists) { skipSave.current = true; setData({ ...makeDefaults(), ...doc.data() }); setCampaign(camp); setCharId(cid); setJoined(true); setCreating(false); }
      } catch (e) { console.error("Просмотр карты:", e); }
    })();
  }, []);

  // сообщаем оболочке о входе — чтобы появились вкладки (древо/миры/граф)
  useEffect(() => { if (joined && !gmview) { try { window.dispatchEvent(new Event("ragnarok:auth")); } catch (e) {} } }, [joined]);

  // BUG-9: локальная копия пишется сразу на каждое изменение; в облако — только по «Применить».
  // Гидрация (вход / чтение из облака) не считается правкой — её отсекаем по skipSave.
  useEffect(() => {
    if (!gmview) { try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) {} }   // чужую карту в свою локалку не пишем
    if (skipSave.current) { skipSave.current = false; return; }
    if (joined && cloud && campaign && charId && (!gmview || gmEditing)) setDirty(true);
  }, [data, joined, campaign, charId, cloud, gmview]);

  // предупреждаем, если уходишь с несохранёнными в облако правками
  useEffect(() => {
    if (!cloud) return;
    const h = (e) => { if (dirty) { e.preventDefault(); e.returnValue = ""; } };
    window.addEventListener("beforeunload", h);
    return () => window.removeEventListener("beforeunload", h);
  }, [cloud, dirty]);

  // запись данных в облако (общая для «Применить» и финала визарда)
  const saveNow = async (d) => {
    if (!gmview) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch (e) {} }
    if (cloud && campaign && charId) {
      await db.collection("campaigns").doc(campaign).collection("characters").doc(charId).set(d);
    }
    setDirty(false);
  };
  const applyToCloud = async () => {
    if (applying) return;
    setApplying(true);
    try {
      await saveNow(data);
      setSaved(true); setTimeout(() => setSaved(false), 1600);
    } catch (e) {
      console.error("Применить:", e);
      alert("Не удалось сохранить в облако — проверь связь и попробуй ещё раз. Локальная копия цела.");
    }
    setApplying(false);
  };

  const set = (patch) => setData((d) => ({ ...d, ...patch }));
  const setAttrDie = (k, die) => setData((d) => ({ ...d, attrs: { ...d.attrs, [k]: { die, plus: die === 12 ? d.attrs[k].plus : 0 } } }));
  const setAttrPlus = (k, p) => setData((d) => ({ ...d, attrs: { ...d.attrs, [k]: { die: 12, plus: d.attrs[k].plus === p ? 0 : p } } }));
  const setSkill = (k, v) => setData((d) => ({ ...d, skills: { ...d.skills, [k]: v } }));
  const applyAdvance = (patch) => { setData((d) => ({ ...d, ...patch, spent: (d.spent || 0) + 1 })); setAdvOpen(false); };

  async function joinCampaign(code, charName) {
    const name = (charName || "").trim();
    if (!name) throw new Error("Введи имя персонажа.");
    try { await auth.signInAnonymously(); }
    catch (e) { throw new Error("Анонимный вход выключен. Ведущей: включи Anonymous в Firebase → Authentication."); }
    try {
      const cfg = await db.collection("campaigns").doc(code).collection("config").doc("lists").get();
      if (cfg.exists) { const c = cfg.data(); setLists({ hindrances: (c.hindrances && c.hindrances.length) ? c.hindrances : DEFAULT_HINDRANCES, edges: (c.edges && c.edges.length) ? c.edges : DEFAULT_EDGES }); }
    } catch (e) { console.error("Списки:", e); }
    const col = db.collection("campaigns").doc(code).collection("characters");
    let id = null, d = null;
    try {
      const q = await col.where("name", "==", name).limit(1).get();
      if (!q.empty) { const doc = q.docs[0]; id = doc.id; d = { ...makeDefaults(), ...doc.data() }; if (doc.data().created === undefined) d.created = true; }
    } catch (e) { console.error("Поиск по имени:", e); }
    if (!id) {
      id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
      d = { ...makeDefaults(), name: name, created: false };
      await col.doc(id).set(d);
    }
    try { localStorage.setItem("ragnarok-charid-" + code + "-" + name.toLowerCase(), id); } catch (e) {}
    try { localStorage.setItem("ragnarok-current", JSON.stringify({ campaign: code, charId: id })); } catch (e) {}
    skipSave.current = true;
    setCampaign(code); setCharId(id); setData(d); setJoined(true); setCreating(d.created === false);
  }

  const { attrs, skills } = data;
  const fighting = skills["Рукопашный"];
  const parry = 2 + (fighting ? halfDie(fighting) : 0);
  const vig = attrs.vigor, str = attrs.strength;
  const tough = 2 + halfDie(vig.die) + vig.plus;
  const load = 5 * (str.die + str.plus);
  const derived = [{ k: "Скорость", v: "6\u2033" }, { k: "Парирование", v: parry }, { k: "Стойкость", v: tough }, { k: "Размер", v: 0 }, { k: "Нагрузка", v: load }];
  const tier = tierOf(data.advances);
  const arch = dominantArch(attrs);
  const nextStep = Math.min(data.shards + 1, 9);           // ближайший шаг древа (BUG-7)
  const availAdv = Math.max(0, (data.advances || 0) - (data.spent || 0));   // начислено минус потрачено
  // подписи-подсказки для эджей/изъянов на листе (BUG-6) — по имени из списков кампании
  const baseName = (s) => String(s).replace(/\s*\((?:большой|малый)\)\s*$/i, "").trim();
  const edgeMeta = {}; (lists.edges || []).forEach((e) => { edgeMeta[e.n] = e; });
  const hindMeta = {}; (lists.hindrances || []).forEach((h) => { hindMeta[h.n] = h; });
  const edgeTip = (s) => { const m = edgeMeta[baseName(s)]; return m ? (m.d + (m.r && m.r !== "—" ? " · требование: " + m.r : "")) : null; };
  const hindTip = (s) => { const m = hindMeta[baseName(s)]; return m ? m.d : null; };

  const onImg = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => { const im = new Image(); im.onload = () => { const max = 360, sc = Math.min(1, max / im.width); const c = document.createElement("canvas"); c.width = Math.round(im.width * sc); c.height = Math.round(im.height * sc); c.getContext("2d").drawImage(im, 0, 0, c.width, c.height); set({ img: c.toDataURL("image/jpeg", 0.85) }); }; im.src = rd.result; };
    rd.readAsDataURL(f);
  };
  const exportJSON = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = (data.name ? data.name.replace(/\s+/g, "_") : "герой") + "-карта.json"; a.click(); };
  const importJSON = (e) => { const f = e.target.files && e.target.files[0]; if (!f) return; const rd = new FileReader(); rd.onload = () => { try { setData({ ...makeDefaults(), ...JSON.parse(rd.result) }); } catch (err) { alert("Не удалось прочитать файл карты."); } }; rd.readAsText(f); e.target.value = ""; };
  const resetAll = () => { if (confirm("Стереть карту начисто? Сделай сначала Экспорт, если жаль.")) { skipSave.current = false; setData(makeDefaults()); } };

  if (cloud && !joined) return gmview ? <div className="gate-wrap"><div className="gate"><div className="wordmark"><span className="rune">ᛈ</span> Рагнарёк-AU</div><h2>Загрузка карты…</h2></div></div> : <JoinGate onJoin={joinCampaign} />;
  if (creating) return <CreationWizard data={data} lists={lists} set={set} setAttrDie={setAttrDie} setSkill={setSkill} onDone={async () => {
    const finalData = { ...data, created: true };
    skipSave.current = true;                                // мы сами кладём в облако ниже — не помечаем как правку
    setData(finalData); setCreating(false);
    try { await saveNow(finalData); setSaved(true); setTimeout(() => setSaved(false), 1600); }
    catch (e) { console.error("Сохранение после создания:", e); setDirty(true); }
  }} />;

  return (
    <React.Fragment>
    <div className={"stele" + (fieldEdit ? "" : " view-locked") + (canEdit && !progEdit ? " prog-locked" : "")}>
      <div className="top">
        <div className="wordmark"><span className="rune">ᛈ</span> Рагнарёк-AU</div>
        <div className="tools no-print">
          {gmview ? (
            <button className="iobtn" onClick={async () => { if (gmEditing && cloud && dirty) await applyToCloud(); setGmEditing((e) => !e); }} style={gmEditing ? { borderColor: "var(--bronze)", color: "var(--bronze)" } : { borderColor: "var(--line-warm)", color: "var(--bronze)" }}>
              {gmEditing ? "✓ Готово · ведущая" : "✎ Править как ведущая"}
            </button>
          ) : (
            <button className="iobtn" onClick={async () => { if (editing && cloud && dirty) await applyToCloud(); setEditing((e) => !e); }} style={editing ? { borderColor: "var(--steel)", color: "var(--steel)" } : undefined}>
              {editing ? "✓ Готово" : "✎ Редактировать"}
            </button>
          )}
          {(!gmview || gmEditing) && cloud && dirty && <span className="unsynced"><span className="dot" /> не сохранено</span>}
          {(!gmview || gmEditing) && cloud && dirty && <button className="iobtn apply" onClick={applyToCloud} disabled={applying}><span className="rune">ᛏ</span>{applying ? "Сохраняю…" : "Применить"}</button>}
          <span className={"saved" + (saved ? " on" : "")}><span className="rune">ᛊ</span> сохранено</span>
          {cloud ? <span className="mode cloud">облако · {campaign}</span> : <span className="mode local">локально</span>}
          <button className="iobtn" onClick={exportJSON}><span className="rune">ᛟ</span> Экспорт</button>
          {!gmview && <label className="iobtn"><span className="rune">ᛟ</span> Импорт<input type="file" accept="application/json" onChange={importJSON} style={{ display: "none" }} /></label>}
          <button className="iobtn" onClick={() => window.print()}><span className="rune">ᛚ</span> Печать</button>
          {!gmview && <button className="iobtn" onClick={resetAll}>Сброс</button>}
        </div>
      </div>

      <div className="idrow">
        <label className="avatar" title="загрузить портрет">
          {data.img ? <img src={data.img} alt="портрет" /> : <span className="ph"><span className="rune">ᛗ</span>портрет</span>}
          <input className="no-print" type="file" accept="image/*" onChange={onImg} style={{ display: "none" }} />
        </label>
        <div className="idfields">
          <div className="row2">
            <div className="field" style={{ flex: 2, minWidth: 200 }}><label>Имя героя</label><input className="t-input big" value={data.name} onChange={(e) => set({ name: e.target.value })} placeholder="кто ты сейчас" /></div>
            <div className="field" style={{ flex: 1, minWidth: 180 }}>
              <label>Концепт <span className="tip" data-tip="кто ты в двух словах до пробуждения" style={{ color: "var(--faint)" }}>?</span></label>
              <input className="t-input" value={data.concept} onChange={(e) => set({ concept: e.target.value })} placeholder="рыбак, студентка-медик…" />
            </div>
          </div>
          <div className="field"><label>Биография · кратко</label><textarea className="ta" value={data.bio} onChange={(e) => set({ bio: e.target.value })} placeholder="откуда, чем жил до того, как миф постучал" /></div>
          <div className="arc">смертный&nbsp;&rarr;&nbsp;<b>?</b><span className="sh">осколков {data.shards}/9</span></div>
          <div className="adv no-print">
            <div className="blk"><span className="k">Ранг</span><span className="rk">{tier}</span>{tier !== "Смертный" && arch && <span className="rk-arch">· {arch}</span>}</div>
            <div className="blk">
              <span className="k tip" data-tip="всего начислено адвансов — начисляет ведущая; растит ранг, ранг не падает">Продвижения</span>
              <div className="stepper prog">
                <button onClick={() => set({ advances: Math.max(0, data.advances - 1) })} aria-label="меньше">&minus;</button>
                <span className="num">{data.advances}</span>
                <button onClick={() => set({ advances: data.advances + 1 })} aria-label="больше">+</button>
              </div>
            </div>
            {!gmview && <div className="blk"><span className="k tip" data-tip="начислено минус потрачено — столько улучшений можно взять">Доступно</span><span className="rk" style={{ color: availAdv > 0 ? "var(--bronze)" : "var(--faint)" }}>{availAdv}</span></div>}
            {!gmview && <button className="iobtn adv-open" onClick={() => setAdvOpen(true)} disabled={availAdv <= 0}><span className="rune">ᚦ</span> Потратить{availAdv > 0 ? " (" + availAdv + ")" : ""}</button>}
            {nextRankAt(data.advances) != null && <span className="adv-next">до «{RANKS[rankIndex(data.advances) + 1].name}» — {nextRankAt(data.advances) - data.advances}</span>}
          </div>
        </div>
      </div>

      <div className="grid2">
        <div className="card prog">
          <div className="sec-title"><span className="rune" style={{ color: "var(--steel)" }}>ᚨ</span> Атрибуты</div>
          <div className="divider" />
          {ATTRS.map((at) => {
            const a = attrs[at.key];
            return (
              <div className="trait-row" key={at.key}>
                <div className="trait-name">{at.label}<span className={"val-chip" + (a.plus > 0 ? " divine" : "")}>{fmt(a.die, a.plus)}</span></div>
                <div className="track-wrap">
                  <div className="track">{DICE.map((d) => (<button key={d} className={"pip" + (a.die === d && a.plus === 0 ? " on" : "")} onClick={() => setAttrDie(at.key, d)}>d{d}</button>))}</div>
                  {a.die === 12 && (
                    <div className="track divine-track">
                      <span className="dcap"><span className="rune">ᛟ</span> сверх</span>
                      {[1, 2, 3].map((p) => (<button key={p} className={"pip divine" + (a.plus === p ? " on" : "")} onClick={() => setAttrPlus(at.key, p)} title="слом потолка — дар древа">+{p}</button>))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
          <div className="derived">{derived.map((d) => (<div className="stat" key={d.k}><div className="v">{d.v}</div><div className="k">{d.k}</div></div>))}</div>
          <div className="auto-note">Считается само: Парирование от Рукопашного, Стойкость и Нагрузка — от Выносливости и Силы.</div>
        </div>

        <div className="card prog">
          <div className="sec-title"><span className="rune" style={{ color: "var(--steel)" }}>ᚱ</span> Навыки</div>
          <div className="divider" />
          <div className="skgroup-label">Ядро · у всех</div>
          {CORE.map((k) => <SkillRow key={k.n} sk={k} value={skills[k.n]} core onChange={(v) => setSkill(k.n, v)} />)}
          <div className="skgroup-label">Доступно поднимать</div>
          {OPEN.map((k) => <SkillRow key={k.n} sk={k} value={skills[k.n]} onChange={(v) => setSkill(k.n, v)} />)}
          {LOCKED.some((l) => skills[l.name] != null) && <React.Fragment>
            <div className="skgroup-label" style={{ color: "var(--bronze)" }}>Мифическое · открыто древом</div>
            {LOCKED.filter((l) => skills[l.name] != null).map((l) => <SkillRow key={l.name} sk={{ n: l.name, a: "—", w: l.hint }} value={skills[l.name]} onChange={(v) => setSkill(l.name, v)} />)}

        <div className="grid2" style={{ gap: 28 }}>

        <div className="cols">

            <h5><span className="rune">ᛗ</span> Смертный рост · Адванс</h5>
            <p className="lead">Обычная прокачка Саваги. Раз в одну-две сессии ведущая даёт адванс.</p>
            <ul><li>Адвансы начисляет <b>ведущая</b>; ты тратишь их кнопкой «Потратить».</li><li>За адванс — <b>одно</b>: поднять навык; взять эдж; открыть пару навыков с нуля.</li><li>Поднять атрибут — <b>раз в ранг</b>; потолок d12 (выше — только древом).</li><li>Счётчик только растёт → растёт ранг: <b>Смертный → Пробуждённый → Герой → Витязь → Полубог → Ас → Бог</b>. Ранг не падает.</li></ul>
          </div>
          <div className="div-h">
            <h5><span className="rune">ᛟ</span> Божественный рост · Шаг древа</h5>
            <p className="lead">Твоё пробуждение. Раз на мир — <b>9 за кампанию</b>, не тратит адванс.</p>
            <ul><li>Шаг — выбор на ближайшей развилке: видишь варианты и их боны, но не бога.</li><li>Бон — <b>одно</b>: открыть мифику; +1 сверх d12; аспект-сила; или осколок.</li><li>В конце <b>9-го мира</b> раскрывается наследие. Рагнарёк — 10-я арка.</li></ul>
          </div>
        </div>
      </div>

      <div className="hints">
        <div className="hint"><div className="ht"><span className="rune">ᚠ</span> Инициатива</div><div className="hb">Тяни руну из мешочка. Порядок — по Футарку.</div></div>
        <div className="hint joker"><div className="ht"><span className="rune">ᛈ</span> Перт — Джокер</div><div className="hb">Ходишь когда хочешь. +2 ко всем чертам и урону в раунде.</div></div>
        <div className="hint"><div className="ht"><span className="rune">ᚦ</span> Бросок черты</div><div className="hb">Кубик черты + рунический d6. На «взрыве» руна — омен.</div></div>
      </div>

      <div className="footnote">v0.7 · экран игрока. {cloud ? "Облако подключено — карта пишется в Firebase." : "Облако не настроено — карта живёт локально в браузере."} Кубики и руны кидаются вживую. Кнопка «Печать» даёт отдельный компактный лист.</div>
    </div>
    {advOpen && !gmview && <AdvanceModal data={data} lists={lists} onApply={applyAdvance} onClose={() => setAdvOpen(false)} />}
    <PrintSheet data={data} />
    </React.Fragment>
  );
}

function PrintSheet({ data }) {
  const { attrs, skills } = data;
  const fighting = skills["Рукопашный"];
  const parry = 2 + (fighting ? halfDie(fighting) : 0);
  const tough = 2 + halfDie(attrs.vigor.die) + attrs.vigor.plus;
  const load = 5 * (attrs.strength.die + attrs.strength.plus);
  const tier = tierOf(data.advances);
  const arch = dominantArch(attrs);
  const trained = OPEN.filter((s) => skills[s.n] != null);
  const rankLine = tier + (tier !== "Смертный" && arch ? " · " + arch : "");
  const renderList = (arr) => arr && arr.length ? arr.map((x, i) => <div className="p-li" key={i}>• {x}</div>) : <div className="p-empty">—</div>;
  return (
    <div className="print-sheet">
      <div className="p-head">
        {data.img ? <img className="p-av" src={data.img} alt="" /> : null}
        <div className="p-id">
          <div className="p-name">{data.name || "—"}</div>
          <div className="p-cc">{data.concept || ""}</div>
        </div>
        <div className="p-meta">
          <div className="pr">{rankLine}</div>
          <div>адвансов {data.advances} · осколков {data.shards}/9</div>
        </div>
      </div>
      <div className="p-attrs">
        {ATTRS.map((a) => <span key={a.key}><b>{a.label}</b> {fmt(attrs[a.key].die, attrs[a.key].plus)}</span>)}
      </div>
      <div className="p-derived">Скорость 6&#8243; · Парирование {parry} · Стойкость {tough} · Размер 0 · Нагрузка {load}</div>
      <div className="p-sec">Навыки</div>
      <div className="p-skills">
        {CORE.map((s) => <div className="p-sk" key={s.n}><span>{s.n}</span><span className="d">{fmt(skills[s.n], 0)}</span></div>)}
        {trained.map((s) => <div className="p-sk" key={s.n}><span>{s.n}</span><span className="d">{fmt(skills[s.n], 0)}</span></div>)}
      </div>
      <div className="p-sec">Бой</div>
      <div className="p-combat">
        <div className="p-track"><span className="p-tl">Раны</span><span className="p-box">Контужен</span><span className="p-box">−1</span><span className="p-box">−2</span><span className="p-box">−3</span><span className="p-box">Выведен</span></div>
        <div className="p-track"><span className="p-tl">Усталость</span><span className="p-box">−1</span><span className="p-box">−2</span><span className="p-box">Выведен</span></div>
        <div className="p-track"><span className="p-tl">Бенни</span><span className="p-bn"></span><span className="p-bn"></span><span className="p-bn"></span><span className="p-bn"></span><span className="p-bn"></span></div>
        <div className="p-track"><span className="p-tl">Состояния</span><span className="p-cond">Отвлечён · Уязвим · Оглушён · Горит · Обморожен · Перегрев · ________________</span></div>
      </div>
      <div className="p-sec">Оружие и броня</div>
      <table className="p-weap"><thead><tr><th>Оружие</th><th>Урон</th><th>Дальн.</th><th>Прим.</th></tr></thead><tbody><tr><td></td><td></td><td></td><td></td></tr><tr><td></td><td></td><td></td><td></td></tr><tr><td></td><td></td><td></td><td></td></tr></tbody></table>
      <div className="p-armor">Броня: ____________________ · Защита: ______</div>
      <div className="p-cols">
        <div><div className="p-sec">Эджи</div>{renderList(data.edges)}</div>

      <div className="p-cols">

function WizSkill({ sk, core, data, setSkill }) {
  const attrDie = data.attrs[ATTR_OF[sk.a]].die;
  const val = data.skills[sk.n];
  return (
    <div className="wiz-row">
      <div className="trait-name" style={{ paddingTop: 0 }}><span>{sk.n}</span><span className="attr-chip" style={{ color: ATTR_TINT[sk.a], borderColor: ATTR_TINT[sk.a] }}>{sk.a}</span></div>
      <div className="track">
        {!core && <button className={"pip untr" + (val == null ? " on" : "")} onClick={() => setSkill(sk.n, null)} title="не обучен">—</button>}
        {DICE.map((d) => <button key={d} className={"pip" + (val === d ? " on" : "") + (DLEVEL[d] > (DLEVEL[attrDie] || 1) ? " x2" : "")} onClick={() => setSkill(sk.n, d)} title={DLEVEL[d] > (DLEVEL[attrDie] || 1) ? "выше атрибута — 2 очка за шаг" : ""}>d{d}</button>)}
      </div>
    </div>
  );
}

function CreationWizard({ data, lists, set, setAttrDie, setSkill, onDone }) {
  const [step, setStep] = useState(0);
  const [hind, setHind] = useState([]);
  const [conv, setConv] = useState({ attr: 0, edge: 0, skill: 0 });
  const [custH, setCustH] = useState("");
  const [custE, setCustE] = useState("");

  const allSkills = [...CORE.map((c) => ({ ...c, core: true })), ...OPEN.map((o) => ({ ...o, core: false }))];
  const attrSpent = ATTRS.reduce((s, a) => s + attrCost(data.attrs[a.key].die), 0);
  const attrBudget = ATTR_POINTS + conv.attr;
  const skillSpent = allSkills.reduce((s, sk) => s + skillCost(data.skills[sk.n], sk.core, data.attrs[ATTR_OF[sk.a]].die), 0);
  const skillBudget = SKILL_POINTS + conv.skill;
  const majors = hind.filter((h) => h.s === "major").length;
  const minors = hind.filter((h) => h.s === "minor").length;
  const hp = Math.min(majors, 1) * 2 + Math.min(minors, 2);
  const hpUsed = conv.attr * 2 + conv.edge * 2 + conv.skill;
  const hpLeft = hp - hpUsed;
  const edgeSlots = 1 + conv.edge;

  const hindNames = (arr) => arr.map((x) => x.n + (x.s === "major" ? " (большой)" : " (малый)"));
  const conflictWith = (name) => { const taken = [...hind.map((x) => x.n), ...data.edges]; return (CONFLICTS[name] || []).find((c) => taken.includes(c)); };
  const hindLimitMsg = (sev) =>
    sev === "major" ? "Можно взять только один большой изъян (1 большой + 2 малых — потолок по правилам)." :
    "Можно взять не больше двух малых изъянов (1 большой + 2 малых — потолок по правилам).";
  const overHindLimit = (sev) => (sev === "major" ? majors >= 1 : minors >= 2);
  const toggleHind = (h) => {
    const has = hind.find((x) => x.n === h.n);
    if (!has) {
      const c = conflictWith(h.n); if (c) { alert("«" + h.n + "» не сочетается с «" + c + "» — выбери что-то одно."); return; }
      if (overHindLimit(h.s)) { alert(hindLimitMsg(h.s)); return; }
    }
    const next = has ? hind.filter((x) => x.n !== h.n) : [...hind, h];
    setHind(next); set({ hindrances: hindNames(next) });
  };
  const addCustH = (sev) => { const v = custH.trim(); if (!v) return; if (overHindLimit(sev)) { alert(hindLimitMsg(sev)); return; } const next = [...hind, { n: v, s: sev }]; setHind(next); set({ hindrances: hindNames(next) }); setCustH(""); };
  const setConvK = (k, dir) => setConv((c) => {
    const v = c[k] + dir; if (v < 0) return c;
    const use = (k === "attr" ? v : c.attr) * 2 + (k === "edge" ? v : c.edge) * 2 + (k === "skill" ? v : c.skill);
    if (dir > 0 && use > hp) return c;
    return { ...c, [k]: v };
  });
  const toggleEdge = (name) => {
    const has = data.edges.includes(name);
    if (!has) {
      const c = conflictWith(name); if (c) { alert("«" + name + "» не сочетается с «" + c + "» — выбери что-то одно."); return; }
      if (data.edges.length >= edgeSlots) { alert("Нет свободных слотов эджей — возьми ещё слот за очки изъянов или убери эдж."); return; }
    }
    set({ edges: has ? data.edges.filter((e) => e !== name) : [...data.edges, name] });
  };
  const addCustE = () => { const v = custE.trim(); if (!v) return; if (data.edges.length >= edgeSlots) { alert("Нет свободных слотов эджей."); return; } set({ edges: [...data.edges, v] }); setCustE(""); };

  const overBudget = attrSpent > attrBudget || skillSpent > skillBudget || hpUsed > hp || data.edges.length > edgeSlots;

  // Динамический порядок: после «Изъянов» возвращаемся на те вкладки, куда сконвертили очки
  const seq = (() => {
    const s = ["who", "attr", "skill", "hind"];
    if (conv.attr > 0) s.push("attr");
    if (conv.skill > 0) s.push("skill");
    s.push("edge", "gear");
    return s;
  })();
  const cur = seq[Math.min(step, seq.length - 1)];
  const returning = step > seq.indexOf("hind"); // повторный заход на распределение

  const stepErr =
    cur === "attr" && attrSpent > attrBudget ? "Перебор очков атрибутов — опусти какой-нибудь кубик." :
    cur === "skill" && skillSpent > skillBudget ? "Перебор очков навыков — опусти навык или подними его атрибут." :
    cur === "hind" && hpUsed > hp ? "Обменяно больше очков, чем дают изъяны — убери обмен или добавь изъян." :
    cur === "edge" && data.edges.length > edgeSlots ? "Эджей больше, чем слотов — убери эдж или возьми слот за очки изъянов." : "";

  const finish = () => {
    const parts = [];
    if (hpLeft > 0) parts.push(hpLeft + " очк. изъянов не обменяно");
    if (attrBudget - attrSpent > 0) parts.push((attrBudget - attrSpent) + " очк. атрибутов не вложено");
    if (skillBudget - skillSpent > 0) parts.push((skillBudget - skillSpent) + " очк. навыков не вложено");
    if (parts.length && !window.confirm("Осталось нераспределённым: " + parts.join("; ") + ".\n\nЭти очки сгорят — лист сохранится как есть. Всё равно завершить?")) return;
    onDone();
  };

  return (
    <div className="wiz-wrap">
      <div className="wiz-card">
        <div className="wiz-top">
          <div className="wordmark"><span className="rune">ᛈ</span> Создание героя</div>
          <button className="wiz-skip" onClick={onDone}>заполню сам →</button>
        </div>
        <div className="wiz-steps">{seq.map((s, i) => <span key={i} className={"wiz-dot" + (i === step ? " on" : i < step ? " done" : "")} />)}</div>

        {cur === "who" && (
          <div>
            <h2 className="wiz-h">Кто ты сейчас</h2>
            <p className="wiz-sub">Обычный современный скандинав. Имя — по нему ты будешь входить в кампанию, так что запомни его.</p>
            <div className="field" style={{ marginBottom: 14 }}><label>Имя героя</label><input className="t-input big" value={data.name} onChange={(e) => set({ name: e.target.value })} placeholder="как тебя зовут" /></div>
            <div className="field"><label>Концепт</label><input className="t-input" value={data.concept} onChange={(e) => set({ concept: e.target.value })} placeholder="рыбак, студентка-медик, бывший военный…" /></div>
          </div>
        )}

        {cur === "attr" && (
          <div>
            <h2 className="wiz-h">Атрибуты</h2>
            {returning && <div className="wiz-return">Распредели очки, полученные за изъяны — иначе они сгорят.</div>}
            <p className="wiz-sub">Все стартуют с d4. Подними кубики — всего {ATTR_POINTS} очка{conv.attr ? " + " + conv.attr + " от изъянов" : ""}, шаг = 1 очко.</p>
            <div className={"wiz-budget " + (attrSpent > attrBudget ? "over" : "ok")}>Очки атрибутов: <b>{attrSpent}/{attrBudget}</b></div>
            {ATTRS.map((at) => { const a = data.attrs[at.key]; return (
              <div className="wiz-row" key={at.key}>
                <div className="trait-name" style={{ paddingTop: 0 }}>{at.label}<span className="val-chip">{fmt(a.die, a.plus)}</span></div>
                <div className="track">{DICE.map((d) => <button key={d} className={"pip" + (a.die === d ? " on" : "")} onClick={() => setAttrDie(at.key, d)}>d{d}</button>)}</div>
              </div>
            ); })}
          </div>
        )}

        {cur === "skill" && (
          <div>
            <h2 className="wiz-h">Навыки</h2>
            {returning && <div className="wiz-return">Распредели очки, полученные за изъяны — иначе они сгорят.</div>}
            <p className="wiz-sub">{SKILL_POINTS} очков{conv.skill ? " + " + conv.skill + " от изъянов" : ""}. Пять основных уже на d4 даром. Поднять навык выше его атрибута — <b>2 очка</b> за шаг (помечены штрихом).</p>
            <div className={"wiz-budget " + (skillSpent > skillBudget ? "over" : "ok")}>Очки навыков: <b>{skillSpent}/{skillBudget}</b></div>
            <div className="skgroup-label">Ядро · у всех с d4</div>
            {CORE.map((sk) => <WizSkill key={sk.n} sk={sk} core data={data} setSkill={setSkill} />)}
            <div className="skgroup-label">Прочие навыки</div>
            {OPEN.map((sk) => <WizSkill key={sk.n} sk={sk} data={data} setSkill={setSkill} />)}
          </div>
        )}

        {cur === "hind" && (
          <div>
            <h2 className="wiz-h">Изъяны</h2>
            <p className="wiz-sub">Слабости дают очки: большой = 2, малый = 1, всего до 4. Ниже обменяй их на атрибуты, эджи или навыки.</p>
            <div className={"wiz-budget " + (hpUsed > hp ? "over" : "ok")}>Очки изъянов: <b>{hp}</b> · потрачено <b>{hpUsed}</b></div>
            {lists.hindrances.map((h) => { const on = hind.find((x) => x.n === h.n); const blocked = !on && overHindLimit(h.s); return (
              <button key={h.n} className={"choice" + (on ? " on" : "")} style={blocked ? { opacity: 0.4 } : null} onClick={() => toggleHind(h)}>
                <span className="cn">{h.n}</span><span className={"csev " + h.s}>{h.s === "major" ? "большой" : "малый"}</span>
                <div className="cd">{h.d}</div>
              </button>
            ); })}
            <div className="custom-add"><input value={custH} onChange={(e) => setCustH(e.target.value)} placeholder="свой изъян" /><button className="addbtn" onClick={() => addCustH("minor")}>+ малый</button><button className="addbtn" onClick={() => addCustH("major")}>+ большой</button></div>
            <div className="conv">
              <div className="conv-card"><div className="ct">+1 атрибут</div><div className="cc2">2 очка</div><div className="conv-ctl"><button onClick={() => setConvK("attr", -1)}>−</button><span className="cv">{conv.attr}</span><button onClick={() => setConvK("attr", 1)}>+</button></div></div>
              <div className="conv-card"><div className="ct">+1 эдж</div><div className="cc2">2 очка</div><div className="conv-ctl"><button onClick={() => setConvK("edge", -1)}>−</button><span className="cv">{conv.edge}</span><button onClick={() => setConvK("edge", 1)}>+</button></div></div>
              <div className="conv-card"><div className="ct">+1 навык</div><div className="cc2">1 очко</div><div className="conv-ctl"><button onClick={() => setConvK("skill", -1)}>−</button><span className="cv">{conv.skill}</span><button onClick={() => setConvK("skill", 1)}>+</button></div></div>
            </div>
            {hpLeft > 0 && <p className="wiz-sub" style={{ marginTop: 10 }}>Нераспределённых очков: {hpLeft}.</p>}
          </div>
        )}

        {cur === "edge" && (
          <div>
            <h2 className="wiz-h">Эджи</h2>
            <p className="wiz-sub">Один эдж — даром (ты человек), плюс по эджу за каждые 2 очка изъянов. Требования автоматически не проверяются — свериться с ведущей.</p>
            <div className={"wiz-budget " + (data.edges.length > edgeSlots ? "over" : "ok")}>Слоты эджей: <b>{data.edges.length}/{edgeSlots}</b></div>
            {lists.edges.map((e) => { const on = data.edges.includes(e.n); return (
              <button key={e.n} className={"choice" + (on ? " on" : "")} onClick={() => toggleEdge(e.n)}>
                <span className="cn">{e.n}</span>
                <div className="cd">{e.d}</div><div className="creq">требование: {e.r}</div>
              </button>
            ); })}
            <div className="custom-add"><input value={custE} onChange={(e) => setCustE(e.target.value)} placeholder="свой эдж" /><button className="addbtn" onClick={addCustE}>+</button></div>
          </div>
        )}

        {cur === "gear" && (
          <div>
            <h2 className="wiz-h">Снаряжение и финал</h2>
            <p className="wiz-sub">Стартовые средства — на усмотрение ведущей. Опиши, что при тебе.</p>
            <textarea className="ta" style={{ minHeight: 80 }} value={data.gear} onChange={(e) => set({ gear: e.target.value })} placeholder="телефон, нож, машина, тёплая куртка…" />
            <div style={{ marginTop: 16, fontSize: 13, color: "var(--muted)" }}>
              <div>Атрибуты {attrSpent}/{attrBudget} · Навыки {skillSpent}/{skillBudget} · Изъянов {hind.length} · Эджей {data.edges.length}/{edgeSlots}</div>
              {overBudget && <div style={{ color: "var(--red)", marginTop: 6 }}>Где-то перебор очков — вернись и поправь, иначе лист нелегальный.</div>}
            </div>
          </div>
        )}

        <div className="wiz-nav">
          {step > 0 ? <button className="wiz-back" onClick={() => setStep(step - 1)}>Назад</button> : <span />}
          <div className="wiz-navright">
            {stepErr && <span className="wiz-err">{stepErr}</span>}
            {step < seq.length - 1 ? <button className="wiz-next" onClick={() => setStep(step + 1)} disabled={!!stepErr}>Далее</button>
              : <button className="wiz-next wiz-finish" onClick={finish} disabled={overBudget}>Готово</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function JoinGate({ onJoin }) {
  const [code, setCode] = useState("");
  const [nm, setNm] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const go = async () => {
    const c = code.trim().toLowerCase().replace(/[^a-zа-я0-9_-]/gi, "");
    if (!c) { setErr("Введи код кампании."); return; }
    setBusy(true); setErr("");
    try { await onJoin(c, nm.trim()); } catch (e) { setErr(e.message || "Не удалось войти."); setBusy(false); }
  };
  return (
    <div className="gate-wrap">
      <div className="gate">
        <div className="wordmark"><span className="rune">ᛈ</span> Рагнарёк-AU</div>
        <h2>Войти в кампанию</h2>
        <div className="sub">Код даёт ведущая. Карта сохранится в облаке.</div>
        <div className="field"><label>Код кампании</label><input className="t-input" value={code} onChange={(e) => setCode(e.target.value)} placeholder="напр. ragnarok2026" onKeyDown={(e) => e.key === "Enter" && go()} /></div>
        <div className="field"><label>Имя персонажа</label><input className="t-input" value={nm} onChange={(e) => setNm(e.target.value)} placeholder="кто ты" onKeyDown={(e) => e.key === "Enter" && go()} /></div>
        <button className="go" onClick={go} disabled={busy}>{busy ? "Вхожу…" : "Войти"}</button>
        {err && <div className="gerr">{err}</div>}
        <div className="gnote">Вернёшься с того же устройства — карта подхватится сама. На случай переезда жми Экспорт.</div>
      </div>
    </div>
  );
}

function SkillRow({ sk, value, core, onChange }) {
  return (
    <div className="trait-row" style={{ alignItems: "center" }}>
      <div className="trait-name" style={{ paddingTop: 0 }}>
        <span className="tip" data-tip={sk.w}>{sk.n}</span>
        <span className="attr-chip" style={{ color: ATTR_TINT[sk.a], borderColor: ATTR_TINT[sk.a] }}>{sk.a}</span>
      </div>
      <div className="track">
        {!core && (<button className={"pip untr" + (value == null ? " on" : "")} onClick={() => onChange(null)} title="не обучен (d4−2)">&mdash;</button>)}
        {DICE.map((d) => (<button key={d} className={"pip" + (value === d ? " on" : "")} onClick={() => onChange(d)}>d{d}</button>))}
      </div>
    </div>
  );
}

function AdvanceModal({ data, lists, onApply, onClose }) {
  const [mode, setMode] = useState("skill");
  const [aSel, setASel] = useState(null);
  const [sSel, setSSel] = useState(null);
  const [pair, setPair] = useState([]);
  const [eSel, setESel] = useState(null);
  const [custE, setCustE] = useState("");

  const rankIdx = rankIndex(data.advances);
  const avail = Math.max(0, (data.advances || 0) - (data.spent || 0));
  const canAttr = !(data.attrRanks || []).includes(rankIdx);
  const trained = [...CORE, ...OPEN, ...LOCKED.map((l) => ({ n: l.name }))].filter((s) => data.skills[s.n] != null && data.skills[s.n] < 12);
  const untrained = OPEN.filter((s) => data.skills[s.n] == null);
  const freeEdges = (lists.edges || []).map((e) => e.n).filter((n) => !data.edges.includes(n));
  const togglePair = (n) => setPair((p) => (p.includes(n) ? p.filter((x) => x !== n) : p.length >= 2 ? p : [...p, n]));

  let valid = false, patch = null;
  if (mode === "attr" && aSel && canAttr) {
    const a = data.attrs[aSel]; valid = a.die < 12;
    patch = { attrs: { ...data.attrs, [aSel]: { die: nextDie(a.die), plus: 0 } }, attrRanks: [...(data.attrRanks || []), rankIdx] };
  } else if (mode === "skill" && sSel) {
    valid = true; patch = { skills: { ...data.skills, [sSel]: nextDie(data.skills[sSel]) } };
  } else if (mode === "newskills" && pair.length === 2) {
    valid = true; const sk = { ...data.skills }; pair.forEach((n) => (sk[n] = 4)); patch = { skills: sk };
  } else if (mode === "edge") {
    const name = eSel || custE.trim();
    if (name && !data.edges.includes(name)) { valid = true; patch = { edges: [...data.edges, name] }; }
  }
  const apply = () => { if (valid && patch && avail > 0) onApply(patch); };

  return (
    <div className="adv-back" onClick={onClose}>
      <div className="adv-modal" onClick={(e) => e.stopPropagation()}>
        <h3><span className="rune">ᚦ</span> Потратить адванс</h3>
        <div className="asub">Ранг <b>{tierOf(data.advances)}</b> · доступно адвансов: <b>{avail}</b>. Выбери одно улучшение — оно потратит один адванс.</div>

        <div className="adv-seg-label">Что улучшаем</div>
        <div className="adv-pick">
          <button className={"adv-chip" + (mode === "skill" ? " on" : "")} onClick={() => setMode("skill")}>Навык +1</button>
          <button className={"adv-chip" + (mode === "newskills" ? " on" : "")} onClick={() => setMode("newskills")}>Два новых навыка</button>
          <button className={"adv-chip" + (mode === "edge" ? " on" : "")} onClick={() => setMode("edge")}>Новый эдж</button>
          <button className={"adv-chip" + (mode === "attr" ? " on" : "") + (canAttr ? "" : " dis")} onClick={() => canAttr && setMode("attr")}>Атрибут +1</button>
        </div>

        {mode === "attr" && (
          <div>
            <div className="adv-seg-label">Какой атрибут</div>
            {canAttr && (
              <div className="adv-pick">
                {ATTRS.map((at) => { const a = data.attrs[at.key]; const max = a.die >= 12; return (
                  <button key={at.key} className={"adv-chip" + (aSel === at.key ? " on" : "") + (max ? " dis" : "")} onClick={() => !max && setASel(at.key)}>{at.label}<span className="dn">{fmt(a.die, a.plus)}{max ? " · потолок" : " → " + fmt(nextDie(a.die), 0)}</span></button>
                ); })}
              </div>
            )}
            <div className={"adv-note" + (canAttr ? "" : " warn")}>{canAttr ? "Раз в ранг. Потолок d12 — выше только через древо." : "В этом ранге атрибут уже поднимался — следующий подъём с нового ранга. Сверх d12 ломается только древом."}</div>
          </div>
        )}

        {mode === "skill" && (
          <div>
            <div className="adv-seg-label">Какой навык поднять</div>
            <div className="adv-pick">
              {trained.map((s) => <button key={s.n} className={"adv-chip" + (sSel === s.n ? " on" : "")} onClick={() => setSSel(s.n)}>{s.n}<span className="dn">{fmt(data.skills[s.n], 0)} → {fmt(nextDie(data.skills[s.n]), 0)}</span></button>)}
            </div>
            {trained.length === 0 && <div className="adv-note">Нет навыков для подъёма — открой новые.</div>}
          </div>
        )}

        {mode === "newskills" && (
          <div>
            <div className="adv-seg-label">Открой два навыка с d4{pair.length ? " · выбрано " + pair.length + "/2" : ""}</div>
            <div className="adv-pick">
              {untrained.map((s) => <button key={s.n} className={"adv-chip" + (pair.includes(s.n) ? " on" : "")} onClick={() => togglePair(s.n)}>{s.n}</button>)}
            </div>
            {untrained.length === 0 && <div className="adv-note">Все доступные навыки уже открыты.</div>}
          </div>
        )}

        {mode === "edge" && (
          <div>
            <div className="adv-seg-label">Какой эдж</div>
            <div className="adv-pick">
              {freeEdges.map((n) => <button key={n} className={"adv-chip" + (eSel === n ? " on" : "")} onClick={() => { setESel(n); setCustE(""); }}>{n}</button>)}
            </div>
            <div className="custom-add"><input value={custE} onChange={(e) => { setCustE(e.target.value); setESel(null); }} placeholder="свой эдж" /></div>
            <div className="adv-note">Требования эджей сверяй с ведущей — автоматически не проверяются.</div>
          </div>
        )}

        <div className="adv-foot">
          <button className="wiz-back" onClick={onClose}>Отмена</button>
          <button className="wiz-next" onClick={apply} disabled={!valid || avail <= 0}>Применить улучшение</button>
        </div>
      </div>
    </div>
  );
}

function CombatBlock({ data, set, parry, tough, live }) {
  const [cc, setCc] = useState("");
  const CONDS = ["Отвлечён", "Уязвим", "Оглушён", "Горит", "Обморожен", "Перегрев"];
  const conds = data.conditions || [];
  const weapons = data.weapons || [];
  const guard = (fn) => (...a) => { if (live) fn(...a); };
  const toggleShaken = guard(() => set({ shaken: !data.shaken }));
  const setWound = guard((n) => set({ wounds: data.wounds === n ? n - 1 : n }));
  const toggleIncap = guard(() => set({ incap: !data.incap }));
  const setFatigue = guard((n) => set({ fatigue: data.fatigue === n ? n - 1 : n }));
  const bumpBenny = guard((d) => set({ bennies: Math.max(0, (data.bennies || 0) + d) }));
  const toggleCond = guard((c) => set({ conditions: conds.includes(c) ? conds.filter((x) => x !== c) : [...conds, c] }));
  const addCond = guard(() => { const v = cc.trim(); if (!v) return; if (!conds.includes(v)) set({ conditions: [...conds, v] }); setCc(""); });
  const addWeapon = guard(() => set({ weapons: [...weapons, { name: "", dmg: "", range: "", notes: "" }] }));
  const setWeap = guard((i, k, v) => set({ weapons: weapons.map((w, j) => (j === i ? { ...w, [k]: v } : w)) }));
  const delWeap = guard((i) => set({ weapons: weapons.filter((_, j) => j !== i) }));
  const newFight = guard(() => { if (window.confirm("Новый бой: обнулить раны, усталость, состояния и вернуть 3 бенни?")) set({ shaken: false, wounds: 0, fatigue: 0, incap: false, conditions: [], bennies: 3 }); });
  const customConds = conds.filter((c) => !CONDS.includes(c));

  return (
    <div className={"card combat" + (live ? " live" : "")} style={{ marginTop: 18 }}>
      <div className="sec-title" style={{ fontSize: 16 }}><span className="rune" style={{ color: "var(--steel)" }}>ᛏ</span> Бой</div>
      <div className="cmb-head">
        <span className="cmb-stat">Парирование<b>{parry}</b></span>
        <span className="cmb-stat">Стойкость<b>{tough}{data.armorVal ? " (" + data.armorVal + ")" : ""}</b></span>
        {live && <span className="cmb-live">живой трекинг</span>}
      </div>
      <div className="divider" />
      <div className="cmb-grid">
        <div>
          <div className="cmb-row">
            <span className="cmb-label">Раны</span>
            <button className={"cmb-box" + (data.shaken ? " on" : "")} onClick={toggleShaken}>Контужен</button>
            {[1, 2, 3].map((n) => <button key={n} className={"cmb-box wound" + (data.wounds >= n ? " on" : "")} onClick={() => setWound(n)}>−{n}</button>)}
            <button className={"cmb-box out" + (data.incap ? " on" : "")} onClick={toggleIncap}>Выведен</button>
            {data.wounds > 0 && <span className="cmb-pen">−{data.wounds} к броскам</span>}
          </div>
          <div className="cmb-row">
            <span className="cmb-label">Усталость</span>
            {[1, 2].map((n) => <button key={n} className={"cmb-box" + (data.fatigue >= n ? " on" : "")} onClick={() => setFatigue(n)}>−{n}</button>)}
            {data.fatigue > 0 && <span className="cmb-pen">−{data.fatigue} к броскам</span>}
          </div>
          <div className="cmb-row">
            <span className="cmb-label">Бенни</span>
            <div className="stepper"><button onClick={() => bumpBenny(-1)} aria-label="меньше">−</button><span className="num">{data.bennies || 0}</span><button onClick={() => bumpBenny(1)} aria-label="больше">+</button></div>
            <div className="benny-tok">{Array.from({ length: Math.min(data.bennies || 0, 10) }, (_, i) => <span key={i} className="bt" />)}</div>
          </div>
        </div>
        <div>
          <span className="cmb-label" style={{ width: "auto", display: "block", marginBottom: 6 }}>Состояния</span>
          <div className="cmb-conds">
            {CONDS.map((c) => <button key={c} className={"cond" + (conds.includes(c) ? " on" : "")} onClick={() => toggleCond(c)}>{c}</button>)}
            {customConds.map((c) => <button key={c} className="cond on" onClick={() => toggleCond(c)} title="убрать">{c} ×</button>)}
          </div>
          <div className="cmb-armor" style={{ marginTop: 10 }}>
            <input value={cc} onChange={(e) => setCc(e.target.value)} placeholder="своё состояние" onKeyDown={(e) => e.key === "Enter" && addCond()} style={{ flex: 1, minWidth: 120 }} />
            <button className="cmb-add" style={{ marginTop: 0 }} onClick={addCond}>+</button>
          </div>
        </div>
      </div>
      <div className="divider" />
      <span className="cmb-label" style={{ width: "auto", display: "block", marginBottom: 4 }}>Оружие</span>
      <table className="weap-table">
        <thead><tr><th style={{ width: "34%" }}>Оружие</th><th style={{ width: "16%" }}>Урон</th><th style={{ width: "16%" }}>Дальн.</th><th>Примечание</th><th style={{ width: 28 }} /></tr></thead>
        <tbody>
          {weapons.length === 0 && <tr><td colSpan={5} style={{ color: "var(--faint)", fontSize: 13, padding: "6px" }}>оружие не добавлено</td></tr>}
          {weapons.map((w, i) => (
            <tr key={i}>
              <td><input value={w.name || ""} onChange={(e) => setWeap(i, "name", e.target.value)} placeholder="нож, ружьё…" /></td>
              <td><input value={w.dmg || ""} onChange={(e) => setWeap(i, "dmg", e.target.value)} placeholder="Сил+d4" /></td>
              <td><input value={w.range || ""} onChange={(e) => setWeap(i, "range", e.target.value)} placeholder="—" /></td>
              <td><input value={w.notes || ""} onChange={(e) => setWeap(i, "notes", e.target.value)} placeholder="ББ, АП 2…" /></td>
              <td>{live && <button className="weap-del" onClick={() => delWeap(i)}>×</button>}</td>
            </tr>
          ))}
        </tbody>
      </table>
      {live && <button className="cmb-add" onClick={addWeapon}>+ оружие</button>}
      <div className="cmb-armor" style={{ marginTop: 12 }}>
        <input value={data.armor || ""} onChange={(e) => set({ armor: e.target.value })} placeholder="броня — куртка, бронежилет…" style={{ flex: 1, minWidth: 180 }} />
        <input value={data.armorVal || ""} onChange={(e) => set({ armorVal: e.target.value })} placeholder="защита +" style={{ width: 110 }} />
      </div>
      {live && <div style={{ marginTop: 12 }}><button className="cmb-reset" onClick={newFight}>сбросить бой · новая сессия</button></div>}
    </div>
  );
}

function DivinePath({ completed }) {
  const reached = completed >= 9;
  const nextStep = Math.min(completed + 1, 9);
  return (
    <div className="dpath">
      <div className="dpath-tiers">
        {PATH_TIERS.map((t) => {
          const span = t.to - t.from + 1;
          const isCur = !reached && nextStep >= t.from && nextStep <= t.to;
          return (
            <div key={t.name} className={"dpath-tier" + (isCur ? " cur" : "")} style={{ flex: span }}>
              <span className="dpt-name">{t.name}</span>
              <div className="dpath-steps">
                {Array.from({ length: span }, (_, i) => t.from + i).map((step) => {
                  const done = step <= completed;
                  const isNext = !reached && step === nextStep;
                  return <span key={step} className={"dstep" + (done ? " done" : "") + (isNext ? " next" : "")}>{step}</span>;
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div className="dpath-note">
        {reached
          ? <span>Все девять осколков собраны — впереди раскрытие наследия в Рагнарёке.</span>
          : <span><b>Сейчас:</b> шаг {nextStep} · {tierOfStep(nextStep).name}. {tierOfStep(nextStep).hint}</span>}
      </div>
    </div>
  );
}

function ListField({ items, onChange, placeholder, rune, tipFor }) {
  const [val, setVal] = useState("");
  const add = () => { const v = val.trim(); if (!v) return; onChange([...items, v]); setVal(""); };
  return (
    <div>
      <div className="list">
        {items.length === 0 && <div className="empty">пока пусто</div>}
        {items.map((it, i) => { const tip = tipFor ? tipFor(it) : null; return (<div className="lrow" key={i}><span className="rune lb">{rune}</span><span className="lt">{tip ? <span className="tip" data-tip={tip}>{it}</span> : it}</span><button className="lx no-print" onClick={() => onChange(items.filter((_, j) => j !== i))}>&times;</button></div>); })}
      </div>
      <div className="addrow no-print"><input className="t-input" value={val} onChange={(e) => setVal(e.target.value)} placeholder={placeholder} onKeyDown={(e) => e.key === "Enter" && add()} /><button className="addbtn" onClick={add}>+</button></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="app-shell.js" defer></script>
</body>
</html>
