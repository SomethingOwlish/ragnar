<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Рагнарёк-AU · Карта героя (облако)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Runic&display=swap');
:root{
  --bg:#E2EAF1; --surf:#F5F8FB; --surf2:#E8F0F6; --inset:#DCE6EF;
  --warm:#F3E9D6; --warm2:#ECE0C7; --warm-inset:#E7D9BB;
  --line:#C7D5E1; --line-soft:#D7E1EA; --line-warm:#D9C49B;
  --ink:#1B2733; --muted:#566779; --faint:#8B99A6;
  --steel:#2F6090; --steel-soft:#5C84AC; --bronze:#9A6B22; --bronze-deep:#6E4A14; --ember:#BC7E2A; --red:#A8482F;
  --disp:'Spectral',Georgia,serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; --rune:'Noto Sans Runic','Segoe UI Historic',serif;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased;}
input,textarea{font-family:inherit; color:inherit;}
button{font-family:inherit; cursor:pointer;}
.stele{max-width:1120px; margin:0 auto; padding:28px 22px 60px;}
.sec-title{font-family:var(--disp); font-weight:600; font-size:19px; display:flex; align-items:center; gap:10px; color:var(--ink);}
.rune{font-family:var(--rune); line-height:1;}
.card{background:var(--surf); border:1px solid var(--line); border-radius:11px; padding:18px;}
.divider{height:1px; background:var(--line-soft); margin:13px 0;}
.help{font-size:12px; color:var(--faint); margin:4px 0 2px; line-height:1.6;}
.top{display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;}
.wordmark{font-family:var(--disp); font-weight:700; font-size:15px; letter-spacing:.16em; text-transform:uppercase; display:flex; align-items:center; gap:10px;}
.wordmark .rune{color:var(--bronze); font-size:18px;}
.tools{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.mode{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:5px 11px; background:var(--surf);}
.mode.cloud{color:var(--steel); border-color:var(--steel-soft);}
.mode.local{color:var(--bronze); border-color:var(--line-warm);}
.saved{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--steel); display:flex; align-items:center; gap:5px; opacity:0; transition:opacity .3s;}
.saved.on{opacity:1;}
.iobtn{background:var(--surf); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 13px; font-size:12px; letter-spacing:.04em; display:inline-flex; align-items:center; gap:7px;}
.iobtn:hover{border-color:var(--bronze); color:var(--bronze);}
.iobtn .rune{font-size:14px;}
.idrow{display:flex; gap:18px; align-items:stretch; margin:20px 0; flex-wrap:wrap;}
.avatar{width:128px; height:178px; flex:none; border:1px solid var(--line); border-radius:11px; background:var(--surf2); overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:pointer;}
.avatar img{width:100%; height:100%; object-fit:cover;}
.avatar .ph{display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--faint); font-size:11px; letter-spacing:.1em; text-transform:uppercase;}
.avatar .ph .rune{font-size:34px; color:var(--steel-soft);}
.idfields{flex:1; min-width:260px; display:flex; flex-direction:column; gap:11px;}
.field label{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; display:block; margin-bottom:4px;}
.t-input{background:var(--surf); border:1px solid var(--line); border-bottom:2px solid var(--steel-soft); border-radius:8px 8px 4px 4px; padding:10px 12px; font-size:15px; outline:none; width:100%;}
.t-input:focus{border-bottom-color:var(--steel);}
.t-input.big{font-family:var(--disp); font-size:24px;}
.row2{display:flex; gap:12px; flex-wrap:wrap;}
.ta{background:var(--surf); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:14px; outline:none; width:100%; resize:vertical; min-height:54px; line-height:1.55;}
.ta:focus{border-color:var(--steel-soft);}
.arc{font-family:var(--disp); font-size:15px; color:var(--muted); display:flex; align-items:baseline; gap:14px;}
.arc b{color:var(--ember); font-weight:600;}
.arc .sh{font-family:var(--mono); font-size:12px; color:var(--muted);}
.adv{display:flex; gap:20px; align-items:center; flex-wrap:wrap;}
.adv .blk{display:flex; align-items:center; gap:9px;}
.adv .k{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600;}
.adv .rk{font-family:var(--disp); font-size:16px; color:var(--steel); font-weight:600;}
.adv .rk-arch{font-family:var(--disp); font-size:15px; color:var(--bronze); font-weight:500;}
.stepper{display:flex; align-items:center; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:var(--surf);}
.stepper button{background:var(--surf2); border:none; width:30px; height:30px; font-size:17px; color:var(--ink); line-height:1;}
.stepper button:hover{background:var(--inset);}
.stepper .num{min-width:36px; text-align:center; font-family:var(--mono); font-size:15px; font-weight:700;}
.grid2{display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:18px;}
.trait-row{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:9px 0;}
.trait-row + .trait-row{border-top:1px solid var(--line-soft);}
.trait-name{font-size:15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding-top:5px;}
.attr-chip{font-family:var(--mono); font-size:10px; letter-spacing:.08em; border:1px solid; border-radius:5px; padding:1px 5px; font-weight:500;}
.val-chip{font-family:var(--mono); font-size:11px; border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:var(--steel-soft);}
.val-chip.divine{color:var(--bronze); border-color:var(--line-warm); background:#FBF4E6;}
.tip{border-bottom:1px dotted var(--faint); cursor:help; position:relative;}
.tip:hover::after{content:attr(data-tip); position:absolute; left:0; bottom:calc(100% + 7px); max-width:230px; width:max-content; background:var(--ink); color:#F3F6FA; font-size:12px; line-height:1.4; padding:7px 10px; border-radius:7px; z-index:30; box-shadow:0 6px 18px -6px rgba(20,30,40,.5);}
.tip:hover::before{content:''; position:absolute; left:12px; bottom:calc(100% + 2px); border:5px solid transparent; border-top-color:var(--ink); z-index:30;}
.track-wrap{display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex:none;}
.track{display:flex; gap:4px; align-items:center;}
.pip{min-width:33px; text-align:center; padding:6px 4px; border:1px solid var(--line); background:var(--surf); color:var(--muted); border-radius:6px; font-family:var(--mono); font-size:13px; transition:.12s;}
.pip:hover{border-color:var(--steel-soft); color:var(--ink);}
.pip.on{background:var(--steel); border-color:var(--steel); color:#fff; font-weight:700;}
.pip.divine{border:1px solid var(--line-warm); color:var(--bronze); background:var(--surf); min-width:30px;}
.pip.divine:hover{border-color:var(--bronze);}
.pip.divine.on{background:var(--bronze); border-color:var(--bronze-deep); color:#fff;}
.pip.untr{font-size:15px;}
.divine-track{display:flex; gap:4px; align-items:center; animation:reveal .18s ease;}
.divine-track .dcap{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--bronze); font-weight:600; display:flex; align-items:center; gap:4px;}
.divine-track .dcap .rune{font-size:13px;}
@keyframes reveal{from{opacity:0; transform:translateY(-3px);} to{opacity:1; transform:none;}}
.derived{display:grid; grid-template-columns:repeat(auto-fit,minmax(86px,1fr)); gap:10px; margin-top:14px;}
.stat{background:var(--surf2); border:1px solid var(--line-soft); border-radius:9px; padding:11px 8px; text-align:center;}
.stat .v{font-family:var(--mono); font-size:23px; font-weight:700; color:var(--steel);}
.stat .k{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-top:3px;}
.auto-note{font-size:11px; color:var(--faint); margin-top:9px;}
.skgroup-label{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin:14px 0 2px;}
.skgroup-label:first-of-type{margin-top:2px;}
.locked{display:flex; flex-wrap:wrap; gap:7px; margin-top:8px;}
.lock-chip{display:flex; align-items:center; gap:6px; background:var(--surf2); border:1px dashed var(--line); border-radius:7px; padding:6px 9px; font-size:13px; color:var(--muted);}
.lock-chip .rune{color:var(--red); font-size:13px;}
.lock-chip .lh{font-size:11px; color:var(--faint);}
.list{display:flex; flex-direction:column; gap:6px; margin-top:8px;}
.empty{color:var(--faint); font-size:13px;}
.lrow{display:flex; align-items:center; gap:9px; background:var(--surf2); border:1px solid var(--line-soft); border-radius:7px; padding:8px 11px;}
.lrow .lb{color:var(--bronze); font-size:14px;}
.lrow .lt{flex:1; font-size:14px;}
.lrow .lx{background:none; border:none; color:var(--faint); font-size:16px; line-height:1; padding:0;}
.lrow .lx:hover{color:var(--red);}
.addrow{display:flex; gap:8px; margin-top:9px;}
.addrow .t-input{flex:1; padding:8px 11px; font-size:14px; border-bottom-width:1px;}
.addbtn{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 14px; font-size:15px;}
.addbtn:hover{border-color:var(--steel-soft);}
.divine{background:linear-gradient(180deg,var(--warm),var(--surf)); border:1px solid var(--line-warm); border-radius:12px; padding:22px; margin-top:18px;}
.divine .sec-title .rune{color:var(--bronze);}
.shard-cap{font-size:12px; color:var(--muted);}
.shard-cap b{color:var(--ember); font-family:var(--mono);}
.shards{display:flex; gap:11px; flex-wrap:wrap; margin:14px 0 6px;}
.niche{width:56px; height:70px; border:1px solid var(--line-warm); border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; background:var(--warm-inset); color:#A99970; transition:.18s;}
.niche .rune{font-size:25px;}
.niche .n{font-family:var(--mono); font-size:10px;}
.niche:hover{border-color:var(--bronze);}
.niche.lit{background:radial-gradient(circle at 50% 36%, #F6CE85, #E3A848); border-color:var(--bronze-deep); color:#4A3208; box-shadow:0 2px 12px -4px rgba(188,126,42,.6);}
.dz-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(258px,1fr)); gap:16px; margin-top:18px;}
.dz-card{background:var(--warm2); border:1px solid var(--line-warm); border-radius:10px; padding:16px;}
.dz-card h4{font-family:var(--disp); font-weight:600; font-size:15px; margin:0 0 10px;}
.dz-card .t-input{background:#FBF6EC; border-color:var(--line-warm); border-bottom-color:var(--bronze);}
.fork-opt{border:1px solid var(--line-warm); border-radius:8px; padding:11px 12px; margin-top:9px; background:#FBF6EC;}
.fork-opt .boon{display:inline-block; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--bronze-deep); border:1px solid var(--line-warm); border-radius:999px; padding:3px 9px; margin-bottom:7px;}
.fork-opt .eff{font-size:13px; color:var(--faint); font-style:italic;}
.fork-opt.pick{display:block; width:100%; text-align:left; background:#FBF6EC; cursor:pointer;}
.fork-opt.pick:hover{border-color:var(--bronze);}
.fork-opt.chosen{border-color:var(--bronze); background:#F6ECD6; box-shadow:inset 3px 0 0 var(--bronze);}
.fork-opt .ftitle{font-size:11px; color:var(--bronze-deep); font-weight:600; letter-spacing:.04em; text-transform:uppercase;}
.sealed{display:flex; align-items:center; gap:14px;}
.seal{width:52px; height:52px; flex:none; border-radius:50%; border:2px solid var(--bronze-deep); display:flex; align-items:center; justify-content:center; color:var(--bronze-deep); font-family:var(--disp); font-size:26px; background:#FBF6EC;}
.sealed .txt{font-size:13px; color:var(--muted);}
.howto{background:var(--surf); border:1px solid var(--line); border-radius:11px; padding:18px; margin-top:18px;}
.howto .cols{display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:22px; margin-top:8px;}
.howto h5{font-family:var(--disp); font-weight:600; font-size:15px; margin:0 0 8px; display:flex; align-items:center; gap:8px;}
.howto .mortal h5{color:var(--steel);}
.howto .div-h h5{color:var(--bronze);}
.howto .lead{font-size:13px; color:var(--ink); margin:0 0 8px;}
.howto ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;}
.howto li{font-size:13px; color:var(--muted); line-height:1.5; padding-left:16px; position:relative;}
.howto li::before{content:'•'; position:absolute; left:3px; color:var(--bronze);}
.howto .mortal li::before{color:var(--steel);}
.howto li b{color:var(--ink); font-weight:600;}
.howto .rune{font-size:15px;}
.hints{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-top:18px;}
.hint{background:var(--surf); border:1px solid var(--line); border-left:3px solid var(--steel-soft); border-radius:0 9px 9px 0; padding:12px 14px;}
.hint .ht{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--steel); font-weight:600; display:flex; align-items:center; gap:8px;}
.hint .hb{font-size:13px; color:var(--muted); margin-top:5px;}
.hint.joker{border-left-color:var(--bronze);}
.hint.joker .ht{color:var(--bronze);}
.hint .rune{font-size:14px;}
.footnote{font-size:11px; color:var(--faint); margin-top:22px; line-height:1.7;}
/* join gate */
.gate-wrap{display:flex; min-height:80vh; align-items:center; justify-content:center; padding:20px;}
.gate{width:100%; max-width:420px; background:var(--surf); border:1px solid var(--line); border-radius:14px; padding:30px;}
.gate .wordmark{justify-content:center; margin-bottom:6px;}
.gate h2{font-family:var(--disp); font-weight:600; font-size:22px; text-align:center; margin:6px 0 4px;}
.gate .sub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:22px;}
.gate .field{margin-bottom:16px;}
.gate .go{width:100%; background:var(--bronze); color:#fff; border:none; border-radius:9px; padding:13px; font-size:15px; font-weight:600; letter-spacing:.03em; margin-top:6px;}
.gate .go:hover{background:var(--bronze-deep);}
.gate .gerr{color:var(--red); font-size:13px; margin-top:12px; text-align:center;}
.gate .gnote{color:var(--faint); font-size:12px; margin-top:16px; text-align:center; line-height:1.6;}
.print-sheet{display:none;}
@media print{
  @page{ margin:12mm; }
  body{ background:#fff; }
  .stele{ display:none !important; }
  .print-sheet{ display:block !important; color:#1b1b1b; line-height:1.4; }
  .print-sheet .p-head{display:flex; gap:14px; align-items:flex-start; border-bottom:2px solid #222; padding-bottom:10px; margin-bottom:12px;}
  .print-sheet .p-av{width:64px; height:80px; object-fit:cover; border:1px solid #999; border-radius:4px;}
  .print-sheet .p-id{flex:1;}
  .print-sheet .p-name{font-family:'Spectral',serif; font-size:24px; font-weight:700; line-height:1.1;}
  .print-sheet .p-cc{font-size:12px; color:#555; margin-top:2px;}
  .print-sheet .p-meta{text-align:right; font-size:11px; color:#333;}
  .print-sheet .p-meta .pr{font-family:'Spectral',serif; font-size:14px; font-weight:600; color:#7a5210;}
  .print-sheet .p-attrs{display:flex; flex-wrap:wrap; gap:6px 16px; font-size:12.5px; margin-bottom:6px;}
  .print-sheet .p-attrs b{font-weight:600;}
  .print-sheet .p-derived{font-size:11.5px; color:#333; border-top:1px solid #ddd; border-bottom:1px solid #ddd; padding:6px 0; margin-bottom:10px;}
  .print-sheet .p-sec{font-family:'Spectral',serif; font-weight:600; font-size:13px; color:#2F6090; border-bottom:1px solid #ccc; margin:12px 0 6px; padding-bottom:2px; break-after:avoid;}
  .print-sheet .p-skills{column-count:3; column-gap:18px;}
  .print-sheet .p-sk{display:flex; justify-content:space-between; gap:8px; font-size:11.5px; padding:2px 0; break-inside:avoid; border-bottom:1px dotted #e3e3e3;}
  .print-sheet .p-sk .d{font-family:'JetBrains Mono',monospace; color:#444;}
  .print-sheet .p-cols{display:flex; gap:24px;}
  .print-sheet .p-cols > div{flex:1;}
  .print-sheet .p-li{font-size:11.5px; padding:1px 0;}
  .print-sheet .p-empty{font-size:11px; color:#aaa;}
  .print-sheet .p-text{font-size:11.5px; color:#333; white-space:pre-wrap;}
  .print-sheet .p-cols, .print-sheet .p-skills{break-inside:avoid;}
}
</style>

  { n: "Оккультизм", a: "СМЕ", w: "мифы, фольклор, старые знаки" },
];
const LOCKED = [
  { name: "Сейд", hint: "чары судьбы" }, { name: "Гальдр", hint: "руны-заклятья" },
  { name: "Провидение", hint: "нити судьбы" }, { name: "Боевое мастерство", hint: "воинская выучка" },
  { name: "Лучное искусство", hint: "мифострелок" }, { name: "Оборот", hint: "звериный облик" },
  { name: "Власть стихий", hint: "гром/огонь/лёд/море" }, { name: "Зов мёртвых", hint: "власть над мёртвыми" },
  { name: "Жизнедар", hint: "исцеление, обновление" }, { name: "Всечувствие", hint: "дозор богов" },
  { name: "Ярость", hint: "берсерк, слом оков" }, { name: "Тропы меж мирами", hint: "хождение по древу" },
];
const SHARD_RUNES = ["ᚠ", "ᚢ", "ᚦ", "ᚨ", "ᚱ", "ᚲ", "ᚷ", "ᚹ", "ᚺ"];
const tierOf = (n) => (n >= 16 ? "Бог" : n >= 10 ? "Полубог" : n >= 4 ? "Герой" : "Смертный");
function dominantArch(attrs) {
  let best = null, bestv = -1, tie = false;
  for (const k of Object.keys(ARCH)) {
    const a = attrs[k], v = a.die + a.plus * 2;
    if (v > bestv) { bestv = v; best = k; tie = false; } else if (v === bestv) tie = true;
  }
  return tie ? null : ARCH[best];
}
function makeDefaults() {
  const skills = {};
  CORE.forEach((k) => (skills[k.n] = 4));
  OPEN.forEach((k) => (skills[k.n] = null));
  return {
    name: "", concept: "", bio: "", img: null, gear: "", advances: 0,
    attrs: { agility: { die: 6, plus: 0 }, smarts: { die: 6, plus: 0 }, spirit: { die: 6, plus: 0 }, strength: { die: 6, plus: 0 }, vigor: { die: 6, plus: 0 } },
    skills, shards: 0, edges: [], hindrances: [], geasa: [], prophecies: [], node: "", nextFork: null,
  };
}
function loadLocal() {
  try { const r = localStorage.getItem(KEY); return r ? { ...makeDefaults(), ...JSON.parse(r) } : null; } catch (e) { return null; }
}

function App() {

  const set = (patch) => setData((d) => ({ ...d, ...patch }));

  const tier = tierOf(data.advances);
  const arch = dominantArch(attrs);

  const onImg = (e) => {

    rd.readAsDataURL(f);

  const exportJSON = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = (data.name ? data.name.replace(/\s+/g, "_") : "герой") + "-карта.json"; a.click(); };
  const importJSON = (e) => { const f = e.target.files && e.target.files[0]; if (!f) return; const rd = new FileReader(); rd.onload = () => { try { setData({ ...makeDefaults(), ...JSON.parse(rd.result) }); } catch (err) { alert("Не удалось прочитать файл карты."); } }; rd.readAsText(f); e.target.value = ""; };

            </div>

          <div className="arc">смертный&nbsp;&rarr;&nbsp;<b>?</b><span className="sh">осколков {data.shards}/9</span></div>
          <div className="adv no-print">

            return (

                <div className="track-wrap">

          <div className="dz-card"><h4>Наследие</h4><div className="sealed"><div className="seal">?</div><div className="txt">Запечатано. Раскроется в конце <b>девятого мира</b>.<br />Рагнарёк — десятая арка.</div></div></div>

      </div>

      <div className="footnote">v0.7 · экран игрока. {cloud ? "Облако подключено — карта пишется в Firebase." : "Облако не настроено — карта живёт локально в браузере."} Кубики и руны кидаются вживую. Кнопка «Печать» даёт отдельный компактный лист.</div>
    </div>
    <PrintSheet data={data} />
    </React.Fragment>

}

function PrintSheet({ data }) {
  const { attrs, skills } = data;
  const fighting = skills["Рукопашный"];
  const parry = 2 + (fighting ? halfDie(fighting) : 0);
  const tough = 2 + halfDie(attrs.vigor.die) + attrs.vigor.plus;
  const load = 5 * (attrs.strength.die + attrs.strength.plus);
  const tier = tierOf(data.advances);
  const arch = dominantArch(attrs);
  const trained = OPEN.filter((s) => skills[s.n] != null);
  const rankLine = tier + (tier !== "Смертный" && arch ? " · " + arch : "");
  const renderList = (arr) => arr && arr.length ? arr.map((x, i) => <div className="p-li" key={i}>• {x}</div>) : <div className="p-empty">—</div>;
  return (
    <div className="print-sheet">
      <div className="p-head">
        {data.img ? <img className="p-av" src={data.img} alt="" /> : null}
        <div className="p-id">
          <div className="p-name">{data.name || "—"}</div>
          <div className="p-cc">{data.concept || ""}</div>
        </div>
        <div className="p-meta">
          <div className="pr">{rankLine}</div>
          <div>адвансов {data.advances} · осколков {data.shards}/9</div>
        </div>
      </div>
      <div className="p-attrs">
        {ATTRS.map((a) => <span key={a.key}><b>{a.label}</b> {fmt(attrs[a.key].die, attrs[a.key].plus)}</span>)}
      </div>
      <div className="p-derived">Скорость 6&#8243; · Парирование {parry} · Стойкость {tough} · Размер 0 · Нагрузка {load}</div>
      <div className="p-sec">Навыки</div>
      <div className="p-skills">
        {CORE.map((s) => <div className="p-sk" key={s.n}><span>{s.n}</span><span className="d">{fmt(skills[s.n], 0)}</span></div>)}
        {trained.map((s) => <div className="p-sk" key={s.n}><span>{s.n}</span><span className="d">{fmt(skills[s.n], 0)}</span></div>)}
      </div>
      <div className="p-cols">
        <div><div className="p-sec">Эджи</div>{renderList(data.edges)}</div>
        <div><div className="p-sec">Хиндрансы</div>{renderList(data.hindrances)}</div>
      </div>
      <div className="p-cols">
        <div><div className="p-sec">Гейсы</div>{renderList(data.geasa)}</div>
        <div><div className="p-sec">Пророчества</div>{renderList(data.prophecies)}</div>
      </div>
      {data.gear ? <div><div className="p-sec">Снаряжение</div><div className="p-text">{data.gear}</div></div> : null}
      {data.bio ? <div><div className="p-sec">Биография</div><div className="p-text">{data.bio}</div></div> : null}
      <div className="p-sec">Божественное</div>
      <div className="p-text">Текущий узел: {data.node || "—"}. Осколков {data.shards}/9. Наследие запечатано до конца девятого мира.</div>
    </div>
  );
}

function JoinGate({ onJoin }) {
  const [code, setCode] = useState("");
  const [nm, setNm] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const go = async () => {
    const c = code.trim().toLowerCase().replace(/[^a-zа-я0-9_-]/gi, "");
    if (!c) { setErr("Введи код кампании."); return; }
    setBusy(true); setErr("");
    try { await onJoin(c, nm.trim()); } catch (e) { setErr(e.message || "Не удалось войти."); setBusy(false); }
  };
  return (
    <div className="gate-wrap">
      <div className="gate">
        <div className="wordmark"><span className="rune">ᛈ</span> Рагнарёк-AU</div>
        <h2>Войти в кампанию</h2>
        <div className="sub">Код даёт ведущая. Карта сохранится в облаке.</div>
        <div className="field"><label>Код кампании</label><input className="t-input" value={code} onChange={(e) => setCode(e.target.value)} placeholder="напр. ragnarok2026" onKeyDown={(e) => e.key === "Enter" && go()} /></div>
        <div className="field"><label>Имя персонажа</label><input className="t-input" value={nm} onChange={(e) => setNm(e.target.value)} placeholder="кто ты" onKeyDown={(e) => e.key === "Enter" && go()} /></div>
        <button className="go" onClick={go} disabled={busy}>{busy ? "Вхожу…" : "Войти"}</button>
        {err && <div className="gerr">{err}</div>}
        <div className="gnote">Вернёшься с того же устройства — карта подхватится сама. На случай переезда жми Экспорт.</div>
      </div>
    </div>
  );
}

function SkillRow({ sk, value, core, onChange }) {
  return (
    <div className="trait-row" style={{ alignItems: "center" }}>
      <div className="trait-name" style={{ paddingTop: 0 }}>
        <span className="tip" data-tip={sk.w}>{sk.n}</span>
        <span className="attr-chip" style={{ color: ATTR_TINT[sk.a], borderColor: ATTR_TINT[sk.a] }}>{sk.a}</span>
      </div>
      <div className="track">
        {!core && (<button className={"pip untr" + (value == null ? " on" : "")} onClick={() => onChange(null)} title="не обучен (d4−2)">&mdash;</button>)}
        {DICE.map((d) => (<button key={d} className={"pip" + (value === d ? " on" : "")} onClick={() => onChange(d)}>d{d}</button>))}
      </div>
    </div>
  );
}

function ListField({ items, onChange, placeholder, rune }) {
  const [val, setVal] = useState("");
  const add = () => { const v = val.trim(); if (!v) return; onChange([...items, v]); setVal(""); };
  return (
    <div>
      <div className="list">
        {items.length === 0 && <div className="empty">пока пусто</div>}
        {items.map((it, i) => (<div className="lrow" key={i}><span className="rune lb">{rune}</span><span className="lt">{it}</span><button className="lx no-print" onClick={() => onChange(items.filter((_, j) => j !== i))}>&times;</button></div>))}
      </div>
      <div className="addrow no-print"><input className="t-input" value={val} onChange={(e) => setVal(e.target.value)} placeholder={placeholder} onKeyDown={(e) => e.key === "Enter" && add()} /><button className="addbtn" onClick={add}>+</button></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
