/* Чистим SVG перед показом: убираем скрипты, обработчики и javascript: ссылки. */
function sanitizeSvg(raw) {
  if (!raw) return "";
  let s = String(raw);
  const i = s.indexOf("<svg"); const j = s.lastIndexOf("</svg>");
  if (i >= 0 && j >= 0) s = s.slice(i, j + 6);
  s = s.replace(/<script[\s\S]*?<\/script>/gi, "");
  s = s.replace(/<foreignObject[\s\S]*?<\/foreignObject>/gi, "");
  s = s.replace(/\son\w+\s*=\s*"[^"]*"/gi, "");
  s = s.replace(/\son\w+\s*=\s*'[^']*'/gi, "");
  s = s.replace(/\son\w+\s*=\s*[^\s>]+/gi, "");
  s = s.replace(/javascript:/gi, "");
  return s;
}

function runeOfDate(iso) {
  if (!iso) return null;
  const dt = new Date(iso + "T12:00:00"); if (isNaN(dt)) return null;
  const md = (dt.getMonth() + 1) * 100 + dt.getDate();
  let best = 12, bestMd = -1;
  RUNE_HM.forEach((r, i) => { const [m, d] = r[2].split("/").map(Number); const s = m * 100 + d; if (s <= md && s > bestMd) { bestMd = s; best = i; } });
  return { good: RUNE_HM[best], bad: RUNE_HM[(best + 12) % 24] };
}

  { n: "Невезучий", s: "major", d: "−1 бенни на сессию" },
  { n: "Фобия", s: "minor", d: "панический страх: высота, толпа, темнота…" },
  { n: "Зависимость", s: "minor", d: "тянет к выпивке, никотину или азарту" },
  { n: "В долгах", s: "minor", d: "кредиты и счета висят над тобой" },
  { n: "Тайна", s: "minor", d: "скрываешь то, что может всё разрушить" },
  { n: "Старая травма", s: "minor", d: "колено или спина подводят под нагрузкой" },
  { n: "Вспыльчивость", s: "minor", d: "быстро вскипаешь" },
  { n: "Пацифизм", s: "minor", d: "не поднимешь руку первым" },
  { n: "Обязательство", s: "minor", d: "работа или семья постоянно требуют тебя" },
];
const DEFAULT_EDGES = [
  { n: "Шустрый", r: "Ловкость d6+", d: "+2 к Скорости, бег d10" },
  { n: "Атлет", r: "Ловкость d8+", d: "+1 к Атлетике и физическим проверкам" },
  { n: "Крепыш", r: "Сила d6+, Вын. d6+", d: "+1 Стойкость, легче носишь груз" },
  { n: "Внимательный", r: "—", d: "+2 к Вниманию" },
  { n: "Смелый", r: "Дух d6+", d: "+2 против страха" },
  { n: "Везучий", r: "—", d: "+1 бенни на сессию" },
  { n: "Сильная воля", r: "—", d: "+1 к Запугиванию/Подначке и сопротивлению им" },
  { n: "Целитель", r: "Дух d6+", d: "+2 к Лечению — медик, спасатель" },
  { n: "Привлекательный", r: "Дух d6+", d: "располагаешь людей внешностью" },
  { n: "Лингвист", r: "Смекалка d6+", d: "родной + английский + ещё пара языков" },
  { n: "Знаток", r: "Смекалка d8+", d: "+2 к Исследованию: архивы, поиск, базы" },
  { n: "Связи", r: "—", d: "есть полезные знакомства, которые выручают" },
  { n: "Водила", r: "Ловкость d6+", d: "+2 к Вождению и Лодкам" },
  { n: "Обеспеченный", r: "—", d: "стартуешь с хорошими средствами" },
];
const RANKS = [
  { name: "Смертный", min: 0 }, { name: "Пробуждённый", min: 4 }, { name: "Герой", min: 8 },
  { name: "Витязь", min: 13 }, { name: "Полубог", min: 18 }, { name: "Ас", min: 23 }, { name: "Бог", min: 28 },
];
const tierOf = (n) => { let r = RANKS[0]; for (const k of RANKS) if (n >= k.min) r = k; return r.name; };

function App() {
  const [joined, setJoined] = useState(false);
  const [campaign, setCampaign] = useState("");
  const [chars, setChars] = useState([]);
  const [err, setErr] = useState("");
  const [showLists, setShowLists] = useState(false);
  const [showSvg, setShowSvg] = useState(false);
  const [danger, setDanger] = useState(false);
  const [runeMeans, setRuneMeans] = useState(RUNE_MEANINGS);
  const [openChar, setOpenChar] = useState(null);

  useEffect(() => {
    if (!joined || !db) return;
    const ref = db.collection("campaigns").doc(campaign).collection("characters");
    const unsub = ref.onSnapshot(
      (qs) => { const arr = []; qs.forEach((d) => arr.push({ id: d.id, ...d.data() })); arr.sort((a, b) => (a.name || "").localeCompare(b.name || "")); setChars(arr); },
      (e) => setErr("Ошибка чтения: " + e.message)
    );
    return () => unsub();
  }, [joined, campaign]);

  // Трактовки рун из облачного списка «Руны» — чтобы подсказки совпадали с правками ведущей
  useEffect(() => {
    if (!joined || !db) return;
    const ref = db.collection("campaigns").doc(campaign).collection("boards").doc("runes");
    const unsub = ref.onSnapshot((snap) => {
      if (snap.exists && Array.isArray(snap.data().runes)) {
        const m = { ...RUNE_MEANINGS };
        snap.data().runes.forEach((r) => { if (r && r.glyph && r.meanings) m[r.glyph] = r.meanings; });
        setRuneMeans(m);
      }
    }, () => {});
    return () => unsub();
  }, [joined, campaign]);

  // обновлять модалку, если данные героя изменились
  useEffect(() => {
    if (!openChar) return;
    const fresh = chars.find((c) => c.id === openChar.id);
    if (fresh && fresh !== openChar) setOpenChar(fresh);
    if (!fresh) setOpenChar(null);
  }, [chars]);

  async function enter(code) {
    if (!HAS_FB || !db) { setErr("Вставь конфиг Firebase в этот файл."); return; }
    const c = code.trim().toLowerCase().replace(/[^a-zа-я0-9_-]/gi, "");
    if (!c) { setErr("Введи код кампании."); return; }
    try { await auth.signInAnonymously(); } catch (e) { setErr("Включи Anonymous в Firebase → Authentication."); return; }
    try { localStorage.setItem("ragnarok-campaign", c); } catch (e) {}
    setCampaign(c); setJoined(true); setErr("");
  }

  if (!joined) return <Gate err={err} onEnter={enter} />;

  return (
    <div className="wrap">
      <div className="top">
        <div className="wordmark"><span className="rune">ᛟ</span> Рагнарёк-AU · ведущая</div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button className="lists-btn" onClick={() => setShowLists(true)}>Эджи и изъяны</button>
          <button className="lists-btn" onClick={() => setShowSvg(true)}>Карты и планы</button>
          <button className="lists-btn" onClick={() => setDanger((d) => !d)} style={danger ? { borderColor: "var(--red)", color: "var(--red)" } : undefined} title="Включить опасные действия: удаление героев">{danger ? "✓ правка списка" : "правка списка"}</button>
          <span className="tag">кампания · {campaign}</span>
        </div>
      </div>
      <div className="bar"><b>{chars.length}</b> {chars.length === 1 ? "герой" : "героев"} · обновляется вживую {danger && <span style={{ color: "var(--red)" }}>· режим удаления включён</span>}{err && <span style={{ color: "var(--red)" }}>· {err}</span>}</div>
      {chars.length === 0 ? (
        <div className="empty">Пока никто не вошёл. Дай игрокам ссылку на карту и код «{campaign}».</div>
      ) : (
        <div className="grid">{chars.map((c) => <PCard key={c.id} c={c} campaign={campaign} danger={danger} runeMeans={runeMeans} onOpen={() => setOpenChar(c)} />)}</div>
      )}
      {showLists && <ListsEditor campaign={campaign} onClose={() => setShowLists(false)} />}
      {showSvg && <SvgShowModal campaign={campaign} onClose={() => setShowSvg(false)} />}
      {openChar && <CharModal campaign={campaign} char={openChar} onClose={() => setOpenChar(null)} />}
    </div>
  );
}

function RuneChip({ kind, rune, meaning }) {
  const [open, setOpen] = useState(false);
  if (!rune) return null;
  const label = kind === "good" ? "☼ удачная" : "☓ неудачная";
  const tip = rune[1] + (meaning ? " — " + meaning : "");
  return (
    <span className={"rchip " + kind} title={tip} onClick={(e) => { e.stopPropagation(); setOpen((o) => !o); }}>
      <span className="rl">{label}</span>
      <span className="rb"><span className="rg">{rune[0]}</span><span className="rn">{rune[1]}</span></span>
      {open && (
        <span className="rpop" onClick={(e) => e.stopPropagation()}>
          <span className="pt"><span className="rune">{rune[0]}</span> {rune[1]}</span>
          <span className="pd">{meaning || "Нет описания в списке рун."}</span>
        </span>
      )}
    </span>
  );
}

function PCard({ c, campaign, danger, runeMeans, onOpen }) {
  const tier = tierOf(c.advances || 0);
  const shards = c.shards || 0;
  const rd = runeOfDate(c.born);
  const delChar = async (e) => {
    e.stopPropagation();
    if (!confirm("Удалить героя «" + (c.name || "без имени") + "» из кампании? Это необратимо.")) return;
    try { await db.collection("campaigns").doc(campaign).collection("characters").doc(c.id).delete(); }
    catch (e) { alert("Не удалось удалить: " + e.message); }
  };
  const clearFork = async (e) => {
    e.stopPropagation();
    try { await db.collection("campaigns").doc(campaign).collection("characters").doc(c.id).set({ nextFork: null }, { merge: true }); } catch (e) { alert(e.message); }
  };
  const nf = c.nextFork;
  return (
    <div className="pc" onClick={onOpen} title="открыть карту героя">
      <span className="open-hint">⤢ карта</span>
      <div className="h">
        <div className="av">{c.img ? <img src={c.img} alt="" /> : <span className="rune" style={{ fontSize: 22 }}>ᛗ</span>}</div>
        <div>
          <div className="nm">{c.name || "без имени"}</div>
          {c.concept && <div className="cc">{c.concept}</div>}
          <div className="rk">{tier} · адв. {c.advances || 0}</div>
        </div>
      </div>

      {rd ? (
        <div className="runes-line">
          <RuneChip kind="good" rune={rd.good} meaning={runeMeans[rd.good[0]]} />
          <RuneChip kind="bad" rune={rd.bad} meaning={runeMeans[rd.bad[0]]} />
        </div>
      ) : (
        <div className="rmissing">руны: укажи дату рождения в карте героя</div>
      )}

      <div className="shline">
        <div className="dots">{Array.from({ length: 9 }).map((_, i) => <span key={i} className={"dot" + (i < shards ? " on" : "")} />)}</div>
        <span className="shtxt">осколков <b>{shards}</b>/9</span>
      </div>
      {c.node && <div className="node">узел: <b>{c.node}</b></div>}
      {c.notes && c.notes.length > 0 && (
        <div style={{ marginTop: 8, fontSize: 11.5, color: "var(--muted)", lineHeight: 1.4 }}>
          <span style={{ color: "var(--faint)" }}>заметок: </span><b>{c.notes.length}</b>
          {c.notes[0] && c.notes[0].text ? <span style={{ display: "block", color: "var(--faint)", fontStyle: "italic", marginTop: 2 }}>«{c.notes[0].text.slice(0, 90)}{c.notes[0].text.length > 90 ? "…" : ""}»</span> : null}
        </div>
      )}

      <div className="fork-gm">
        {nf && nf.options ? (
          <div className="fork-state">
            развилка выдана{typeof nf.chosen === "number" ? <span className="picked"> · выбрал «{nf.options[nf.chosen] ? (nf.options[nf.chosen].title || nf.options[nf.chosen].type) : "?"}»</span> : " · ждёт выбора"}
            <button className="fork-clear" onClick={clearFork} title="убрать развилку">×</button>
          </div>
        ) : <div className="fork-state none">развилка не выдана</div>}
        <div style={{ fontSize: 11, color: "var(--faint)", marginTop: 6 }}>Развилки выдаёт «Древо судеб».</div>
      </div>

      {danger && <button className="del-btn" onClick={delChar}>Удалить героя</button>}
    </div>
  );
}

function CharModal({ campaign, char, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", onKey); document.body.style.overflow = prev; };
  }, []);
  const href = "ragnarok-character-sheet-cloud.html?gmview=1&campaign=" + encodeURIComponent(campaign) + "&char=" + encodeURIComponent(char.id);
  return (
    <div className="cm-bg" onClick={onClose}>
      <div className="cm" onClick={(e) => e.stopPropagation()}>
        <div className="cm-head">
          <span className="cm-title">{char.name || "без имени"}</span>
          {char.concept && <span className="cm-sub">{char.concept}</span>}
          <span className="cm-spacer" />
          <a className="cm-link" href={href} target="_blank" rel="noopener">в новой вкладке ↗</a>
          <button className="cm-x" onClick={onClose} title="закрыть (Esc)">×</button>
        </div>
        <iframe className="cm-frame" src={href} title={"Карта · " + (char.name || "герой")} />
      </div>
    </div>
  );
}

function ListsEditor({ campaign, onClose }) {
  const [hind, setHind] = useState(null);
  const [edges, setEdges] = useState(null);
  const [status, setStatus] = useState("Загрузка…");
  const ref = db.collection("campaigns").doc(campaign).collection("config").doc("lists");

  useEffect(() => {
    (async () => {
      try {
        const cfg = await ref.get();
        if (cfg.exists) { const c = cfg.data(); setHind(c.hindrances && c.hindrances.length ? c.hindrances : DEFAULT_HINDRANCES); setEdges(c.edges && c.edges.length ? c.edges : DEFAULT_EDGES); setStatus(""); }
        else { setHind(DEFAULT_HINDRANCES); setEdges(DEFAULT_EDGES); setStatus("Пока стандартные списки — отредактируй и сохрани."); }
      } catch (e) { setHind(DEFAULT_HINDRANCES); setEdges(DEFAULT_EDGES); setStatus("Не загрузилось — показаны стандартные."); }
    })();
  }, [campaign]);

  const setH = (i, k, v) => setHind((a) => a.map((row, j) => (j === i ? { ...row, [k]: v } : row)));
  const delH = (i) => setHind((a) => a.filter((_, j) => j !== i));
  const addH = () => setHind((a) => [...a, { n: "", s: "minor", d: "" }]);
  const setE = (i, k, v) => setEdges((a) => a.map((row, j) => (j === i ? { ...row, [k]: v } : row)));
  const delE = (i) => setEdges((a) => a.filter((_, j) => j !== i));
  const addE = () => setEdges((a) => [...a, { n: "", r: "—", d: "" }]);

  const save = async () => {
    const h = (hind || []).filter((x) => x.n.trim()).map((x) => ({ n: x.n.trim(), s: x.s === "major" ? "major" : "minor", d: (x.d || "").trim() }));
    const e = (edges || []).filter((x) => x.n.trim()).map((x) => ({ n: x.n.trim(), r: (x.r || "—").trim(), d: (x.d || "").trim() }));
    try { await ref.set({ hindrances: h, edges: e }); setStatus("Сохранено ✓"); setTimeout(() => setStatus(""), 1600); }
    catch (err) { setStatus("Ошибка: " + err.message); }
  };
  const resetDefaults = () => { setHind(DEFAULT_HINDRANCES); setEdges(DEFAULT_EDGES); setStatus("Подставлены стандартные — не забудь сохранить."); };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">Эджи и изъяны кампании</div>
          <button className="modal-x" onClick={onClose}>×</button>
        </div>
        <div className="modal-note">Меняет списки для всех новых созданий персонажей в этой кампании. Конфликты-противоположности пока зашиты в коде. {status && <b>· {status}</b>}</div>
        {hind === null ? <div className="empty">Загрузка…</div> : (
          <div className="modal-body">
            <div className="le-sec">Изъяны</div>
            <div className="le-table">
              <div className="le-row le-h"><span className="le-n">Название</span><span className="le-s">Тип</span><span className="le-d">Описание</span><span className="le-x" /></div>
              {hind.map((row, i) => (
                <div className="le-row" key={i}>
                  <input className="le-n" value={row.n} onChange={(e) => setH(i, "n", e.target.value)} placeholder="название" />
                  <select className="le-s" value={row.s} onChange={(e) => setH(i, "s", e.target.value)}><option value="minor">малый</option><option value="major">большой</option></select>
                  <input className="le-d" value={row.d} onChange={(e) => setH(i, "d", e.target.value)} placeholder="описание" />
                  <button className="le-x" onClick={() => delH(i)} title="удалить">×</button>
                </div>
              ))}
              <button className="le-add" onClick={addH}>+ изъян</button>
            </div>

            <div className="le-sec">Эджи</div>
            <div className="le-table">
              <div className="le-row le-h"><span className="le-n">Название</span><span className="le-s">Требование</span><span className="le-d">Описание</span><span className="le-x" /></div>
              {edges.map((row, i) => (
                <div className="le-row" key={i}>
                  <input className="le-n" value={row.n} onChange={(e) => setE(i, "n", e.target.value)} placeholder="название" />
                  <input className="le-s le-req" value={row.r} onChange={(e) => setE(i, "r", e.target.value)} placeholder="требование" />
                  <input className="le-d" value={row.d} onChange={(e) => setE(i, "d", e.target.value)} placeholder="описание" />
                  <button className="le-x" onClick={() => delE(i)} title="удалить">×</button>
                </div>
              ))}
              <button className="le-add" onClick={addE}>+ эдж</button>
            </div>
          </div>
        )}
        <div className="modal-foot">
          <button className="le-reset" onClick={resetDefaults}>Стандартные</button>
          <div style={{ flex: 1 }} />
          <button className="le-cancel" onClick={onClose}>Закрыть</button>
          <button className="le-save" onClick={save}>Сохранить</button>
        </div>
      </div>
    </div>
  );
}

function SvgShowModal({ campaign, onClose }) {
  const [cards, setCards] = useState(() => { try { const a = JSON.parse(localStorage.getItem("ragnarok-svgcards-" + campaign) || "[]"); return Array.isArray(a) ? a : []; } catch (e) { return []; } });
  const [big, setBig] = useState(null);
  const [status, setStatus] = useState(db ? "Загрузка…" : "");

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") { if (big) setBig(null); else onClose(); } };
    window.addEventListener("keydown", onKey);
    const prev = document.body.style.overflow; document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", onKey); document.body.style.overflow = prev; };
  }, [big]);

  useEffect(() => {
    if (!db) return;
    const ref = db.collection("campaigns").doc(campaign).collection("boards").doc("svgcards");
    const unsub = ref.onSnapshot((snap) => {
      if (snap.exists && Array.isArray(snap.data().cards)) { setCards(snap.data().cards); setStatus(""); }
      else setStatus("Пока нет карт — добавь их во вкладке «Карты и планы».");
    }, (e) => setStatus("Ошибка чтения: " + e.message));
    return () => unsub();
  }, [campaign]);

  const tabHref = "maps-plans.html?role=gm&c=" + encodeURIComponent(campaign);

  if (big) {
    return (
      <div className="svg-big" onClick={() => setBig(null)}>
        <div className="svg-big-head">
          <span className="svg-big-title">{big.title || "без названия"}</span>
          <button className="modal-x" onClick={() => setBig(null)} title="закрыть (Esc)">×</button>
        </div>
        <div className="svg-big-body" onClick={(e) => e.stopPropagation()}>
          <div className="svg-box" style={{ width: "100%", height: "100%" }} dangerouslySetInnerHTML={{ __html: sanitizeSvg(big.svg) }} />
        </div>
      </div>
    );
  }

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">Карты и планы</div>
          <button className="modal-x" onClick={onClose}>×</button>
        </div>
        <div className="modal-note">Выбери карту — она откроется крупно. Добавлять и менять карты можно во вкладке <a href={tabHref} target="_blank" rel="noopener" style={{ color: "var(--bronze)" }}>«Карты и планы» ↗</a>.{status && <b> · {status}</b>}</div>
        <div className="modal-body">
          {cards.length === 0 ? (
            <div className="empty">Карт пока нет.</div>
          ) : (
            <div className="svg-grid">
              {cards.map((c) => (
                <div className="svg-card" key={c.id} onClick={() => setBig(c)} title="показать крупно">
                  <div className="svg-thumb"><div className="svg-box" dangerouslySetInnerHTML={{ __html: sanitizeSvg(c.svg) }} /></div>
                  <div className="svg-cap">{c.title || "без названия"}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="modal-foot">
          <a className="le-cancel" href={tabHref} target="_blank" rel="noopener" style={{ textDecoration: "none" }}>Открыть вкладку ↗</a>
          <div style={{ flex: 1 }} />
          <button className="le-cancel" onClick={onClose}>Закрыть</button>
        </div>
      </div>
    </div>
  );
}

function Gate({ err, onEnter }) {
  const [code, setCode] = useState(() => { try { return localStorage.getItem("ragnarok-campaign") || ""; } catch (e) { return ""; } });
  return (
    <div className="gate-wrap">
      <div className="gate">
        <div className="wordmark"><span className="rune">ᛟ</span> Рагнарёк-AU</div>
        <h2>Панель ведущей</h2>
        <label>Код кампании</label>
        <input className="t-input" value={code} onChange={(e) => setCode(e.target.value)} placeholder="тот же, что у игроков" onKeyDown={(e) => e.key === "Enter" && onEnter(code)} />
        <button className="go" onClick={() => onEnter(code)}>Открыть</button>
        {err && <div className="gerr">{err}</div>}
        <div className="gnote">Видишь карты всех игроков этой кампании. Полное древо и подмена твинов — следующим шагом.</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="app-shell.js" defer></script>
</body>
</html>
