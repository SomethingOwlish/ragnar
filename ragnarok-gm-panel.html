<!DOCTYPE html>
<html lang="ru" data-default-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Рагнарёк-AU · Панель ведущей</title>
<script>(function(){try{var t=localStorage.getItem('ragnarok-theme')||document.documentElement.getAttribute('data-default-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="theme.css" />
<style>
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased;}
input{font-family:inherit; color:inherit;}
button{font-family:inherit; cursor:pointer;}
.wrap{max-width:1180px; margin:0 auto; padding:26px 22px 60px;}
.rune{font-family:var(--rune); line-height:1;}
.top{display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:22px;}
.wordmark{font-family:var(--disp); font-weight:700; font-size:15px; letter-spacing:.16em; text-transform:uppercase; display:flex; align-items:center; gap:10px;}
.wordmark .rune{color:var(--bronze); font-size:18px;}
.tag{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--bronze); border:1px solid #4A3B22; border-radius:999px; padding:5px 12px;}
.gate-wrap{display:flex; min-height:70vh; align-items:center; justify-content:center; padding:20px;}
.gate{width:100%; max-width:420px; background:var(--surf); border:1px solid var(--line); border-radius:14px; padding:30px;}
.gate .wordmark{justify-content:center; margin-bottom:8px;}
.gate h2{font-family:var(--disp); font-weight:600; font-size:22px; text-align:center; margin:4px 0 18px;}
.gate label{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; display:block; margin-bottom:5px;}
.t-input{background:var(--surf2); border:1px solid var(--line); border-radius:8px; padding:11px 12px; font-size:15px; outline:none; width:100%;}
.t-input:focus{border-color:var(--steel);}
.go{width:100%; background:var(--bronze); color:#1A1206; border:none; border-radius:9px; padding:13px; font-size:15px; font-weight:700; margin-top:16px;}
.go:hover{background:var(--ember);}
.gerr{color:var(--red); font-size:13px; margin-top:12px; text-align:center;}
.gnote{color:var(--faint); font-size:12px; margin-top:16px; text-align:center; line-height:1.6;}
.bar{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:18px; color:var(--muted); font-size:13px;}
.bar b{color:var(--ink);}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:16px;}
.pc{background:var(--surf); border:1px solid var(--line); border-radius:12px; padding:16px;}
.pc .h{display:flex; gap:12px; align-items:flex-start;}
.pc .av{width:54px; height:64px; flex:none; border-radius:8px; background:var(--surf2); border:1px solid var(--line); overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--faint);}
.pc .av img{width:100%; height:100%; object-fit:cover;}
.pc .nm{font-family:var(--disp); font-size:18px; font-weight:600;}
.pc .cc{font-size:12px; color:var(--muted);}
.pc .rk{font-family:var(--disp); font-size:13px; color:var(--steel); margin-top:3px;}
.pc .rk .arch{color:var(--bronze);}
.row{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
.ab{font-family:var(--mono); font-size:11px; background:var(--surf2); border:1px solid var(--line); border-radius:6px; padding:3px 7px; color:var(--muted);}
.ab b{color:var(--ink);}
.ab.div{color:var(--ember); border-color:#4A3B22;}
.shline{display:flex; align-items:center; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line-soft);}
.dots{display:flex; gap:3px;}
.dot{width:11px; height:11px; border-radius:3px; background:var(--surf2); border:1px solid var(--line);}
.dot.on{background:var(--ember); border-color:var(--bronze);}
.shtxt{font-size:12px; color:var(--muted);}
.shtxt b{color:var(--ember); font-family:var(--mono);}
.node{font-size:12px; color:var(--muted); margin-top:10px;}
.node b{color:var(--ink);}
.fork-gm{margin-top:12px; padding-top:10px; border-top:1px solid var(--line-soft);}
.fork-state{font-size:11.5px; color:var(--bronze); display:flex; align-items:center; gap:6px;}
.fork-state.none{color:var(--faint);}
.fork-state .picked{color:var(--ember);}
.fork-clear{margin-left:auto; background:none; border:none; color:var(--faint); font-size:15px; line-height:1; cursor:pointer;}
.fork-clear:hover{color:var(--red);}
.fork-btn{margin-top:7px; background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:6px 11px; font-size:12px;}
.fork-btn:hover{border-color:var(--bronze); color:var(--bronze);}
.fork-editor{margin-top:10px; display:flex; flex-direction:column; gap:7px;}
.fork-row{display:flex; gap:6px;}
.fork-row select{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:6px; padding:5px; font-size:11.5px;}
.fork-row input{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:6px; padding:5px 7px; font-size:11.5px; min-width:0;}
.fork-row .ti{flex:0 0 64px;}
.fork-row .ef{flex:1;}
.fork-actions{display:flex; gap:8px; align-items:center;}
.fork-add{background:none; border:1px solid var(--line); color:var(--muted); border-radius:6px; padding:6px 9px; font-size:11.5px; cursor:pointer;}
.fork-add:hover{border-color:var(--steel); color:var(--steel);}
.fork-send{flex:1; background:var(--bronze); color:#1A1206; border:none; border-radius:7px; padding:7px; font-size:12px; font-weight:700; cursor:pointer;}
.fork-send:hover{background:var(--ember);}
.empty{color:var(--faint); padding:40px 0; text-align:center;}
.lists-btn{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:7px 13px; font-size:12.5px;}
.lists-btn:hover{border-color:var(--bronze); color:var(--bronze);}
.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:flex-start; justify-content:center; padding:34px 16px; z-index:50; overflow:auto;}
.modal{background:var(--surf); border:1px solid var(--line); border-radius:14px; width:100%; max-width:760px; padding:20px;}
.modal-head{display:flex; align-items:center; justify-content:space-between;}
.modal-title{font-family:var(--disp); font-size:20px; color:var(--bronze);}
.modal-x{background:none; border:none; color:var(--muted); font-size:24px; line-height:1; cursor:pointer;}
.modal-x:hover{color:var(--ink);}
.modal-note{font-size:12px; color:var(--faint); margin:6px 0 14px; line-height:1.5;}
.modal-note b{color:var(--bronze);}
.le-sec{font-family:var(--disp); font-size:15px; font-weight:600; margin:14px 0 8px;}
.le-table{display:flex; flex-direction:column; gap:5px;}
.le-row{display:flex; gap:6px; align-items:center;}
.le-row.le-h{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); padding:0 2px;}
.le-row input, .le-row select{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:6px; padding:6px 8px; font-size:12.5px; outline:none; min-width:0;}
.le-row input:focus{border-color:var(--steel);}
.le-n{flex:0 0 150px;}
.le-s{flex:0 0 110px;}
.le-d{flex:1;}
.le-x{flex:0 0 26px; background:none; border:none; color:var(--faint); font-size:18px; line-height:1; cursor:pointer; text-align:center;}
.le-x:hover{color:var(--red);}
.le-add{align-self:flex-start; margin-top:4px; background:none; border:1px dashed var(--line); color:var(--muted); border-radius:7px; padding:6px 12px; font-size:12px; cursor:pointer;}
.le-add:hover{border-color:var(--steel); color:var(--steel);}
.modal-body{max-height:54vh; overflow:auto; padding-right:4px;}
.modal-foot{display:flex; align-items:center; gap:10px; margin-top:18px; padding-top:14px; border-top:1px solid var(--line-soft);}
.le-reset{background:none; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:8px 13px; font-size:12.5px; cursor:pointer;}
.le-cancel{background:var(--surf2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 15px; font-size:13px; cursor:pointer;}
.le-save{background:var(--bronze); color:#1A1206; border:none; border-radius:8px; padding:8px 18px; font-size:13px; font-weight:700; cursor:pointer;}
.le-save:hover{background:var(--ember);}
</style>
</head>
<body>
<header data-shell data-role="gm" data-here="panel"></header>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ВСТАВЬ СЮДА тот же конфиг Firebase, что и в карте игрока. */
const firebaseConfig = {
  apiKey: "AIzaSyCSb7M5IbOql61HIqOUxe3ct4VqdjkhLyE",
  authDomain: "ragnarau-80866.firebaseapp.com",
  projectId: "ragnarau-80866",
  storageBucket: "ragnarau-80866.firebasestorage.app",
  messagingSenderId: "727752765165",
  appId: "1:727752765165:web:8c625b7675f022a1b026e4"
};

const HAS_FB = !!(window.firebase && firebaseConfig.apiKey && firebaseConfig.apiKey !== "ВСТАВЬ_СЮДА");
let db = null, auth = null;
if (HAS_FB) { try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); db = firebase.firestore(); auth = firebase.auth(); } catch (e) { console.error(e); } }

const ATTRS = [["agility","ЛОВ"],["smarts","СМЕ"],["spirit","ДУХ"],["strength","СИЛ"],["vigor","ВЫН"]];
const ARCH = { agility: "Охотник", smarts: "Рунознатец", spirit: "Скальд", strength: "Воин", vigor: "Исполин" };
const DEFAULT_HINDRANCES = [
  { n: "Упрямство", s: "minor", d: "делаешь по-своему даже во вред" },
  { n: "Любопытство", s: "major", d: "не можешь пройти мимо тайны" },
  { n: "Кодекс чести", s: "major", d: "держишь слово и принципы любой ценой" },
  { n: "Верность", s: "minor", d: "не бросаешь своих" },
  { n: "Самоуверенность", s: "major", d: "уверен, что справишься с чем угодно" },
  { n: "Осторожность", s: "minor", d: "семь раз отмеришь, лишний раз не рискнёшь" },
  { n: "Героизм", s: "major", d: "не можешь не помочь попавшему в беду" },
  { n: "Эгоист", s: "minor", d: "своя шкура дороже чужой" },
  { n: "Болтливость", s: "minor", d: "не умеешь держать язык за зубами" },
  { n: "Невезучий", s: "major", d: "−1 бенни на сессию" },
  { n: "Фобия", s: "minor", d: "панический страх: высота, толпа, темнота…" },
  { n: "Зависимость", s: "minor", d: "тянет к выпивке, никотину или азарту" },
  { n: "В долгах", s: "minor", d: "кредиты и счета висят над тобой" },
  { n: "Тайна", s: "minor", d: "скрываешь то, что может всё разрушить" },
  { n: "Старая травма", s: "minor", d: "колено или спина подводят под нагрузкой" },
  { n: "Вспыльчивость", s: "minor", d: "быстро вскипаешь" },
  { n: "Пацифизм", s: "minor", d: "не поднимешь руку первым" },
  { n: "Обязательство", s: "minor", d: "работа или семья постоянно требуют тебя" },
];
const DEFAULT_EDGES = [
  { n: "Шустрый", r: "Ловкость d6+", d: "+2 к Скорости, бег d10" },
  { n: "Атлет", r: "Ловкость d8+", d: "+1 к Атлетике и физическим проверкам" },
  { n: "Крепыш", r: "Сила d6+, Вын. d6+", d: "+1 Стойкость, легче носишь груз" },
  { n: "Внимательный", r: "—", d: "+2 к Вниманию" },
  { n: "Смелый", r: "Дух d6+", d: "+2 против страха" },
  { n: "Везучий", r: "—", d: "+1 бенни на сессию" },
  { n: "Сильная воля", r: "—", d: "+1 к Запугиванию/Подначке и сопротивлению им" },
  { n: "Целитель", r: "Дух d6+", d: "+2 к Лечению — медик, спасатель" },
  { n: "Привлекательный", r: "Дух d6+", d: "располагаешь людей внешностью" },
  { n: "Лингвист", r: "Смекалка d6+", d: "родной + английский + ещё пара языков" },
  { n: "Знаток", r: "Смекалка d8+", d: "+2 к Исследованию: архивы, поиск, базы" },
  { n: "Связи", r: "—", d: "есть полезные знакомства, которые выручают" },
  { n: "Водила", r: "Ловкость d6+", d: "+2 к Вождению и Лодкам" },
  { n: "Обеспеченный", r: "—", d: "стартуешь с хорошими средствами" },
];
const RANKS = [
  { name: "Смертный", min: 0 }, { name: "Пробуждённый", min: 4 }, { name: "Герой", min: 8 },
  { name: "Витязь", min: 13 }, { name: "Полубог", min: 18 }, { name: "Ас", min: 23 }, { name: "Бог", min: 28 },
];
const tierOf = (n) => { let r = RANKS[0]; for (const k of RANKS) if (n >= k.min) r = k; return r.name; };
function dominantArch(a) {
  if (!a) return null; let best = null, bv = -1, tie = false;
  for (const k of Object.keys(ARCH)) { const v = a[k].die + a[k].plus * 2; if (v > bv) { bv = v; best = k; tie = false; } else if (v === bv) tie = true; }
  return tie ? null : ARCH[best];
}
const fmt = (x) => (x && x.plus > 0 ? `d12+${x.plus}` : x ? `d${x.die}` : "—");

function App() {
  const [joined, setJoined] = useState(false);
  const [campaign, setCampaign] = useState("");
  const [chars, setChars] = useState([]);
  const [err, setErr] = useState("");
  const [showLists, setShowLists] = useState(false);
  const [danger, setDanger] = useState(false);

  useEffect(() => {
    if (!joined || !db) return;
    const ref = db.collection("campaigns").doc(campaign).collection("characters");
    const unsub = ref.onSnapshot(
      (qs) => { const arr = []; qs.forEach((d) => arr.push({ id: d.id, ...d.data() })); arr.sort((a, b) => (a.name || "").localeCompare(b.name || "")); setChars(arr); },
      (e) => setErr("Ошибка чтения: " + e.message)
    );
    return () => unsub();
  }, [joined, campaign]);

  async function enter(code) {
    if (!HAS_FB || !db) { setErr("Вставь конфиг Firebase в этот файл."); return; }
    const c = code.trim().toLowerCase().replace(/[^a-zа-я0-9_-]/gi, "");
    if (!c) { setErr("Введи код кампании."); return; }
    try { await auth.signInAnonymously(); } catch (e) { setErr("Включи Anonymous в Firebase → Authentication."); return; }
    try { localStorage.setItem("ragnarok-campaign", c); } catch (e) {}
    setCampaign(c); setJoined(true); setErr("");
  }

  if (!joined) return <Gate err={err} onEnter={enter} />;

  return (
    <div className="wrap">
      <div className="top">
        <div className="wordmark"><span className="rune">ᛟ</span> Рагнарёк-AU · ведущая</div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button className="lists-btn" onClick={() => setShowLists(true)}>Эджи и изъяны</button>
          <button className="lists-btn" onClick={() => setDanger((d) => !d)} style={danger ? { borderColor: "var(--red)", color: "var(--red)" } : undefined} title="Включить опасные действия: удаление героев">{danger ? "✓ правка списка" : "правка списка"}</button>
          <span className="tag">кампания · {campaign}</span>
        </div>
      </div>
      <div className="bar"><b>{chars.length}</b> {chars.length === 1 ? "герой" : "героев"} · обновляется вживую {danger && <span style={{ color: "var(--red)" }}>· режим удаления включён</span>}{err && <span style={{ color: "var(--red)" }}>· {err}</span>}</div>
      {chars.length === 0 ? (
        <div className="empty">Пока никто не вошёл. Дай игрокам ссылку на карту и код «{campaign}».</div>
      ) : (
        <div className="grid">{chars.map((c) => <PCard key={c.id} c={c} campaign={campaign} danger={danger} />)}</div>
      )}
      {showLists && <ListsEditor campaign={campaign} onClose={() => setShowLists(false)} />}
    </div>
  );
}

function PCard({ c, campaign, danger }) {
  const tier = tierOf(c.advances || 0);
  const arch = dominantArch(c.attrs);
  const shards = c.shards || 0;
  const openHref = "ragnarok-character-sheet-cloud.html?gmview=1&campaign=" + encodeURIComponent(campaign) + "&char=" + encodeURIComponent(c.id);
  const delChar = async () => {
    if (!confirm("Удалить героя «" + (c.name || "без имени") + "» из кампании? Это необратимо.")) return;
    try { await db.collection("campaigns").doc(campaign).collection("characters").doc(c.id).delete(); }
    catch (e) { alert("Не удалось удалить: " + e.message); }
  };
  const clearFork = async () => {
    try { await db.collection("campaigns").doc(campaign).collection("characters").doc(c.id).set({ nextFork: null }, { merge: true }); } catch (e) { alert(e.message); }
  };
  const nf = c.nextFork;
  return (
    <div className="pc">
      <div className="h">
        <div className="av">{c.img ? <img src={c.img} alt="" /> : <span className="rune" style={{ fontSize: 22 }}>ᛗ</span>}</div>
        <div>
          <div className="nm">{c.name || "без имени"}</div>
          {c.concept && <div className="cc">{c.concept}</div>}
          <div className="rk">{tier}{tier !== "Смертный" && arch && <span className="arch"> · {arch}</span>} · адв. {c.advances || 0}</div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
        <a className="lists-btn" href={openHref} target="_blank" rel="noopener" style={{ textDecoration: "none", fontSize: 12 }}>Открыть карту</a>
        {danger && <button className="lists-btn" onClick={delChar} style={{ borderColor: "var(--red)", color: "var(--red)", fontSize: 12 }}>Удалить героя</button>}
      </div>
      <div className="row">
        {ATTRS.map(([k, lbl]) => { const a = c.attrs && c.attrs[k]; const div = a && a.plus > 0; return <span key={k} className={"ab" + (div ? " div" : "")}>{lbl} <b>{fmt(a)}</b></span>; })}
      </div>
      <div className="shline">
        <div className="dots">{Array.from({ length: 9 }).map((_, i) => <span key={i} className={"dot" + (i < shards ? " on" : "")} />)}</div>
        <span className="shtxt">осколков <b>{shards}</b>/9</span>
      </div>
      {c.node && <div className="node">узел: <b>{c.node}</b></div>}

      <div className="fork-gm">
        {nf && nf.options ? (
          <div className="fork-state">
            развилка выдана{typeof nf.chosen === "number" ? <span className="picked"> · выбрал «{nf.options[nf.chosen] ? (nf.options[nf.chosen].title || nf.options[nf.chosen].type) : "?"}»</span> : " · ждёт выбора"}
            <button className="fork-clear" onClick={clearFork} title="убрать развилку">×</button>
          </div>
        ) : <div className="fork-state none">развилка не выдана</div>}
        <div style={{ fontSize: 11, color: "var(--faint)", marginTop: 6 }}>Развилки выдаёт «Древо судеб».</div>
      </div>
    </div>
  );
}

function ListsEditor({ campaign, onClose }) {
  const [hind, setHind] = useState(null);
  const [edges, setEdges] = useState(null);
  const [status, setStatus] = useState("Загрузка…");
  const ref = db.collection("campaigns").doc(campaign).collection("config").doc("lists");

  useEffect(() => {
    (async () => {
      try {
        const cfg = await ref.get();
        if (cfg.exists) { const c = cfg.data(); setHind(c.hindrances && c.hindrances.length ? c.hindrances : DEFAULT_HINDRANCES); setEdges(c.edges && c.edges.length ? c.edges : DEFAULT_EDGES); setStatus(""); }
        else { setHind(DEFAULT_HINDRANCES); setEdges(DEFAULT_EDGES); setStatus("Пока стандартные списки — отредактируй и сохрани."); }
      } catch (e) { setHind(DEFAULT_HINDRANCES); setEdges(DEFAULT_EDGES); setStatus("Не загрузилось — показаны стандартные."); }
    })();
  }, [campaign]);

  const setH = (i, k, v) => setHind((a) => a.map((row, j) => (j === i ? { ...row, [k]: v } : row)));
  const delH = (i) => setHind((a) => a.filter((_, j) => j !== i));
  const addH = () => setHind((a) => [...a, { n: "", s: "minor", d: "" }]);
  const setE = (i, k, v) => setEdges((a) => a.map((row, j) => (j === i ? { ...row, [k]: v } : row)));
  const delE = (i) => setEdges((a) => a.filter((_, j) => j !== i));
  const addE = () => setEdges((a) => [...a, { n: "", r: "—", d: "" }]);

  const save = async () => {
    const h = (hind || []).filter((x) => x.n.trim()).map((x) => ({ n: x.n.trim(), s: x.s === "major" ? "major" : "minor", d: (x.d || "").trim() }));
    const e = (edges || []).filter((x) => x.n.trim()).map((x) => ({ n: x.n.trim(), r: (x.r || "—").trim(), d: (x.d || "").trim() }));
    try { await ref.set({ hindrances: h, edges: e }); setStatus("Сохранено ✓"); setTimeout(() => setStatus(""), 1600); }
    catch (err) { setStatus("Ошибка: " + err.message); }
  };
  const resetDefaults = () => { setHind(DEFAULT_HINDRANCES); setEdges(DEFAULT_EDGES); setStatus("Подставлены стандартные — не забудь сохранить."); };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">Эджи и изъяны кампании</div>
          <button className="modal-x" onClick={onClose}>×</button>
        </div>
        <div className="modal-note">Меняет списки для всех новых созданий персонажей в этой кампании. Конфликты-противоположности пока зашиты в коде. {status && <b>· {status}</b>}</div>
        {hind === null ? <div className="empty">Загрузка…</div> : (
          <div className="modal-body">
            <div className="le-sec">Изъяны</div>
            <div className="le-table">
              <div className="le-row le-h"><span className="le-n">Название</span><span className="le-s">Тип</span><span className="le-d">Описание</span><span className="le-x" /></div>
              {hind.map((row, i) => (
                <div className="le-row" key={i}>
                  <input className="le-n" value={row.n} onChange={(e) => setH(i, "n", e.target.value)} placeholder="название" />
                  <select className="le-s" value={row.s} onChange={(e) => setH(i, "s", e.target.value)}><option value="minor">малый</option><option value="major">большой</option></select>
                  <input className="le-d" value={row.d} onChange={(e) => setH(i, "d", e.target.value)} placeholder="описание" />
                  <button className="le-x" onClick={() => delH(i)} title="удалить">×</button>
                </div>
              ))}
              <button className="le-add" onClick={addH}>+ изъян</button>
            </div>

            <div className="le-sec">Эджи</div>
            <div className="le-table">
              <div className="le-row le-h"><span className="le-n">Название</span><span className="le-s">Требование</span><span className="le-d">Описание</span><span className="le-x" /></div>
              {edges.map((row, i) => (
                <div className="le-row" key={i}>
                  <input className="le-n" value={row.n} onChange={(e) => setE(i, "n", e.target.value)} placeholder="название" />
                  <input className="le-s le-req" value={row.r} onChange={(e) => setE(i, "r", e.target.value)} placeholder="требование" />
                  <input className="le-d" value={row.d} onChange={(e) => setE(i, "d", e.target.value)} placeholder="описание" />
                  <button className="le-x" onClick={() => delE(i)} title="удалить">×</button>
                </div>
              ))}
              <button className="le-add" onClick={addE}>+ эдж</button>
            </div>
          </div>
        )}
        <div className="modal-foot">
          <button className="le-reset" onClick={resetDefaults}>Стандартные</button>
          <div style={{ flex: 1 }} />
          <button className="le-cancel" onClick={onClose}>Закрыть</button>
          <button className="le-save" onClick={save}>Сохранить</button>
        </div>
      </div>
    </div>
  );
}

function Gate({ err, onEnter }) {
  const [code, setCode] = useState(() => { try { return localStorage.getItem("ragnarok-campaign") || ""; } catch (e) { return ""; } });
  return (
    <div className="gate-wrap">
      <div className="gate">
        <div className="wordmark"><span className="rune">ᛟ</span> Рагнарёк-AU</div>
        <h2>Панель ведущей</h2>
        <label>Код кампании</label>
        <input className="t-input" value={code} onChange={(e) => setCode(e.target.value)} placeholder="тот же, что у игроков" onKeyDown={(e) => e.key === "Enter" && onEnter(code)} />
        <button className="go" onClick={() => onEnter(code)}>Открыть</button>
        {err && <div className="gerr">{err}</div>}
        <div className="gnote">Видишь карты всех игроков этой кампании. Полное древо и подмена твинов — следующим шагом.</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="app-shell.js" defer></script>
</body>
</html>
